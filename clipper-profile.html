<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>
    <meta charset="UTF-8">
    <!-- Mencegah auto-zoom pada input di iOS/Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil Clipper - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent !important; outline: none; }
        html, body { background-color: #0a0a0c; color: white; font-family: 'Inter', sans-serif; height: 100dvh; margin: 0; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Hilangkan panah up/down pada input type number */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black flex flex-col relative w-full h-full">

    <!-- LOADING SCREEN -->
    <div id="pageLoader" class="fixed inset-0 z-[9999] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative flex flex-col items-center">
            <div class="absolute inset-0 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-zinc-600/20 blur-[40px] rounded-full w-32 h-32 animate-pulse"></div>
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-10 sm:h-12 w-auto object-contain relative z-10 animate-bounce" style="animation-duration: 2s;" onerror="this.src='https://via.placeholder.com/150x50?text=WHOOST'">
            <p class="mt-6 text-zinc-500 text-[11px] sm:text-xs font-semibold tracking-widest uppercase animate-pulse">Memuat Profil...</p>
        </div>
    </div>

    <!-- Background Ornamen -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-20%] right-[-10%] w-[50rem] h-[50rem] bg-blue-900/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- ========================================== -->
    <!-- HEADER                                     -->
    <!-- ========================================== -->
    <header class="h-16 sm:h-20 flex items-center justify-between px-4 sm:px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md flex-shrink-0 w-full z-20">
        <div class="flex items-center gap-3 sm:gap-4">
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-6 sm:h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/150x50?text=WHOOST'">
            <div class="h-4 sm:h-5 w-px bg-zinc-800 hidden sm:block"></div>
            <h1 class="text-base sm:text-lg font-semibold tracking-tight text-white">Profil Kamu</h1>
        </div>
        
        <!-- Tombol Simpan di Header (Muncul di Desktop, Tersembunyi di Mobile) -->
        <button id="btn-save-header" onclick="saveProfile()" class="hidden sm:block px-5 py-2 rounded-xl bg-white text-black text-sm font-bold hover:bg-zinc-200 transition-colors focus:outline-none shadow-[0_0_15px_rgba(255,255,255,0.15)]">
            Simpan
        </button>
    </header>

    <!-- ========================================== -->
    <!-- MAIN CONTENT                               -->
    <!-- ========================================== -->
    <main class="flex-1 overflow-y-auto px-4 sm:px-8 py-8 pb-32 scroll-smooth w-full relative z-10">
        <div class="max-w-2xl mx-auto">
            
            <!-- 1. FOTO PROFIL / AVATAR -->
            <div class="flex flex-col items-center justify-center mb-10">
                <div class="relative group cursor-pointer" onclick="alert('Membuka galeri untuk ganti foto profil')">
                    <!-- Avatar Image Placeholder -->
                    <div class="w-24 h-24 sm:w-28 sm:h-28 rounded-full bg-zinc-900 border-2 border-zinc-700 flex items-center justify-center overflow-hidden group-hover:border-zinc-500 transition-colors shadow-lg relative">
                        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80" alt="Avatar" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </div>
                    </div>
                    <!-- Icon Camera Overlapping -->
                    <div class="absolute bottom-0 right-0 w-8 h-8 bg-zinc-800 border border-zinc-700 text-white rounded-full flex items-center justify-center shadow-lg pointer-events-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                    </div>
                </div>
                <p class="text-[11px] text-zinc-500 mt-3 font-medium">Ketuk untuk mengubah foto</p>
            </div>

            <!-- 2. STATUS & REPUTASI (Kesehatan Profil) -->
            <div class="mb-10">
                <div class="flex items-center gap-4 mb-4">
                    <h4 class="text-xs font-bold tracking-widest text-zinc-500 uppercase shrink-0">Status Akun</h4>
                    <div class="h-px bg-zinc-800 w-full"></div>
                </div>

                <div class="bg-cardBg border border-zinc-800 rounded-3xl p-5 sm:p-6 flex flex-col space-y-4 shadow-sm relative overflow-hidden">
                    <div class="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-zinc-700 via-blue-500 to-zinc-700 opacity-50"></div>
                    <div class="flex justify-between items-end mb-1">
                        <span class="text-sm font-semibold text-white">Kesehatan Profil</span>
                        <span class="text-lg font-bold text-blue-400">75%</span>
                    </div>
                    
                    <!-- Progress Bar Container -->
                    <div class="w-full h-2.5 sm:h-3 bg-zinc-900 rounded-full overflow-hidden border border-zinc-800">
                        <div class="h-full bg-blue-500 rounded-full shadow-[0_0_10px_rgba(59,130,246,0.4)] transition-all duration-1000" style="width: 75%;"></div>
                    </div>

                    <p class="text-xs text-zinc-500 leading-relaxed mt-2">Profil yang lengkap dan nomor rekening yang valid akan mempercepat proses review dan pencairan komisi (Payout) Anda.</p>
                </div>
            </div>

            <!-- 3. FORM INFORMASI PRIBADI -->
            <div class="mb-10">
                <div class="flex items-center gap-4 mb-4">
                    <h4 class="text-xs font-bold tracking-widest text-zinc-500 uppercase shrink-0">Informasi Pribadi</h4>
                    <div class="h-px bg-zinc-800 w-full"></div>
                </div>

                <div class="space-y-5">
                    <!-- Nama Lengkap -->
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Nama Lengkap</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            </div>
                            <input type="text" value="Budi Santoso" placeholder="Masukkan nama lengkap" class="w-full bg-cardBg border border-zinc-800 focus:border-white focus:bg-zinc-900 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white outline-none transition-colors">
                        </div>
                    </div>

                    <!-- No WhatsApp -->
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Nomor WhatsApp</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                            </div>
                            <input type="number" value="081234567890" placeholder="08xxxxxxxxxx" class="w-full bg-cardBg border border-zinc-800 focus:border-white focus:bg-zinc-900 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white outline-none transition-colors">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 4. FORM AKUN SOSIAL MEDIA -->
            <div class="mb-10">
                <div class="flex items-center gap-4 mb-4">
                    <h4 class="text-xs font-bold tracking-widest text-zinc-500 uppercase shrink-0">Sosial Media</h4>
                    <div class="h-px bg-zinc-800 w-full"></div>
                </div>

                <div class="space-y-5">
                    <!-- Akun TikTok -->
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Username TikTok</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <span class="text-zinc-500 font-bold text-sm">@</span>
                            </div>
                            <input type="text" value="budisantoso_tk" placeholder="username_tiktok" class="w-full bg-cardBg border border-zinc-800 focus:border-white focus:bg-zinc-900 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white outline-none transition-colors">
                        </div>
                    </div>

                    <!-- Akun Instagram -->
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Username Instagram</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <span class="text-zinc-500 font-bold text-sm">@</span>
                            </div>
                            <input type="text" placeholder="username_ig" class="w-full bg-cardBg border border-zinc-800 focus:border-white focus:bg-zinc-900 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white outline-none transition-colors">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 5. INFORMASI PEMBAYARAN / PAYOUT -->
            <div class="mb-10">
                <div class="flex items-center gap-4 mb-4">
                    <h4 class="text-xs font-bold tracking-widest text-zinc-500 uppercase shrink-0">Info Pembayaran</h4>
                    <div class="h-px bg-zinc-800 w-full"></div>
                </div>

                <div class="space-y-5">
                    <!-- Metode Pembayaran -->
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Bank / E-Wallet</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                            </div>
                            <select class="appearance-none w-full bg-cardBg border border-zinc-800 focus:border-white focus:bg-zinc-900 rounded-xl py-3.5 pl-11 pr-10 text-sm text-white outline-none transition-colors cursor-pointer">
                                <option value="" disabled>Pilih Metode</option>
                                <option value="BCA" selected>BCA</option>
                                <option value="Mandiri">Mandiri</option>
                                <option value="BNI">BNI</option>
                                <option value="BRI">BRI</option>
                                <option value="GoPay">GoPay</option>
                                <option value="OVO">OVO</option>
                                <option value="Dana">Dana</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-zinc-500">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>

                    <!-- Nomor Rekening -->
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Nomor Rekening / HP</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path></svg>
                            </div>
                            <input type="number" value="1234567890" placeholder="Ketik nomor rekening/e-wallet" class="w-full bg-cardBg border border-zinc-800 focus:border-white focus:bg-zinc-900 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white outline-none transition-colors">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 6. TOMBOL AKSI BAWAH -->
            <div class="space-y-4 pt-2">
                <!-- Simpan -->
                <button id="btn-save-bottom" onclick="saveProfile()" class="w-full px-6 py-3.5 rounded-xl bg-white text-black text-sm font-bold hover:bg-zinc-200 transition-colors focus:outline-none shadow-[0_0_15px_rgba(255,255,255,0.15)] flex justify-center items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                    Simpan Perubahan
                </button>

                <!-- Logout -->
                <button onclick="confirmLogout()" class="w-full px-6 py-3.5 rounded-xl border border-red-500/20 bg-red-500/5 text-red-500 text-sm font-bold hover:bg-red-500/10 hover:border-red-500/40 transition-all focus:outline-none flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Keluar Akun
                </button>
            </div>

        </div>
    </main>

    <!-- ========================================== -->
    <!-- JAVASCRIPT & LOGIC                         -->
    <!-- ========================================== -->
    
    <!-- Memanggil Navbar Bawah KHUSUS CLIPPER -->
    <script>
        const ACTIVE_MENU = 'profil'; // Identifier menu aktif untuk navbarclipper.js
    </script>
    <script src="attribute/navbarclipper.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Hilangkan Loading Screen
            setTimeout(() => {
                const loader = document.getElementById('pageLoader');
                if(loader){
                    loader.classList.add('opacity-0');
                    setTimeout(() => loader.style.display = 'none', 500); 
                }
            }, 800); 
        });

        // Simpan Profil Animasi Sederhana
        function saveProfile() {
            const btnBottom = document.getElementById('btn-save-bottom');
            const btnHeader = document.getElementById('btn-save-header');
            
            // Simpan status asal
            const originalBottomText = btnBottom.innerHTML;
            
            // Berikan efek loading
            btnBottom.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Menyimpan...`;
            
            [btnBottom, btnHeader].forEach(btn => {
                if(btn) {
                    btn.classList.add('opacity-75');
                    btn.disabled = true;
                }
            });

            // Simulasi request save
            setTimeout(() => {
                // Kembalikan status tombol
                btnBottom.innerHTML = originalBottomText;
                
                [btnBottom, btnHeader].forEach(btn => {
                    if(btn) {
                        btn.classList.remove('opacity-75');
                        btn.disabled = false;
                    }
                });
                
                alert("Data profil berhasil disimpan!");
            }, 1000);
        }

        // Konfirmasi Logout
        function confirmLogout() {
            const isConfirmed = confirm("Apakah Anda yakin ingin keluar dari akun?");
            if (isConfirmed) {
                window.location.href = "login.html"; // Sesuaikan dengan link login Anda
            }
        }
    </script>
</body>
</html>
