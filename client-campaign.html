<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Saya - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        /* Custom Patterns diadopsi dari Explore */
        .bg-dots-card {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 16px 16px;
        }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black flex flex-col relative w-full h-full">

    <!-- Loading Screen -->
    <div id="pageLoader" class="fixed inset-0 z-[9999] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative flex flex-col items-center">
            <div class="absolute inset-0 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-zinc-600/20 blur-[40px] rounded-full w-32 h-32 animate-pulse"></div>
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-10 sm:h-12 w-auto object-contain relative z-10 animate-bounce" style="animation-duration: 2s;">
            <p class="mt-6 text-zinc-500 text-[11px] sm:text-xs font-semibold tracking-widest uppercase animate-pulse">Memuat Campaign...</p>
        </div>
    </div>

    <!-- Background Ornamen -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-20%] left-[-10%] w-[50rem] h-[50rem] bg-zinc-800/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- Header -->
    <header class="h-20 sm:h-24 flex items-center justify-between px-4 sm:px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md z-20 flex-shrink-0 w-full">
        <div class="flex items-center gap-3 sm:gap-4">
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-6 sm:h-10 w-auto object-contain">
            <div class="h-5 sm:h-6 w-px bg-zinc-800 hidden sm:block"></div>
            <div>
                <h1 class="text-lg sm:text-xl font-semibold tracking-tight leading-tight">Campaign Saya</h1>
                <p class="text-[10px] sm:text-xs text-zinc-500 hidden sm:block mt-0.5">Kelola semua campaign brand Anda</p>
            </div>
        </div>
    </header>

    <!-- Toolbar: Search, Filter, Buat Campaign (Diperbarui dengan relative z-40 agar dropdown tidak tertimpa) -->
    <div class="px-4 sm:px-8 py-4 sm:py-6 relative z-40 flex flex-wrap gap-3 sm:gap-4 items-center justify-between bg-darkBg flex-shrink-0 w-full border-b border-zinc-800/30">
        <div class="flex flex-1 sm:flex-none items-center gap-3 w-full sm:w-auto">
            <div class="relative w-full sm:w-64">
                <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="searchInput" oninput="window.handleSearch(event)" placeholder="Cari campaign..." class="w-full bg-cardBg border border-zinc-800 rounded-xl pl-10 pr-4 py-2.5 text-[13px] text-white placeholder-zinc-500 focus:outline-none focus:border-white transition-colors">
            </div>
            
            <!-- Custom Dropdown Filter -->
            <div class="relative w-full sm:w-auto">
                <button onclick="window.toggleFilter()" id="btnFilter" class="w-full sm:w-auto flex items-center justify-between gap-3 bg-cardBg border border-zinc-800 px-4 py-2.5 rounded-xl text-[13px] font-medium text-white hover:bg-zinc-900 transition-colors focus:outline-none">
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                        <span id="filterLabel">Semua Status</span>
                    </div>
                    <svg class="w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="dropdownFilter" class="absolute left-0 sm:right-0 top-full mt-2 w-full sm:w-48 bg-cardBg border border-zinc-800 rounded-xl shadow-2xl hidden flex-col overflow-hidden z-50">
                    <button onclick="window.selectFilter('Semua')" class="text-left px-5 py-3 text-[13px] hover:bg-zinc-800 transition-colors">Semua Status</button>
                    <button onclick="window.selectFilter('ACTIVE')" class="text-left px-5 py-3 text-[13px] text-green-500 hover:bg-zinc-800 transition-colors border-t border-zinc-800/50">Active</button>
                    <button onclick="window.selectFilter('HOLDING')" class="text-left px-5 py-3 text-[13px] text-amber-500 hover:bg-zinc-800 transition-colors border-t border-zinc-800/50">Holding</button>
                    <button onclick="window.selectFilter('CLOSED')" class="text-left px-5 py-3 text-[13px] text-red-500 hover:bg-zinc-800 transition-colors border-t border-zinc-800/50">Closed</button>
                </div>
            </div>
        </div>
        
        <!-- Tombol Buat Campaign -->
        <a href="client-addcampaign.html" class="w-full sm:w-auto px-5 py-2.5 bg-white text-black text-[13px] font-semibold rounded-xl hover:bg-zinc-200 transition-colors flex items-center justify-center gap-2 shadow-lg focus:outline-none">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
            Buat Campaign
        </a>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto px-4 sm:px-8 py-6 pb-32 scroll-smooth">
        
        <!-- Grid (Diperbarui dengan relative z-10) -->
        <div id="campaignGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 relative z-10">
            <p class="text-zinc-500 text-sm col-span-full">Memuat campaign...</p>
        </div>

        <div id="no-data-alert" class="hidden text-center py-20 col-span-full relative z-10">
            <svg class="w-16 h-16 text-zinc-600 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <h3 class="text-xl font-bold text-white mb-2">Tidak ada Campaign</h3>
            <p class="text-zinc-500 text-sm">Kamu belum membuat campaign atau tidak ada yang cocok dengan pencarian.</p>
        </div>
    </main>

    <script>const ACTIVE_MENU = 'campaign';</script>
    <script src="attribute/navbarclient.js"></script>

    <!-- SCRIPT SUPABASE & LOGIC -->
    <script type="module">
        import { supabase } from './authentication/auth.js';

        let sessionUser = null;
        let campaignsData = [];
        let submissionsData = [];
        let currentFilter = 'Semua';
        let searchQuery = '';

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                alert("Silakan login sebagai Client.");
                window.location.replace('login.html');
                return;
            }
            sessionUser = session.user;

            await loadData();

            setTimeout(() => {
                const loader = document.getElementById('pageLoader');
                if(loader) {
                    loader.classList.add('opacity-0');
                    setTimeout(() => loader.style.display = 'none', 500);
                }
            }, 500);
        });

        async function loadData() {
            try {
                // 1. Tarik semua campaign milik Client ID
                const { data: camps, error: campErr } = await supabase
                    .from('campaigns')
                    .select('*')
                    .eq('client_id', sessionUser.id)
                    .order('created_at', { ascending: false });

                if (campErr) throw campErr;
                campaignsData = camps || [];

                if (campaignsData.length > 0) {
                    // 2. Tarik semua submission (APPROVED) yang terkait dengan campaign tersebut
                    const campIds = campaignsData.map(c => c.id);
                    const { data: subs, error: subErr } = await supabase
                        .from('submissions')
                        .select('campaign_id, views_claimed, views_paid, status')
                        .in('campaign_id', campIds)
                        .eq('status', 'APPROVED');
                    
                    if (!subErr) {
                        submissionsData = subs || [];
                    }
                }

                applyFilters();

            } catch (err) {
                console.error("Gagal memuat data", err);
                document.getElementById('campaignGrid').innerHTML = '<p class="text-red-500 text-sm col-span-full">Gagal terhubung ke database.</p>';
            }
        }

        // Format Views
        function formatK(num) {
            if(num >= 1000000) return (num/1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if(num >= 1000) return (num/1000).toFixed(1).replace(/\.0$/, '') + 'K';
            return num.toString();
        }

        function generateCard(camp) {
            // Hitung statistik berdasarkan submissions yang APPROVED
            const campSubs = submissionsData.filter(s => s.campaign_id === camp.id);
            const totalContent = campSubs.length;
            const totalViews = campSubs.reduce((sum, s) => sum + Math.max(s.views_claimed || 0, s.views_paid || 0), 0);

            // Logika Views atau Video
            const isPerVideo = camp.payment_type === 'video';
            const highlightValue = isPerVideo ? totalContent : formatK(totalViews);
            const highlightText = isPerVideo ? 'Total Video' : 'Total Views';

            // Hitung persentase budget yang terpakai
            const budgetUsed = camp.budget_total - camp.budget_remaining;
            const pct = camp.budget_total > 0 ? Math.round((budgetUsed / camp.budget_total) * 100) : 0;
            const validPct = pct > 100 ? 100 : (pct < 0 ? 0 : pct);

            // Pengaturan Status Visual
            let statusBadge = '';
            let opacityClass = 'opacity-100';

            if (camp.status === 'ACTIVE') {
                statusBadge = `<div class="shrink-0 px-1.5 md:px-2.5 py-0.5 md:py-1 rounded-full border border-green-900/50 bg-green-900/20 text-[7px] md:text-[9px] font-bold text-green-400 tracking-wider">ACTIVE</div>`;
            } else if (camp.status === 'HOLDING') {
                statusBadge = `<div class="shrink-0 px-1.5 md:px-2.5 py-0.5 md:py-1 rounded-full border border-yellow-900/50 bg-yellow-900/20 text-[7px] md:text-[9px] font-bold text-yellow-500 tracking-wider">HOLDING</div>`;
            } else {
                statusBadge = `<div class="shrink-0 px-1.5 md:px-2.5 py-0.5 md:py-1 rounded-full border border-red-900/50 bg-red-900/20 text-[7px] md:text-[9px] font-bold text-red-500 tracking-wider">CLOSED</div>`;
                opacityClass = 'opacity-70 hover:opacity-100';
            }

            const typeText = camp.type === 'ugc' ? 'UGC' : 'Clipping';

            // Platform Icons
            let platformIcons = '';
            if (camp.platforms && Array.isArray(camp.platforms)) {
                if (camp.platforms.includes('tiktok')) platformIcons += `<svg class="w-3 h-3 md:w-3.5 md:h-3.5 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.1z"/></svg>`;
                if (camp.platforms.includes('instagram')) platformIcons += `<svg class="w-3 h-3 md:w-3.5 md:h-3.5 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.88z"/></svg>`;
                if (camp.platforms.includes('youtube')) platformIcons += `<svg class="w-3 h-3 md:w-3.5 md:h-3.5 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`;
            }

            const imgOrTitle = camp.banner_url 
                ? `<img src="${camp.banner_url}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">`
                : `<h3 class="text-lg md:text-2xl font-black text-white relative z-10 tracking-tighter truncate w-11/12 text-center">${camp.title.substring(0, 10).toUpperCase()}</h3>
                   <p class="text-zinc-400 font-black text-[8px] md:text-[10px] tracking-[0.2em] relative z-10 mt-0.5">${typeText.toUpperCase()}</p>`;

            // Hide tag "X Konten" if it's already shown as the main highlighted value
            const tagKonten = !isPerVideo 
                ? `<div class="flex items-center px-1.5 md:px-2.5 py-1 md:py-1.5 rounded-md md:rounded-lg border border-zinc-800 bg-zinc-900/50">
                       <span class="text-[8px] md:text-[10px] font-bold text-zinc-400 uppercase tracking-wider">${totalContent} Konten</span>
                   </div>` 
                : '';

            return `
            <div class="bg-cardBg border border-zinc-800/80 rounded-[1.25rem] md:rounded-[1.5rem] p-3 md:p-4 flex flex-col h-full hover:border-zinc-500 hover:-translate-y-1 transition-all duration-300 shadow-xl group ${opacityClass}">
                
                <div class="w-full h-28 md:h-40 bg-zinc-950 rounded-xl mb-3 md:mb-4 flex flex-col items-center justify-center relative overflow-hidden bg-dots-card shrink-0 border border-zinc-800/50">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#121214] via-transparent to-transparent z-0 opacity-80"></div>
                    ${imgOrTitle}
                </div>

                <div class="flex justify-between items-center mb-2 md:mb-3">
                    <div class="flex items-center overflow-hidden pr-2">
                        <span class="text-[11px] md:text-xs font-bold text-zinc-400 hover:text-white transition truncate">${camp.brand_name || '-'}</span>
                    </div>
                    ${statusBadge}
                </div>

                <h4 class="text-sm md:text-lg font-bold text-white mb-1.5 md:mb-2 truncate transition-colors" title="${camp.title}">${camp.title}</h4>
                
                <div class="mb-3 md:mb-4 flex items-baseline gap-1">
                    <span class="text-lg md:text-2xl font-extrabold text-white tracking-tight">${highlightValue}</span>
                    <span class="text-zinc-500 text-[9px] md:text-xs font-bold">${highlightText}</span>
                </div>
                
                <div class="flex flex-wrap items-center gap-1.5 md:gap-2 mb-4">
                    <div class="flex items-center gap-1 md:gap-1.5 px-1.5 md:px-2.5 py-1 md:py-1.5 rounded-md md:rounded-lg border border-zinc-800 bg-zinc-900/50">
                        ${platformIcons || `<span class="text-[10px] text-zinc-500">-</span>`}
                    </div>
                    <div class="flex items-center px-1.5 md:px-2.5 py-1 md:py-1.5 rounded-md md:rounded-lg border border-zinc-800 bg-zinc-900/50">
                        <span class="text-[8px] md:text-[10px] font-bold text-zinc-400 uppercase tracking-wider">${typeText}</span>
                    </div>
                    ${tagKonten}
                </div>

                <div class="mt-auto pt-2 md:pt-4 border-t border-zinc-800/50">
                    <div class="flex justify-between items-end mb-1.5 md:mb-2 mt-2">
                        <span class="text-[9px] md:text-xs text-zinc-400 font-semibold">Budget Terpakai</span>
                        <span class="text-[9px] md:text-xs font-black text-white">${validPct}%</span>
                    </div>
                    <div class="w-full h-1 md:h-1.5 bg-zinc-800 rounded-full overflow-hidden mb-3 md:mb-4">
                        <div class="h-full bg-white rounded-full transition-all duration-500 shadow-[0_0_10px_rgba(255,255,255,0.5)]" style="width: ${validPct}%;"></div>
                    </div>
                    
                    <!-- Tombol Lihat Saja, Full Width -->
                    <a href="detail-campaign.html?id=${camp.id}" class="w-full block bg-white text-black py-2 md:py-2.5 rounded-lg md:rounded-xl font-bold text-[10px] md:text-sm text-center hover:bg-zinc-200 active:scale-[0.98] transition-all shadow-lg focus:outline-none">
                        Lihat Campaign
                    </a>
                </div>
            </div>`;
        }

        function applyFilters() {
            const grid = document.getElementById('campaignGrid');
            const alertBox = document.getElementById('no-data-alert');
            
            grid.innerHTML = '';

            let filtered = campaignsData.filter(camp => {
                const title = (camp.title || '').toLowerCase();
                const brand = (camp.brand_name || '').toLowerCase();
                
                const matchSearch = title.includes(searchQuery) || brand.includes(searchQuery);
                const matchFilter = currentFilter === 'Semua' || camp.status === currentFilter;
                
                return matchSearch && matchFilter;
            });

            if (filtered.length === 0) {
                alertBox.classList.remove('hidden');
                return;
            } else {
                alertBox.classList.add('hidden');
            }

            let html = '';
            filtered.forEach(camp => {
                html += generateCard(camp);
            });
            grid.innerHTML = html;
        }

        // ==========================================
        // UI BINDINGS
        // ==========================================
        window.handleSearch = function(e) {
            searchQuery = e.target.value.toLowerCase();
            applyFilters();
        };

        window.toggleFilter = function() {
            const dropdown = document.getElementById('dropdownFilter');
            dropdown.classList.toggle('hidden');
            dropdown.classList.toggle('flex');
        };

        window.selectFilter = function(status) {
            currentFilter = status;
            let label = status === 'Semua' ? 'Semua Status' : status.charAt(0).toUpperCase() + status.slice(1).toLowerCase();
            document.getElementById('filterLabel').innerText = label;
            window.toggleFilter();
            applyFilters();
        };

        window.addEventListener('click', function(e) {
            const filterBtn = document.getElementById('btnFilter');
            const dropdown = document.getElementById('dropdownFilter');
            if(filterBtn && dropdown) {
                if (!filterBtn.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.add('hidden');
                    dropdown.classList.remove('flex');
                }
            }
        });
    </script>
</body>
</html>
