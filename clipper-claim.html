<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klaim Views - Whoost Clipper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }

    <style>
        html, body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    </style>
    <!-- Mencegah Stuck Loader -->
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('pageLoader');
                if(loader) {
                    loader.classList.add('opacity-0');
                    setTimeout(() => loader.style.display = 'none', 500);
                }
            }, 800);
        });
    </script>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black flex flex-col relative w-full h-full">

    <!-- LOADING SCREEN -->
    <div id="pageLoader" class="fixed inset-0 z-[9999] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">

            <div class="absolute inset-0 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-zinc-600/20 blur-[40px] rounded-full w-32 h-32 animate-pulse"></div>
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-10 sm:h-12 w-auto object-contain relative z-10 animate-bounce" style="animation-duration: 2s;">
            <p class="mt-6 text-zinc-500 text-[11px] sm:text-xs font-semibold tracking-widest uppercase animate-pulse">Memuat Data...</p>
        </div>
    </div>

    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] right-[-10%] w-[40rem] h-[40rem] bg-zinc-800/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- HEADER -->
    <header class="h-20 sm:h-24 flex items-center justify-between px-4 sm:px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md z-20 flex-shrink-0 w-full relative">
        <div class="flex items-center gap-3 sm:gap-4">
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-6 sm:h-10 w-auto object-contain">
            <div class="h-5 sm:h-6 w-px bg-zinc-800 hidden sm:block"></div>
            <h1 class="text-lg sm:text-xl md:text-2xl font-semibold tracking-tight">Klaim Views</h1>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
            <button onclick="location.reload()" class="p-2 rounded-full bg-cardBg border border-zinc-800 hover:border-zinc-500 transition-colors tooltip" title="Refresh Data">
                <svg class="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 sm:px-8 py-6 pb-32 z-0 scroll-smooth w-full relative">
        <div class="max-w-7xl mx-auto space-y-8 sm:space-y-10">
            
            <!-- SECTION 1: RINGKASAN PENDAPATAN -->
            <section>
                <div class="bg-cardBg border border-zinc-800 rounded-2xl p-5 sm:p-6 lg:p-8 relative hover:border-zinc-600 transition-all duration-300">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <p class="text-xs sm:text-sm font-medium text-zinc-400 mb-1">Total Pendapatan Kamu</p>
                            <h2 id="total-pendapatan" class="text-3xl sm:text-4xl md:text-5xl font-bold text-white tracking-tight">Rp 0</h2>
                        </div>
                        <button onclick="window.toggleSensor()" class="text-zinc-500 hover:text-white transition-colors p-2 bg-zinc-900 rounded-lg focus:outline-none">
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                    </div>

                    <div class="h-px w-full bg-zinc-800 mb-6"></div>

                    <!-- 4 Kolom Detail -->
                    <div class="grid grid-cols-4 gap-2 sm:gap-4 text-left">
                        <div class="border-r border-zinc-800">
                            <p class="text-[9px] sm:text-xs text-zinc-500 font-bold uppercase mb-1">Saldo Tersedia</p>
                            <p id="saldo-detail" class="text-xs sm:text-lg font-bold text-emerald-400">Rp 0</p>
                        </div>
                        <div class="border-r border-zinc-800 pl-2">
                            <p class="text-[9px] sm:text-xs text-zinc-500 font-bold uppercase mb-1">Pending (Review)</p>
                            <p id="pending-detail" class="text-xs sm:text-lg font-bold text-amber-400">0</p>
                        </div>
                        <div class="border-r border-zinc-800 pl-2">
                            <p class="text-[9px] sm:text-xs text-zinc-500 font-bold uppercase mb-1">Disetujui</p>
                            <p id="disetujui-detail" class="text-xs sm:text-lg font-bold text-blue-400">0</p>
                        </div>
                        <div class="pl-2">
                            <p class="text-[9px] sm:text-xs text-zinc-500 font-bold uppercase mb-1">Ditolak</p>
                            <p id="ditolak-detail" class="text-xs sm:text-lg font-bold text-red-400">0</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- SECTION 2: LIST KONTEN -->
            <section>
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                    <h2 class="text-base sm:text-lg font-semibold text-white">Konten Tersedia</h2>
                    
                    <div class="flex flex-wrap items-center gap-2 sm:gap-3">
                        <!-- Filter Campaign -->
                        <div class="relative custom-select-container">
                            <div class="bg-zinc-900 border border-zinc-700 hover:border-zinc-500 rounded-lg px-3 py-2 text-xs text-white cursor-pointer flex justify-between items-center transition-colors min-w-[140px]" onclick="window.toggleSelect('campaign-options')">
                                <span id="campaign-selected-text" class="truncate max-w-[120px]">Semua Campaign</span>
                                <svg class="w-3 h-3 text-zinc-400 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                            <div id="campaign-options" class="custom-select-options hidden absolute top-full right-0 mt-2 w-48 bg-zinc-800 border border-zinc-700 rounded-xl shadow-xl z-50 max-h-48 overflow-y-auto custom-scrollbar">
                                <!-- Diisi JS -->
                            </div>
                        </div>

                        <!-- Filter Status & Sort -->
                        <div class="relative" id="filter-container">
                            <button onclick="window.toggleFilter()" class="bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 p-2 rounded-lg transition-colors flex items-center gap-2 focus:outline-none">
                                <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                            </button>
                            <div id="filter-dropdown" class="absolute right-0 mt-2 w-48 bg-cardBg border border-zinc-700 rounded-xl shadow-2xl z-50 hidden flex-col p-2 gap-2">
                                <div>
                                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider mb-1 px-2">Urutkan</p>
                                    <button onclick="window.applyFilter('sort', 'newest')" class="filter-btn sort-newest w-full text-left px-3 py-1.5 text-xs text-white bg-zinc-800 rounded-lg transition-colors">Terbaru</button>
                                    <button onclick="window.applyFilter('sort', 'oldest')" class="filter-btn sort-oldest w-full text-left px-3 py-1.5 text-xs text-zinc-400 hover:text-white hover:bg-zinc-800/50 rounded-lg transition-colors">Terlama</button>
                                </div>
                                <div class="h-px bg-zinc-800 my-1"></div>
                                <div>
                                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider mb-1 px-2">Status Klaim</p>
                                    <button onclick="window.applyFilter('status', 'all')" class="filter-btn status-all w-full text-left px-3 py-1.5 text-xs text-white bg-zinc-800 rounded-lg transition-colors">Semua Status</button>
                                    <button onclick="window.applyFilter('status', 'PENDING')" class="filter-btn status-PENDING w-full text-left px-3 py-1.5 text-xs text-zinc-400 hover:text-white hover:bg-zinc-800/50 rounded-lg transition-colors text-amber-400">Reviewing (Pending)</button>
                                    <button onclick="window.applyFilter('status', 'APPROVED')" class="filter-btn status-APPROVED w-full text-left px-3 py-1.5 text-xs text-zinc-400 hover:text-white hover:bg-zinc-800/50 rounded-lg transition-colors text-blue-400">Disetujui</button>
                                    <button onclick="window.applyFilter('status', 'REJECTED')" class="filter-btn status-REJECTED w-full text-left px-3 py-1.5 text-xs text-zinc-400 hover:text-white hover:bg-zinc-800/50 rounded-lg transition-colors text-red-400">Ditolak</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Grid Video Cards Dinamis -->
                <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 sm:gap-6" id="cards-container">
                    <p class="text-zinc-500 text-sm col-span-full">Memuat data...</p>
                </div>

                <!-- Alert Kosong -->
                <div id="no-data-alert" class="hidden text-center py-20">
                    <svg class="w-16 h-16 text-zinc-600 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <h3 class="text-xl font-bold text-white mb-2">Konten tidak ditemukan</h3>
                    <p class="text-zinc-500 text-sm">Coba ubah filter yang kamu pilih.</p>
                </div>

                <!-- Load More -->
                <div id="load-more-container" class="w-full flex justify-center mt-8 hidden">
                    <button onclick="window.loadMore()" class="bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 text-zinc-300 text-xs sm:text-sm font-semibold px-6 py-2.5 rounded-full transition-colors flex items-center gap-2 focus:outline-none">
                        Muat Lebih Banyak
                    </button>
                </div>
            </section>
        </div>
    </main>

    <!-- BOTTOM NAVBAR -->
    <script>const ACTIVE_MENU = 'klaim_views';</script>
    <script src="attribute/navbarclipper.js"></script>

    <!-- SCRIPT UTAMA -->
    <script type="module">
        import { supabase } from './authentication/auth.js';

        let sessionUser = null;
        let sessionFullName = 'Pengguna'; // Variabel untuk menyimpan nama user
        let submissionsData = [];
        
        let realEarnings = 0;
        let realWithdrawable = 0;
        let isSensorActive = false;

        function getCols() {
            const w = window.innerWidth;
            if (w >= 1280) return 4; 
            if (w >= 1024) return 3; 
            return 2;                
        }

        // Pagination & Filter States
        let currentFilter = { status: 'all', campaign_id: 'all', sort: 'newest' };
        let currentLimit = getCols() * 2;

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                alert("Silakan login.");
                window.location.replace('login.html');
                return;
            }
            sessionUser = session.user;

            // Fetch Nama Profil User dari Supabase
            try {
                const { data: profile } = await supabase.from('profiles').select('full_name').eq('id', sessionUser.id).single();
                if (profile && profile.full_name) {
                    sessionFullName = profile.full_name;
                } else if (sessionUser.user_metadata?.full_name) {
                    sessionFullName = sessionUser.user_metadata.full_name;
                }
            } catch(e) { console.log("Gagal memuat nama profil"); }

            // Load data paralel dengan error handling aman
            await Promise.all([
                loadUserStats(),
                loadSubmissions()
            ]);
        });

        // ==========================================
        // 1. STATS (Pendapatan & Penghitungan Status)
        // ==========================================
        async function loadUserStats() {
            try {
                const { data: stats } = await supabase.from('clipper_stats').select('*').eq('user_id', sessionUser.id).single();
                if (stats) {
                    realEarnings = stats.total_earnings || 0;
                    realWithdrawable = stats.withdrawable || 0;
                }
            } catch(e) { console.log("User stats mungkin belum ada."); }
            
            window.toggleSensor(true); 

            // Hitung status PENDING, APPROVED, REJECTED yang akurat
            try {
                const { data: subs } = await supabase.from('submissions').select('status, views_claimed').eq('user_id', sessionUser.id);
                let p = 0, a = 0, r = 0;
                if(subs) {
                    subs.forEach(s => {
                        if(s.status === 'PENDING') p++;
                        else if(s.status === 'APPROVED') a++;
                        else if(s.status === 'REJECTED') r++;
                    });
                }
                document.getElementById('pending-detail').innerText = p;
                document.getElementById('disetujui-detail').innerText = a;
                document.getElementById('ditolak-detail').innerText = r;
            } catch(e) { console.log("Gagal hitung status"); }
        }

        // ==========================================
        // 2. LOAD DATA SUBMISSIONS & CAMPAIGNS
        // ==========================================
        async function loadSubmissions() {
            try {
                const { data, error } = await supabase
                    .from('submissions')
                    .select(`
                        id, video_link, views_claimed, views_paid, earned, est_payout, status, reject_reason, created_at,
                        campaigns ( id, title, brand_name, budget_remaining, reward_per_1k, min_views, max_claim, payment_type, status, platforms, niche, type, banner_url, price_per_video )
                    `)
                    .eq('user_id', sessionUser.id);

                if (error) {
                    console.error("Supabase error:", error);
                    document.getElementById('cards-container').innerHTML = '<p class="text-red-500 text-sm col-span-full">Gagal terhubung ke database. Harap hubungi admin.</p>';
                    return;
                }

                submissionsData = data || [];
                
                // Build Campaign Filter Dropdown
                const campSet = new Set();
                let campOptionsHTML = `<div onclick="window.selectCampaign('all', 'Semua Campaign')" class="px-3 py-2 hover:bg-zinc-700 cursor-pointer text-xs text-white">Semua Campaign</div>`;
                
                submissionsData.forEach(sub => {
                    if(sub.campaigns && !campSet.has(sub.campaigns.id)) {
                        campSet.add(sub.campaigns.id);
                        const safeTitle = (sub.campaigns.title || 'Tanpa Judul').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                        campOptionsHTML += `<div onclick="window.selectCampaign('${sub.campaigns.id}', '${safeTitle}')" class="px-3 py-2 hover:bg-zinc-700 cursor-pointer text-xs text-white truncate border-t border-zinc-700/50" title="${safeTitle}">${sub.campaigns.title}</div>`;
                    }
                });
                document.getElementById('campaign-options').innerHTML = campOptionsHTML;

                applyFilters();

            } catch(err) {
                console.error("JS Error in loadSubmissions:", err);
                document.getElementById('cards-container').innerHTML = '<p class="text-red-500 text-sm col-span-full">Gagal memuat data.</p>';
            }
        }

        // ==========================================
        // 3. LOGIKA RENDER & SMART THUMBNAIL
        // ==========================================
        function getVideoMeta(url) {
            url = url || '';
            let platHTML = `<svg class="w-3 h-3 sm:w-4 sm:h-4 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>`;
            // Gambar Fallback Elegan
            let thumbUrl = 'https://placehold.co/400x600/121214/27272a?text=Memuat+Video...';
            
            if (url.includes('tiktok.com')) {
                platHTML = `<svg class="w-3 h-3 sm:w-4 sm:h-4 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.1z"/></svg>`;
                thumbUrl = 'https://placehold.co/400x600/121214/27272a?text=Memuat+TikTok...';
            } else if (url.includes('instagram.com')) {
                platHTML = `<svg class="w-3 h-3 sm:w-4 sm:h-4 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.88z"/></svg>`;
                thumbUrl = 'https://placehold.co/400x600/121214/27272a?text=Memuat+Reels...';
            } else if (url.match(/(?:youtu\.be\/|youtube\.com\/)/)) {
                platHTML = `<svg class="w-3 h-3 sm:w-4 sm:h-4 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`;
                let ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))((\w|-){11})/);
                if (ytMatch && ytMatch[1]) thumbUrl = `https://img.youtube.com/vi/${ytMatch[1]}/hqdefault.jpg`;
            }
            return { platHTML, thumbUrl };
        }

        function generateCard(sub, index) {
            const camp = sub.campaigns || { id: '', title: 'Campaign Dihapus', brand_name: '-', status: 'CLOSED', budget_remaining: 0, niche: '-', payment_type: 'views', reward_per_1k: 0, price_per_video: 0 };
            const meta = getVideoMeta(sub.video_link);
            const dateStr = new Date(sub.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
            
            const viewsClaimed = sub.views_claimed || 0;
            const uiViews = viewsClaimed > 0 ? viewsClaimed.toLocaleString('id-ID') : '-';
            const uiEarned = sub.earned > 0 ? 'Rp ' + sub.earned.toLocaleString('id-ID') : '-';
            
            let realStatus = sub.status || 'PENDING';
            
            // Boolean State Logics untuk menentukan Tampilan UI
            let isBrandReview   = (realStatus === 'PENDING' && viewsClaimed === 0);
            let isBrandRejected = (realStatus === 'REJECTED' && viewsClaimed === 0);
            let isBrandApproved = (realStatus === 'APPROVED' && viewsClaimed === 0);
            let isClaimReview   = (realStatus === 'PENDING' && viewsClaimed > 0);
            let isClaimRejected = (realStatus === 'REJECTED' && viewsClaimed > 0);
            let isClaimApproved = (realStatus === 'APPROVED' && viewsClaimed > 0);

            let actionArea = '';
            let badgeHTML = '';
            let cardOpacityClass = 'opacity-100';

            const isCampClosed = camp.status === 'CLOSED' || camp.budget_remaining <= 0;

            // ===================================
            // BLOCK 1: STATE REVIEW BRAND
            // ===================================
            if (isBrandReview) {
                badgeHTML = `<div class="absolute top-2 right-2 z-20 bg-amber-500/90 text-white text-[7px] sm:text-[9px] font-bold px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-bl-lg rounded-tr-lg backdrop-blur">Review Brand</div>`;
                actionArea = `
                    <button disabled class="w-full bg-amber-500/10 border border-amber-500/50 text-amber-500 font-bold text-[10px] sm:text-xs py-2 sm:py-2.5 rounded-lg cursor-not-allowed flex items-center justify-center gap-1.5 leading-tight">
                        <svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        Menunggu ACC Brand
                    </button>`;
            } 
            // ===================================
            // BLOCK 2: STATE DITOLAK BRAND
            // ===================================
            else if (isBrandRejected) {
                cardOpacityClass = 'opacity-70 border-red-900/30';
                badgeHTML = `<div class="absolute top-2 right-2 z-20 bg-red-500/90 text-white text-[7px] sm:text-[9px] font-bold px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-bl-lg rounded-tr-lg backdrop-blur">Ditolak Brand</div>`;
                actionArea = `
                    <div class="p-2 bg-red-500/10 border border-red-500/20 rounded-lg mb-2">
                        <p class="text-[9px] sm:text-[10px] text-red-400 font-medium leading-tight"><b>Ditolak Brand:</b> ${sub.reject_reason || 'Video tidak sesuai kriteria/brief.'}</p>
                    </div>
                    <button disabled class="w-full bg-zinc-800 text-zinc-500 font-bold text-[10px] sm:text-xs py-2 sm:py-2.5 rounded-lg cursor-not-allowed">Video Ditolak</button>`;
            }
            // ===================================
            // BLOCK 3: STATE REVIEW ADMIN (Klaim)
            // ===================================
            else if (isClaimReview) {
                badgeHTML = `<div class="absolute top-2 right-2 z-20 bg-amber-500/90 text-white text-[7px] sm:text-[9px] font-bold px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-bl-lg rounded-tr-lg backdrop-blur">Review Admin</div>`;
                actionArea = `
                    <div class="flex gap-1.5 sm:gap-2">
                        <input type="text" value="${viewsClaimed.toLocaleString('id-ID')}" disabled class="w-full bg-zinc-900/50 border border-zinc-800 rounded-lg px-2 py-1.5 sm:px-3 sm:py-2 text-[10px] sm:text-xs font-medium text-zinc-500 cursor-not-allowed text-center">
                    </div>
                    <button disabled class="w-full bg-amber-500/10 border border-amber-500/50 text-amber-500 font-bold text-[10px] sm:text-xs py-2 sm:py-2.5 rounded-lg cursor-not-allowed flex items-center justify-center flex-col leading-tight">
                        <span>Reviewing Claim...</span>
                        <span class="text-[8px] font-medium text-amber-500/70">Est: Rp ${(sub.est_payout||0).toLocaleString('id-ID')}</span>
                    </button>`;
            } 
            // ===================================
            // BLOCK 4: STATE DITOLAK ADMIN (Klaim)
            // ===================================
            else if (isClaimRejected) {
                cardOpacityClass = 'opacity-80 border-red-900/50';
                badgeHTML = `<div class="absolute top-2 right-2 z-20 bg-red-500/90 text-white text-[7px] sm:text-[9px] font-bold px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-bl-lg rounded-tr-lg backdrop-blur">Klaim Ditolak</div>`;
                actionArea = `
                    <div class="p-2 bg-red-500/10 border border-red-500/20 rounded-lg mb-2">
                        <p class="text-[9px] sm:text-[10px] text-red-400 font-medium leading-tight"><b>Ditolak Admin:</b> ${sub.reject_reason || 'Bukti views tidak valid atau melanggar aturan.'}</p>
                    </div>
                    <input type="number" id="input-${sub.id}" placeholder="Masukkan views yang benar" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-lg px-2 py-1.5 sm:px-3 sm:py-2 text-[10px] sm:text-xs font-medium text-white outline-none transition-colors text-center mb-2">
                    <button onclick="window.claimViews('${sub.id}')" class="w-full bg-white text-black font-bold text-[10px] sm:text-xs py-2 sm:py-2.5 rounded-lg hover:bg-zinc-200 transition-colors">Ajukan Ulang Klaim</button>`;
            }
            // ===================================
            // BLOCK 5: NORMAL / ACC (Siap Klaim Baru / Klaim Update)
            // ===================================
            else {
                const paidViews = sub.views_paid || 0;
                let placeholder = paidViews > 0 ? `> ${paidViews.toLocaleString('id-ID')}` : 'Jml views asli';
                let warningText = '';
                
                // Overriding Badges
                if(isCampClosed) {
                    badgeHTML = `<div class="absolute top-2 right-2 z-20 bg-red-500/90 text-white text-[7px] sm:text-[9px] font-bold px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-bl-lg rounded-tr-lg backdrop-blur">Closed</div>`;
                    warningText = `<p class="text-[8px] text-zinc-500 mb-1 leading-tight text-center">Budget habis/Closed. Cuma bisa update views.</p>`;
                } else if (isClaimApproved) {
                    badgeHTML = `<div class="absolute top-2 right-2 z-20 bg-blue-500/90 text-white text-[7px] sm:text-[9px] font-bold px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-bl-lg rounded-tr-lg backdrop-blur flex items-center gap-1"><svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg> Cair</div>`;
                } else if (isBrandApproved) {
                    badgeHTML = `<div class="absolute top-2 right-2 z-20 bg-green-500/90 text-white text-[7px] sm:text-[9px] font-bold px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-bl-lg rounded-tr-lg backdrop-blur flex items-center gap-1"><svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg> ACC Brand</div>`;
                }

                actionArea = `
                    ${warningText}
                    <div class="flex gap-1.5 sm:gap-2">
                        <input type="number" id="input-${sub.id}" placeholder="${placeholder}" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-lg px-2 py-1.5 sm:px-3 sm:py-2 text-[10px] sm:text-xs font-medium text-white outline-none transition-colors text-center">
                    </div>
                    <button onclick="window.claimViews('${sub.id}')" class="w-full bg-white text-black font-bold text-[10px] sm:text-sm py-2 sm:py-2.5 rounded-lg hover:bg-zinc-200 flex items-center justify-center gap-1.5 sm:gap-2 focus:outline-none transition-colors">
                        ${paidViews > 0 ? 'Klaim Update Views' : 'Klaim Views'} <svg class="w-3 h-3 sm:w-3.5 sm:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>`;
            }

            return `
            <div class="bg-cardBg border border-zinc-800 rounded-2xl overflow-hidden hover:border-zinc-500 transition-all duration-300 flex flex-col group ${cardOpacityClass}">
                <div class="relative w-full h-24 sm:h-36 bg-zinc-900 overflow-hidden shrink-0">
                    ${badgeHTML}
                    <img id="thumb-${sub.id}" src="${meta.thumbUrl}" class="w-full h-full object-cover opacity-80 group-hover:scale-105 transition-transform duration-500">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent z-0"></div>
                    <div class="absolute top-2 left-2 sm:top-3 sm:left-3 bg-white/10 backdrop-blur-md border border-white/20 p-1 sm:p-1.5 rounded-lg z-10">
                        ${meta.platHTML}
                    </div>
                    <div class="absolute bottom-2 left-2 right-2 sm:bottom-3 sm:left-3 sm:right-3 overflow-hidden z-10">
                        <h4 class="text-[11px] sm:text-sm font-bold text-white truncate" title="${camp.title}">${camp.title}</h4>
                        <p class="text-[8px] sm:text-[9px] text-zinc-400 mt-0.5 truncate w-full" title="By ${sessionFullName}">${dateStr} • By ${sessionFullName}</p>
                    </div>
                </div>
                
                <a href="${sub.video_link}" target="_blank" class="bg-zinc-900 border-b border-zinc-800 py-1.5 sm:py-2 flex justify-center items-center gap-1.5 text-[9px] sm:text-xs text-zinc-400 hover:text-white transition-colors focus:outline-none">
                    <svg class="w-3 h-3 sm:w-3.5 sm:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    Lihat Video Link
                </a>
                
                <div class="p-2 sm:p-4 flex-1 flex flex-col justify-between">
                    <div class="flex justify-between items-center mb-3 sm:mb-4 bg-black/40 rounded-lg p-1.5 sm:p-2.5 border border-zinc-800/50">
                        <div>
                            <p class="text-[7px] sm:text-[9px] text-zinc-500 font-bold uppercase tracking-wider mb-0.5">Klaim</p>
                            <p class="text-[10px] sm:text-sm font-bold text-white">${uiViews}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[7px] sm:text-[9px] text-zinc-500 font-bold uppercase tracking-wider mb-0.5">Telah Cair</p>
                            <p class="text-[10px] sm:text-sm font-bold ${sub.earned > 0 ? 'text-emerald-400' : 'text-zinc-500'}">${uiEarned}</p>
                        </div>
                    </div>
                    
                    <div class="mt-auto space-y-2">
                        ${actionArea}
                    </div>
                </div>
            </div>`;
        }

        function applyFilters() {
            const grid = document.getElementById('cards-container');
            const alertBox = document.getElementById('no-data-alert');
            const loadMoreContainer = document.getElementById('load-more-container');
            
            grid.innerHTML = '';

            let filtered = submissionsData.filter(sub => {
                let realStatus = sub.status || 'PENDING';
                
                const campId = sub.campaigns ? sub.campaigns.id : null;
                const matchCamp = currentFilter.campaign_id === 'all' || campId === currentFilter.campaign_id;
                const matchStatus = currentFilter.status === 'all' || realStatus === currentFilter.status;
                
                return matchCamp && matchStatus;
            });

            // Sort logic
            if (currentFilter.sort === 'oldest') {
                filtered.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
            } else { 
                filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
            }

            if (filtered.length === 0) {
                alertBox.classList.remove('hidden');
                loadMoreContainer.classList.add('hidden');
                return;
            } else {
                alertBox.classList.add('hidden');
            }

            let html = '';
            const toRender = filtered.slice(0, currentLimit);
            toRender.forEach((sub, i) => {
                html += generateCard(sub, i);
            });
            grid.innerHTML = html;

            if (filtered.length > currentLimit) {
                loadMoreContainer.classList.remove('hidden');
            } else {
                loadMoreContainer.classList.add('hidden');
            }

            // Jalankan Ekstraksi Thumbnail Asli di latar belakang secara Async
            window.loadThumbnails(toRender);
        }

        // FUNGSI TARIK THUMBNAIL DINAMIS (Microlink API & TikWM)
        window.loadThumbnails = async function(items) {
            for (let sub of items) {
                const imgEl = document.getElementById(`thumb-${sub.id}`);
                if (!imgEl || imgEl.getAttribute('data-loaded') === 'true') continue;
                
                const url = sub.video_link;
                if (!url) continue;

                if (url.match(/(?:youtu\.be\/|youtube\.com\/)/)) {
                    imgEl.setAttribute('data-loaded', 'true');
                    continue;
                }

                try {
                    const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                    const json = await res.json();
                    
                    if (json.status === 'success' && json.data && json.data.image && json.data.image.url) {
                        imgEl.src = json.data.image.url;
                        imgEl.setAttribute('data-loaded', 'true');
                    } else if (url.includes('tiktok.com')) {
                        const tkRes = await fetch(`https://www.tikwm.com/api/?url=${url}`);
                        const tkJson = await tkRes.json();
                        if (tkJson.data && tkJson.data.cover) {
                            imgEl.src = tkJson.data.cover;
                            imgEl.setAttribute('data-loaded', 'true');
                        }
                    }
                } catch(e) { 
                    console.log("Gagal memuat thumbnail asli untuk:", url); 
                }
            }
        };

        // ==========================================
        // 4. LOGIKA KLAIM MATEMATIS & SUPABASE
        // ==========================================
        window.claimViews = async function(subId) {
            const inputEl = document.getElementById(`input-${subId}`);
            if(!inputEl) return;
            
            const newClaimStr = inputEl.value.trim();
            if (!newClaimStr) return alert("Masukkan jumlah views yang valid.");
            
            const newClaimViews = parseInt(newClaimStr);
            if (isNaN(newClaimViews) || newClaimViews <= 0) return alert("Jumlah views harus lebih dari 0.");

            const sub = submissionsData.find(s => s.id === subId);
            if (!sub) return alert("Data tidak ditemukan.");

            const camp = sub.campaigns;
            
            const maxPrevViews = Math.max(sub.views_paid || 0, sub.views_claimed || 0);
            if (newClaimViews <= maxPrevViews && sub.status === 'APPROVED' && maxPrevViews > 0) {
                return alert(`Views baru harus lebih besar dari views yang sudah disetujui sebelumnya (${maxPrevViews.toLocaleString('id-ID')}).`);
            }

            let estPayout = 0;
            const isClosed = camp.status === 'CLOSED' || camp.budget_remaining <= 0;

            if (!isClosed) {
                if (camp.payment_type === 'views') {
                    const cpm = camp.reward_per_1k || 0;
                    const minViews = camp.min_views || 10000;
                    const maxClaim = camp.max_claim || 250000;

                    let effectiveViews = newClaimViews > maxClaim ? maxClaim : newClaimViews;
                    
                    let rate = cpm;
                    if (effectiveViews < minViews) {
                        rate = cpm * 0.25; 
                    }

                    let totalExpectedEarnings = Math.floor((effectiveViews / 1000) * rate);

                    let previouslyEarned = sub.earned || 0;
                    estPayout = totalExpectedEarnings - previouslyEarned;

                    if (estPayout < 0) estPayout = 0;

                    if (estPayout > camp.budget_remaining) {
                        estPayout = camp.budget_remaining;
                    }
                } else if (camp.payment_type === 'video') {
                    let previouslyEarned = sub.earned || 0;
                    let totalExpectedEarnings = camp.price_per_video || 0;
                    
                    estPayout = totalExpectedEarnings - previouslyEarned;
                    
                    if (estPayout < 0) estPayout = 0;
                    if (estPayout > camp.budget_remaining) estPayout = camp.budget_remaining;
                }
            }

            const confirmMsg = `Request klaim sebesar ${newClaimViews.toLocaleString('id-ID')} views.\nEstimasi Pendapatan: Rp ${estPayout.toLocaleString('id-ID')}\n\nApakah Anda yakin ingin melanjutkan?`;
            if (!confirm(confirmMsg)) return;

            inputEl.disabled = true;

            const { error } = await supabase
                .from('submissions')
                .update({
                    views_claimed: newClaimViews,
                    est_payout: estPayout,
                    status: 'PENDING',
                    reject_reason: null
                })
                .eq('id', subId);

            if (error) {
                alert("Gagal melakukan klaim: " + error.message);
                inputEl.disabled = false;
            } else {
                alert("Berhasil mengajukan klaim. Menunggu review Admin/Brand.");
                await loadSubmissions(); 
            }
        };

        // ==========================================
        // 5. GLOBAL UI BINDINGS
        // ==========================================
        window.toggleSelect = function(id) {
            document.querySelectorAll('.custom-select-options').forEach(el => { if(el.id !== id) el.classList.add('hidden'); });
            document.getElementById(id).classList.toggle('hidden');
        };

        window.selectCampaign = function(id, title) {
            currentFilter.campaign_id = id;
            document.getElementById('campaign-selected-text').innerText = title;
            document.getElementById('campaign-options').classList.add('hidden');
            currentLimit = getCols() * 2; 
            applyFilters();
        };

        window.toggleFilter = function() {
            document.getElementById('filter-dropdown').classList.toggle('hidden');
            document.getElementById('filter-dropdown').classList.toggle('flex');
        };

        window.applyFilter = function(type, value) {
            currentFilter[type] = value;
            document.querySelectorAll(`.filter-btn[class*="${type}-"]`).forEach(btn => {
                if (btn.classList.contains(`${type}-${value}`)) {
                    btn.classList.add('bg-zinc-800', 'text-white');
                    btn.classList.remove('text-zinc-400', 'hover:bg-zinc-800/50', 'text-amber-400', 'text-blue-400', 'text-red-400');
                } else {
                    btn.classList.remove('bg-zinc-800', 'text-white');
                    btn.classList.add('text-zinc-400', 'hover:bg-zinc-800/50');
                    if(btn.classList.contains('status-PENDING')) btn.classList.add('text-amber-400');
                    if(btn.classList.contains('status-APPROVED')) btn.classList.add('text-blue-400');
                    if(btn.classList.contains('status-REJECTED')) btn.classList.add('text-red-400');
                }
            });
            document.getElementById('filter-dropdown').classList.add('hidden');
            document.getElementById('filter-dropdown').classList.remove('flex');
            currentLimit = getCols() * 2;
            applyFilters();
        };

        window.loadMore = function() {
            currentLimit += getCols() * 2;
            applyFilters();
        };

        // Sensor
        window.toggleSensor = function(silent = false) {
            if(!silent) isSensorActive = !isSensorActive;
            const totalElement = document.getElementById('total-pendapatan');
            const saldoElement = document.getElementById('saldo-detail');
            const iconElement = document.getElementById('eye-icon');

            if (isSensorActive) {
                totalElement.innerText = 'Rp ••••••';
                saldoElement.innerText = 'Rp ••••';
                iconElement.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>`;
            } else {
                totalElement.innerText = 'Rp ' + realEarnings.toLocaleString('id-ID');
                saldoElement.innerText = 'Rp ' + realWithdrawable.toLocaleString('id-ID');
                iconElement.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
            }
        };

        document.addEventListener('click', (e) => {
            const selContainer = document.querySelector('.custom-select-container');
            const filtContainer = document.getElementById('filter-container');
            
            if (selContainer && !selContainer.contains(e.target)) {
                document.querySelectorAll('.custom-select-options').forEach(el => el.classList.add('hidden'));
            }
            if (filtContainer && !filtContainer.contains(e.target)) {
                const fd = document.getElementById('filter-dropdown');
                if(fd) { fd.classList.add('hidden'); fd.classList.remove('flex'); }
            }
        });
    </script>
</body>
