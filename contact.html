<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Panggil file Header & Footer -->
    <script src="attribute/header.js"></script>
    <script src="attribute/footer.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0c; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* Jaring-jaring distribusi menyebar */
        @keyframes flowOut {
            0% { stroke-dashoffset: 1000; opacity: 0; }
            20% { opacity: 1; }
            80% { stroke-dashoffset: 0; opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }
        .viral-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: flowOut 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            fill: none;
            stroke-width: 1.5;
        }

        /* Titik/Node yang berdenyut (Kreator/Views) */
        @keyframes pulse-node {
            0%, 100% { transform: scale(1); opacity: 0.3; box-shadow: 0 0 0 rgba(255,255,255,0); }
            50% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 15px rgba(255,255,255,0.8); }
        }
        .blip-node {
            animation: pulse-node 2.5s infinite;
        }

        /* Gelombang jangkauan (Ripple) */
        @keyframes ripple {
            0% { r: 10px; opacity: 0.8; stroke-width: 2; }
            100% { r: 350px; opacity: 0; stroke-width: 0.5; }
        }
        .ripple-circle {
            fill: none;
            stroke: #ffffff;
            animation: ripple 4s linear infinite;
        }

        /* Float effect untuk card mini */
        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .floating-card {
            animation: floatCard 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black">

    <!-- Memanggil Component Header -->
    <custom-header></custom-header>

    <!-- Main Content Contact -->
    <main class="pt-32 pb-24 px-6 max-w-[1200px] mx-auto min-h-screen flex flex-col">
        
        <!-- Header Text & Button Section (TETAP DIPERTAHANKAN) -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center w-full gap-8 mt-10 mb-16" data-aos="fade-up">
            <div class="max-w-xl">
                <h1 class="text-4xl md:text-5xl font-semibold tracking-tight mb-4">
                    For Brand <span class="text-zinc-500">Contact Us</span>
                </h1>
                <p class="text-zinc-400 text-sm md:text-base leading-relaxed">
                    Hubungi kami untuk buat campaign di Whoost dan mulai viral di media sosial.
                </p>
            </div>
            
            <div class="flex-shrink-0">
                <a href="mailto:hello@whoost.com" class="inline-flex items-center justify-center bg-white text-black px-8 py-3.5 rounded-xl font-bold text-sm hover:bg-zinc-200 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)] hover:shadow-[0_0_30px_rgba(255,255,255,0.2)] whitespace-nowrap">
                    Hubungi Kami Sekarang!
                </a>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- VIRAL DISTRIBUTION NETWORK VISUALIZATION   -->
        <!-- ========================================== -->
        <div class="w-full flex-1 min-h-[500px] md:min-h-[600px] relative rounded-[2.5rem] border border-zinc-800/50 bg-[#070709] overflow-hidden flex items-center justify-center group" data-aos="fade-up" data-aos-delay="200">
            
            <!-- Radial Glow di tengah (Brand/Campaign Core) -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-zinc-400/5 rounded-full blur-[100px] pointer-events-none transition-all duration-1000 group-hover:bg-zinc-400/10"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150px] h-[150px] bg-white/10 rounded-full blur-[50px] pointer-events-none"></div>

            <!-- SVG Data Node / Network Animation -->
            <svg viewBox="0 0 1000 600" class="w-full h-full object-cover pointer-events-none absolute inset-0">
                
                <defs>
                    <linearGradient id="gradOut" x1="50%" y1="50%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
                        <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
                    </linearGradient>
                    <linearGradient id="gradOut2" x1="50%" y1="50%" x2="0%" y2="0%">
                        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
                        <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
                    </linearGradient>
                    <linearGradient id="gradOut3" x1="50%" y1="50%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
                        <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
                    </linearGradient>
                    <linearGradient id="gradOut4" x1="50%" y1="50%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
                        <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
                    </linearGradient>
                    
                    <!-- Titik background -->
                    <pattern id="bgDots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
                        <circle cx="2" cy="2" r="1.5" fill="#ffffff" opacity="0.05" />
                    </pattern>
                </defs>

                <!-- Background Dots -->
                <rect width="1000" height="600" fill="url(#bgDots)" />

                <!-- RIPPLE EFFECT (MENGGAMBARKAN JANGKAUAN/REACH) -->
                <circle cx="500" cy="300" class="ripple-circle" style="animation-delay: 0s;" />
                <circle cx="500" cy="300" class="ripple-circle" style="animation-delay: 1.3s;" />
                <circle cx="500" cy="300" class="ripple-circle" style="animation-delay: 2.6s;" />

                <!-- GARIS DISTRIBUSI (DARI TENGAH MENYEBAR) -->
                <!-- Kanan Bawah -->
                <path d="M 500 300 Q 650 350 800 450" stroke="url(#gradOut)" class="viral-line" style="animation-delay: 0.2s;" />
                <path d="M 800 450 Q 850 500 920 480" stroke="url(#gradOut)" class="viral-line" style="animation-delay: 1.5s;" />
                
                <!-- Kiri Atas -->
                <path d="M 500 300 Q 300 200 150 150" stroke="url(#gradOut2)" class="viral-line" style="animation-delay: 0.7s;" />
                <path d="M 150 150 Q 100 100 80 200" stroke="url(#gradOut2)" class="viral-line" style="animation-delay: 2.1s;" />

                <!-- Kanan Atas -->
                <path d="M 500 300 Q 650 200 850 120" stroke="url(#gradOut3)" class="viral-line" style="animation-delay: 1.1s;" />
                <path d="M 850 120 Q 900 80 950 150" stroke="url(#gradOut3)" class="viral-line" style="animation-delay: 2.5s;" />

                <!-- Kiri Bawah -->
                <path d="M 500 300 Q 350 450 200 500" stroke="url(#gradOut4)" class="viral-line" style="animation-delay: 0.4s;" />
                <path d="M 200 500 Q 150 550 100 480" stroke="url(#gradOut4)" class="viral-line" style="animation-delay: 1.8s;" />

                <!-- Atas Tengah -->
                <path d="M 500 300 Q 520 180 480 80" stroke="url(#gradOut3)" class="viral-line" style="animation-delay: 1.4s;" />
                
                <!-- Bawah Tengah -->
                <path d="M 500 300 Q 480 420 550 550" stroke="url(#gradOut)" class="viral-line" style="animation-delay: 0.9s;" />


                <!-- TITIK/NODE KONEKSI (CREATORS & VIEWS) -->
                <!-- Inti (Campaign Brand) -->
                <circle cx="500" cy="300" r="10" fill="#ffffff" class="animate-pulse" />
                <circle cx="500" cy="300" r="4" fill="#000" />
                
                <!-- Node Level 1 -->
                <circle cx="800" cy="450" r="6" fill="#ffffff" class="blip-node" style="animation-delay: 0.2s;" />
                <circle cx="150" cy="150" r="5" fill="#ffffff" class="blip-node" style="animation-delay: 0.7s;" />
                <circle cx="850" cy="120" r="6" fill="#ffffff" class="blip-node" style="animation-delay: 1.1s;" />
                <circle cx="200" cy="500" r="5" fill="#ffffff" class="blip-node" style="animation-delay: 0.4s;" />
                <circle cx="480" cy="80"  r="4" fill="#ffffff" class="blip-node" style="animation-delay: 1.4s;" />
                <circle cx="550" cy="550" r="4" fill="#ffffff" class="blip-node" style="animation-delay: 0.9s;" />

                <!-- Node Level 2 (Bercabang lagi) -->
                <circle cx="920" cy="480" r="3" fill="#ffffff" opacity="0.6" class="blip-node" style="animation-delay: 1.5s;" />
                <circle cx="80" cy="200" r="3" fill="#ffffff" opacity="0.6" class="blip-node" style="animation-delay: 2.1s;" />
                <circle cx="950" cy="150" r="3" fill="#ffffff" opacity="0.6" class="blip-node" style="animation-delay: 2.5s;" />
                <circle cx="100" cy="480" r="3" fill="#ffffff" opacity="0.6" class="blip-node" style="animation-delay: 1.8s;" />

                <!-- Ornamen Garis Putus-putus abstrak -->
                <circle cx="500" cy="300" r="150" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4 8" opacity="0.2" class="animate-[spin_20s_linear_infinite]" />
                <circle cx="500" cy="300" r="220" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="2 10" opacity="0.1" class="animate-[spin_30s_linear_infinite_reverse]" />
            </svg>

            <!-- ============================================== -->
            <!-- UI CARDS MELAYANG (MENAMBAH KESAN DASHBOARD) -->
            <!-- ============================================== -->
            
            <!-- Card 1: Reach Tracker (Atas Kiri) -->
            <div class="absolute top-[15%] left-[10%] bg-black/60 backdrop-blur-md border border-zinc-700/50 rounded-2xl p-4 flex items-center gap-4 floating-card shadow-xl" style="animation-delay: 0s;">
                <div class="w-10 h-10 rounded-full bg-zinc-800/80 border border-zinc-600 flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider mb-0.5">Total Reach</p>
                    <p class="text-xl font-black text-white">2.4M+</p>
                </div>
            </div>

            <!-- Card 2: Status (Kanan Tengah) -->
            <div class="absolute top-[45%] right-[8%] bg-black/60 backdrop-blur-md border border-zinc-700/50 rounded-2xl p-3 px-5 flex items-center gap-3 floating-card shadow-xl" style="animation-delay: -2s;">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-white"></span>
                </span>
                <span class="text-sm font-bold text-white tracking-widest uppercase">VIRAL</span>
            </div>

            <!-- Card 3: Creators (Bawah Kiri) -->
            <div class="absolute bottom-[20%] left-[15%] bg-black/60 backdrop-blur-md border border-zinc-700/50 rounded-2xl p-4 flex items-center gap-4 floating-card shadow-xl" style="animation-delay: -4s;">
                <div class="w-10 h-10 rounded-full bg-zinc-800/80 border border-zinc-600 flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider mb-0.5">Active Clippers</p>
                    <p class="text-xl font-black text-white">428</p>
                </div>
            </div>

        </div>

    </main>

    <!-- Memanggil Component Footer -->
    <custom-footer></custom-footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            once: true,
            offset: 50,
            duration: 800
        });
    </script>
</body>
</html>
