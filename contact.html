<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Panggil file Header & Footer -->
    <script src="attribute/header.js"></script>
    <script src="attribute/footer.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0c; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* Animation for the Network / Map Lines */
        @keyframes drawAndFadeMap {
            0% { stroke-dashoffset: 1000; opacity: 0; }
            15% { opacity: 1; }
            70% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }
        .premium-line-map {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawAndFadeMap 3.5s ease-in-out infinite;
            fill: none;
            stroke-width: 2;
        }
        
        @keyframes pulse-dot-map {
            0%, 100% { transform: scale(1); opacity: 0.3; box-shadow: 0 0 0 rgba(255,255,255,0); }
            50% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 15px rgba(255,255,255,0.8); }
        }
        .blip-map {
            animation: pulse-dot-map 2s infinite;
        }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black">

    <!-- Memanggil Component Header -->
    <custom-header></custom-header>

    <!-- Main Content Contact -->
    <main class="pt-40 pb-24 px-6 max-w-[1400px] mx-auto min-h-screen flex flex-col">
        
        <!-- Header Text & Button Section -->
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end gap-10 mb-12" data-aos="fade-up">
            <div class="max-w-2xl">
                <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 leading-tight">
                    For Brand <br>
                    <span class="text-zinc-500">Contact Us</span>
                </h1>
                <p class="text-lg text-zinc-400 leading-relaxed max-w-lg">
                    Hubungi kami untuk merancang campaign eksklusif di Whoost dan mulai viralkan brand Anda melalui ribuan kreator ahli di seluruh pelosok Indonesia.
                </p>
            </div>
            
            <!-- Ganti mailto: email dengan email asli atau link wa.me Anda -->
            <a href="mailto:hello@whoost.com" class="inline-flex items-center gap-2 bg-white text-black px-10 py-4 rounded-xl font-bold text-lg hover:bg-zinc-200 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,255,255,0.15)] hover:shadow-[0_0_30px_rgba(255,255,255,0.3)] whitespace-nowrap group">
                Hubungi Kami Sekarang!
                <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </a>
        </div>

        <!-- ========================================== -->
        <!-- INDONESIA DOT-MATRIX MAP ANIMATION         -->
        <!-- ========================================== -->
        <div class="w-full flex-1 min-h-[500px] md:min-h-[650px] relative rounded-[3rem] border border-zinc-800/60 bg-[#070709] overflow-hidden flex items-center justify-center mt-8 group" data-aos="fade-up" data-aos-delay="200">
            
            <!-- Glow background terpusat di Jakarta -->
            <div class="absolute top-[60%] left-[30%] w-72 h-72 bg-white/5 rounded-full blur-[100px] pointer-events-none"></div>

            <!-- SVG Animated Map -->
            <svg viewBox="0 0 1000 500" class="w-full h-full object-contain opacity-80 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none px-4">
                
                <defs>
                    <!-- Gradient untuk garis jaringan -->
                    <linearGradient id="mapGrad1" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
                        <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
                    </linearGradient>
                    <linearGradient id="mapGrad2" x1="0%" y1="100%" x2="100%" y2="50%">
                        <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
                        <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
                    </linearGradient>

                    <!-- Pola Titik (Dot Matrix) untuk Peta -->
                    <pattern id="dotMatrix" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
                        <circle cx="3" cy="3" r="2" fill="#3f3f46" opacity="0.6"/>
                    </pattern>
                </defs>

                <!-- BASE MAP: LOW-POLY INDONESIA -->
                <g fill="url(#dotMatrix)" stroke="rgba(255,255,255,0.02)" stroke-width="1">
                    <!-- Sumatra -->
                    <path d="M 80 80 L 160 80 L 240 180 L 280 240 L 240 280 L 170 210 L 100 120 Z" />
                    <!-- Jawa -->
                    <path d="M 250 300 L 320 290 L 400 310 L 450 330 L 380 340 L 280 330 Z" />
                    <!-- Kalimantan -->
                    <path d="M 320 100 L 440 90 L 490 160 L 450 230 L 350 220 L 310 160 Z" />
                    <!-- Sulawesi -->
                    <path d="M 500 150 L 560 130 L 580 180 L 540 200 L 560 280 L 520 270 L 510 210 L 470 220 L 480 180 Z" />
                    <!-- Bali & Nusa Tenggara -->
                    <path d="M 470 340 L 550 340 L 620 350 L 600 360 L 480 360 Z" />
                    <!-- Maluku -->
                    <path d="M 610 180 L 650 150 L 670 240 L 630 250 Z" />
                    <!-- Papua -->
                    <path d="M 680 200 L 850 180 L 920 220 L 940 270 L 860 290 L 800 260 L 750 270 L 700 240 Z" />
                </g>

                <!-- ==================================== -->
                <!-- NETWORK ANIMATION (BERPUSAT DI JAWA) -->
                <!-- ==================================== -->

                <!-- Titik Pusat / HQ (Jakarta / Jawa Barat) -->
                <circle cx="300" cy="310" r="5" fill="#ffffff" class="animate-pulse" />
                <circle cx="300" cy="310" r="24" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" class="animate-ping" style="animation-duration: 3s;" />
                
                <!-- Jalur ke Sumatera (Medan) -->
                <path d="M 300 310 Q 180 250 130 100" stroke="url(#mapGrad1)" class="premium-line-map" style="animation-delay: 0.2s;" />
                <circle cx="130" cy="100" r="4" fill="#ffffff" opacity="0.8" class="blip-map"/>
                <circle cx="130" cy="100" r="2" fill="#000"/>

                <!-- Jalur ke Kalimantan (Balikpapan) -->
                <path d="M 300 310 Q 320 200 420 180" stroke="url(#mapGrad2)" class="premium-line-map" style="animation-delay: 1.5s;" />
                <circle cx="420" cy="180" r="3" fill="#ffffff" opacity="0.8" class="blip-map" style="animation-delay: 1.5s;"/>

                <!-- Jalur ke Sulawesi (Makassar) -->
                <path d="M 300 310 Q 420 220 520 250" stroke="url(#mapGrad1)" class="premium-line-map" style="animation-delay: 0.8s;" />
                <circle cx="520" cy="250" r="4" fill="#ffffff" opacity="0.9" class="blip-map" style="animation-delay: 0.8s;"/>
                <circle cx="520" cy="250" r="1.5" fill="#000"/>

                <!-- Jalur ke Papua (Jayapura) -->
                <path d="M 300 310 Q 550 50 880 210" stroke="url(#mapGrad1)" class="premium-line-map" style="animation-delay: 2.1s;" />
                <circle cx="880" cy="210" r="4" fill="#ffffff" class="blip-map" style="animation-delay: 2.1s;"/>
                <circle cx="880" cy="210" r="2" fill="#000"/>

                <!-- Jalur ke Nusa Tenggara (Kupang) -->
                <path d="M 300 310 Q 450 300 590 345" stroke="url(#mapGrad2)" class="premium-line-map" style="animation-delay: 1.1s;" />
                <circle cx="590" cy="345" r="3" fill="#ffffff" opacity="0.7" class="blip-map" style="animation-delay: 1.1s;"/>
                
                <!-- Jalur Pendek ke Jawa Timur (Surabaya) -->
                <path d="M 300 310 Q 350 310 410 320" stroke="#ffffff" opacity="0.5" stroke-dasharray="4 4" fill="none" stroke-width="1.5" />
                <circle cx="410" cy="320" r="3" fill="#ffffff" opacity="0.6"/>

            </svg>
        </div>

    </main>

    <!-- Memanggil Component Footer -->
    <custom-footer></custom-footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            once: true,
            offset: 50,
            duration: 800
        });
    </script>
</body>
</html>
