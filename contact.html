<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Panggil file Header & Footer -->
    <script src="attribute/header.js"></script>
    <script src="attribute/footer.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0c; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black">

    <!-- Memanggil Component Header -->
    <custom-header></custom-header>

    <!-- Main Content Contact -->
    <main class="pt-32 pb-24 px-6 max-w-[1200px] mx-auto min-h-screen flex flex-col">
        
        <!-- Header Text & Button Section -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center w-full gap-8 mt-10 mb-16" data-aos="fade-up">
            <div class="max-w-xl">
                <h1 class="text-4xl md:text-5xl font-semibold tracking-tight mb-4">
                    For Brand <span class="text-zinc-500">Contact Us</span>
                </h1>
                <p class="text-zinc-400 text-sm md:text-base leading-relaxed">
                    Hubungi kami untuk buat campaign di Whoost dan mulai viral di media sosial.
                </p>
            </div>
            
            <div class="flex-shrink-0">
                <!-- Diubah menjadi button yang memanggil Pop-up -->
                <button onclick="window.showContactModal()" class="inline-flex items-center justify-center bg-white text-black px-8 py-3.5 rounded-xl font-bold text-sm hover:bg-zinc-200 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)] hover:shadow-[0_0_30px_rgba(255,255,255,0.2)] whitespace-nowrap focus:outline-none">
                    Hubungi Kami Sekarang!
                </button>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- MAP VISUALIZATION                          -->
        <!-- ========================================== -->
        <div class="w-full flex-1 min-h-[400px] md:min-h-[500px] relative rounded-[2.5rem] border border-zinc-800/50 bg-[#070709] overflow-hidden flex items-center justify-center group" data-aos="fade-up" data-aos-delay="200">
            
            <!-- Radial Glow di tengah -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-zinc-400/5 rounded-full blur-[100px] pointer-events-none transition-all duration-1000 group-hover:bg-zinc-400/10"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150px] h-[150px] bg-white/5 rounded-full blur-[50px] pointer-events-none"></div>

            <!-- Menggunakan Image Map.png -->
            <img src="asset/map.png" alt="Distribution Map" class="w-full h-full object-contain p-8 md:p-12 opacity-50 group-hover:opacity-80 transition-opacity duration-700 relative z-10 grayscale">
            
        </div>

    </main>

    <!-- Memanggil Component Footer -->
    <custom-footer></custom-footer>

    <!-- ========================================== -->
    <!-- CUSTOM CONTACT MODAL                       -->
    <!-- ========================================== -->
    <div id="contactModal" class="fixed inset-0 z-[9999] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 transition-opacity opacity-0">
        <div class="bg-cardBg border border-zinc-700 shadow-2xl rounded-2xl w-full max-w-sm p-6 text-center transform scale-95 transition-transform flex flex-col items-center" id="contactModalContent">
            
            <div class="w-16 h-16 bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            </div>
            
            <h3 class="text-xl font-bold text-white mb-2">Hubungi Kami</h3>
            <p class="text-[13px] text-zinc-400 mb-6 leading-relaxed">Pilih metode yang Anda inginkan untuk menghubungi tim support kami.</p>
            
            <div class="flex flex-col gap-3 w-full mb-5">
                <button onclick="window.contactVia('whatsapp')" class="w-full px-4 py-3 rounded-xl bg-[#25D366]/10 text-[#25D366] border border-[#25D366]/20 text-sm font-bold hover:bg-[#25D366]/20 transition-colors flex items-center justify-center gap-2 focus:outline-none">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    WhatsApp
                </button>
                <button onclick="window.contactVia('email')" class="w-full px-4 py-3 rounded-xl bg-white text-black border border-zinc-200 text-sm font-bold hover:bg-zinc-200 transition-colors flex items-center justify-center gap-2 focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    Email
                </button>
            </div>
            
            <button onclick="window.closeContactModal()" class="w-full px-4 py-2.5 rounded-xl border border-zinc-700 text-zinc-300 text-sm font-bold hover:bg-zinc-800 transition-colors focus:outline-none">Tutup</button>
        </div>
    </div>

    <!-- Scripts Data Supabase & Animasi -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        import { supabase } from './authentication/auth.js';

        let adminEmail = '';
        let adminWhatsapp = '';

        document.addEventListener('DOMContentLoaded', async () => {
            AOS.init({ once: true, offset: 50, duration: 800 });
            await fetchContactInfo();
        });

        // 1. Tarik Data Setting Contact dari Supabase
        async function fetchContactInfo() {
            try {
                const { data, error } = await supabase
                    .from('system_settings')
                    .select('support_email, support_whatsapp')
                    .limit(1)
                    .single();

                if (!error && data) {
                    adminEmail = data.support_email || '';
                    adminWhatsapp = data.support_whatsapp || '';
                }
            } catch (err) {
                console.error("Gagal mengambil data kontak", err);
            }
        }

        // 2. Fungsi Logika UI Modal
        window.showContactModal = function() {
            const m = document.getElementById('contactModal');
            const c = document.getElementById('contactModalContent');
            m.classList.remove('hidden'); m.classList.add('flex');
            setTimeout(() => { m.classList.remove('opacity-0'); c.classList.remove('scale-95'); }, 10);
        };

        window.closeContactModal = function() {
            const m = document.getElementById('contactModal');
            const c = document.getElementById('contactModalContent');
            m.classList.add('opacity-0'); c.classList.add('scale-95');
            setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300);
        };

        // 3. Fungsi Action URL Whatsapp / Email
        window.contactVia = function(method) {
            if (method === 'whatsapp') {
                if (!adminWhatsapp) {
                    alert('Nomor WhatsApp belum disetel oleh admin.');
                    return;
                }
                // Membersihkan nomor (menghapus huruf/spasi, merubah 0 awalan menjadi 62)
                let num = adminWhatsapp.replace(/\D/g, '');
                if (num.startsWith('0')) {
                    num = '62' + num.substring(1);
                }
                window.open(`https://wa.me/${num}`, '_blank');
            } else if (method === 'email') {
                if (!adminEmail) {
                    alert('Email belum disetel oleh admin.');
                    return;
                }
                window.location.href = `mailto:${adminEmail}`;
            }
            window.closeContactModal();
        };
    </script>
</body>
</html>
