<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Panggil file Header & Footer -->
    <script src="attribute/header.js"></script>
    <script src="attribute/footer.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0c; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* Animation for the Network / Map Lines */
        @keyframes drawLine {
            0% { stroke-dashoffset: 1000; opacity: 0; }
            10% { opacity: 1; }
            70% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }
        .network-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 4s ease-in-out infinite;
            fill: none;
            stroke-width: 1.5;
        }
        
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.5; box-shadow: 0 0 0 rgba(255,255,255,0); }
            50% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 15px rgba(255,255,255,0.8); }
        }
        .blip-node {
            animation: pulse-glow 2s infinite;
        }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black">

    <!-- Memanggil Component Header -->
    <custom-header></custom-header>

    <!-- Main Content Contact -->
    <main class="pt-32 pb-24 px-6 max-w-[1200px] mx-auto min-h-screen flex flex-col">
        
        <!-- Header Text & Button Section (Sesuai Referensi) -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center w-full gap-8 mt-10 mb-16" data-aos="fade-up">
            <div class="max-w-xl">
                <h1 class="text-4xl md:text-5xl font-semibold tracking-tight mb-4">
                    For Brand <span class="text-zinc-500">Contact Us</span>
                </h1>
                <p class="text-zinc-400 text-sm md:text-base leading-relaxed">
                    Hubungi kami untuk buat campaign di Whoost dan mulai viral di media sosial.
                </p>
            </div>
            
            <div class="flex-shrink-0">
                <!-- Ubah mailto: ke link tujuan kontak Anda (misal wa.me) -->
                <a href="mailto:hello@whoost.com" class="inline-flex items-center justify-center bg-white text-black px-8 py-3.5 rounded-xl font-bold text-sm hover:bg-zinc-200 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)] hover:shadow-[0_0_30px_rgba(255,255,255,0.2)] whitespace-nowrap">
                    Hubungi Kami Sekarang!
                </a>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- HIGH-DETAIL INDONESIA DOT-MATRIX MAP       -->
        <!-- ========================================== -->
        <div class="w-full flex-1 min-h-[500px] md:min-h-[600px] relative rounded-3xl overflow-hidden flex items-center justify-center group" data-aos="fade-up" data-aos-delay="200">
            
            <!-- Glow background terpusat di Jakarta -->
            <div class="absolute top-[65%] left-[30%] w-64 h-64 bg-white/5 rounded-full blur-[100px] pointer-events-none transition-opacity duration-1000 group-hover:bg-white/10"></div>

            <!-- SVG Animated Map -->
            <svg viewBox="0 0 1000 500" class="w-full h-full object-contain pointer-events-none px-2">
                
                <defs>
                    <!-- Gradient untuk garis jaringan -->
                    <linearGradient id="lineGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
                        <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
                    </linearGradient>

                    <!-- Pola Titik (Dot Matrix) mirip referensi -->
                    <pattern id="dotPattern" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
                        <circle cx="3" cy="3" r="2.5" fill="#4a4a52" />
                    </pattern>
                </defs>

                <!-- BASE MAP: DETAILED INDONESIA PATH -->
                <!-- Diisi dengan pola titik-titik (dot pattern) -->
                <g fill="url(#dotPattern)" opacity="0.8">
                    <!-- Sumatra -->
                    <path d="M 80,100 L 130,70 L 170,120 L 220,170 L 260,230 L 280,270 L 250,310 L 210,290 L 180,250 L 140,210 L 90,150 Z" />
                    <!-- Java -->
                    <path d="M 270,320 L 320,310 L 380,315 L 430,320 L 460,330 L 480,345 L 450,355 L 400,350 L 330,345 L 280,340 Z" />
                    <!-- Kalimantan -->
                    <path d="M 310,140 L 360,110 L 420,100 L 460,120 L 480,160 L 490,200 L 460,250 L 420,270 L 380,260 L 340,230 L 310,190 Z" />
                    <!-- Sulawesi (K-Shape) -->
                    <path d="M 490,160 L 530,140 L 550,170 L 520,180 L 580,190 L 570,220 L 520,210 L 560,270 L 530,280 L 500,240 L 480,290 L 460,270 L 480,220 Z" />
                    <!-- Nusa Tenggara & Bali -->
                    <path d="M 490,355 L 530,345 L 570,340 L 610,345 L 650,350 L 630,365 L 580,360 L 530,365 L 490,365 Z" />
                    <!-- Maluku -->
                    <path d="M 600,160 L 640,140 L 670,180 L 660,230 L 640,260 L 610,230 Z" />
                    <!-- Papua -->
                    <path d="M 680,180 L 720,140 L 760,170 L 820,150 L 900,170 L 950,220 L 930,270 L 850,290 L 780,260 L 730,250 L 700,210 Z" />
                </g>

                <!-- ==================================== -->
                <!-- NETWORK ANIMATION (CONNECTIONS)      -->
                <!-- ==================================== -->

                <!-- Titik Pusat (Jakarta) -->
                <circle cx="290" cy="325" r="4" fill="#ffffff" class="animate-pulse" />
                <circle cx="290" cy="325" r="15" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3" class="animate-ping" style="animation-duration: 2.5s;" />

                <!-- Jalur ke Sumatra -->
                <path d="M 290 325 Q 180 180 120 120" stroke="url(#lineGrad)" class="network-line" style="animation-delay: 0.1s;" />
                <circle cx="120" cy="120" r="3.5" fill="#ffffff" class="blip-node" style="animation-delay: 0.1s;" />
                
                <!-- Jalur ke Kalimantan -->
                <path d="M 290 325 Q 350 200 420 180" stroke="url(#lineGrad)" class="network-line" style="animation-delay: 1.2s;" />
                <circle cx="420" cy="180" r="3" fill="#ffffff" class="blip-node" style="animation-delay: 1.2s;" />

                <!-- Jalur ke Sulawesi -->
                <path d="M 290 325 Q 430 250 510 220" stroke="url(#lineGrad)" class="network-line" style="animation-delay: 0.6s;" />
                <circle cx="510" cy="220" r="3.5" fill="#ffffff" class="blip-node" style="animation-delay: 0.6s;" />

                <!-- Jalur ke Papua (Melengkung Jauh) -->
                <path d="M 290 325 Q 600 120 860 210" stroke="url(#lineGrad)" class="network-line" style="animation-delay: 1.8s;" />
                <circle cx="860" cy="210" r="3.5" fill="#ffffff" class="blip-node" style="animation-delay: 1.8s;" />

                <!-- Jalur ke Nusa Tenggara -->
                <path d="M 290 325 Q 450 310 590 350" stroke="url(#lineGrad)" class="network-line" style="animation-delay: 2.4s;" />
                <circle cx="590" cy="350" r="3" fill="#ffffff" class="blip-node" style="animation-delay: 2.4s;" />

                <!-- Jalur ke Jawa Timur (Titik Dekat) -->
                <path d="M 290 325 Q 360 320 440 340" stroke="url(#lineGrad)" class="network-line" style="animation-delay: 0.9s;" />
                <circle cx="440" cy="340" r="2.5" fill="#ffffff" class="blip-node" style="animation-delay: 0.9s;" />

            </svg>
        </div>

    </main>

    <!-- Memanggil Component Footer -->
    <custom-footer></custom-footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            once: true,
            offset: 50,
            duration: 800
        });
    </script>
</body>
</html>
