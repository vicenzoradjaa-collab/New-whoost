<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengajuan - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black h-screen flex overflow-hidden">

    <!-- ========================================== -->
    <!-- SIDEBAR (KIRI)                             -->
    <!-- ========================================== -->
    <aside id="sidebar" class="w-64 bg-cardBg border-r border-zinc-800 flex-shrink-0 hidden lg:flex flex-col relative z-20 transition-all duration-300 ease-in-out">
        
        <!-- Area Logo & Toggle Garis 3 -->
        <div id="sidebarHeader" class="h-24 flex items-center px-6 border-b border-zinc-800/50 overflow-hidden transition-all">
            <button onclick="toggleSidebar()" class="text-zinc-400 hover:text-white transition-colors focus:outline-none flex-shrink-0">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>

            <!-- Logo Wrapper -->
            <div id="sidebarLogo" class="ml-4 flex-shrink-0 transition-opacity duration-200">
                <img src="asset/logob.webp" alt="Whoost Logo" class="h-8 w-auto object-contain">
            </div>
        </div>

        <!-- Navigation Menu -->
        <nav id="sidebarNav" class="flex-1 overflow-y-auto py-8 px-4 space-y-2">
            <!-- Menu Inactive (Beranda) -->
            <a href="client-dashboard.html" class="nav-link flex items-center px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900/80 rounded-xl font-medium transition group">
                <svg class="w-6 h-6 flex-shrink-0 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="nav-text ml-3 text-[15px] whitespace-nowrap transition-opacity duration-200">Beranda</span>
            </a>
            
            <!-- Menu Active (Pengajuan) -->
            <a href="#" class="nav-link flex items-center px-4 py-3 bg-white text-black rounded-xl font-medium transition shadow-sm group">
                <svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span class="nav-text ml-3 text-[15px] whitespace-nowrap transition-opacity duration-200">Pengajuan</span>
            </a>
            
            <a href="#" class="nav-link flex items-center px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900/80 rounded-xl font-medium transition group">
                <svg class="w-6 h-6 flex-shrink-0 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                <span class="nav-text ml-3 text-[15px] whitespace-nowrap transition-opacity duration-200">Dompet</span>
            </a>
            
            <a href="#" class="nav-link flex items-center px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900/80 rounded-xl font-medium transition group">
                <svg class="w-6 h-6 flex-shrink-0 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                <span class="nav-text ml-3 text-[15px] whitespace-nowrap transition-opacity duration-200">Analitik</span>
            </a>
            
            <a href="#" class="nav-link flex items-center px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900/80 rounded-xl font-medium transition group mt-8">
                <svg class="w-6 h-6 flex-shrink-0 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="nav-text ml-3 text-[15px] whitespace-nowrap transition-opacity duration-200">Profil</span>
            </a>
        </nav>
    </aside>

    <!-- ========================================== -->
    <!-- MAIN CONTENT AREA                          -->
    <!-- ========================================== -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative bg-darkBg">
        
        <!-- Ornamen Background Halus -->
        <div class="absolute top-[-20%] right-[-10%] w-[50rem] h-[50rem] bg-zinc-800/5 rounded-full blur-[120px] pointer-events-none"></div>

        <!-- TOP BAR -->
        <header class="h-24 flex items-center justify-between px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md z-10">
            <!-- Title & Mobile Trigger -->
            <div class="flex items-center gap-5">
                <button class="lg:hidden text-zinc-400 hover:text-white transition-colors">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-2xl font-semibold tracking-tight">Pengajuan</h1>
            </div>
            
            <!-- Right Icons (Filter & Search) -->
            <div class="flex items-center gap-4">
                <button class="w-10 h-10 rounded-full flex items-center justify-center text-zinc-400 hover:text-white hover:bg-zinc-900 transition-colors">
                    <!-- Icon Adjustments / Filter -->
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                </button>
                <button class="w-10 h-10 rounded-full flex items-center justify-center text-zinc-400 hover:text-white hover:bg-zinc-900 transition-colors">
                    <!-- Icon Search -->
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
            </div>
        </header>

        <!-- SPLIT CONTENT AREA -->
        <div class="flex-1 flex overflow-hidden">
            
            <!-- KOLOM KIRI (Daftar Pengajuan) -->
            <div class="flex-1 flex flex-col border-r border-zinc-800/50 relative z-10 bg-darkBg/50">
                <!-- Tab Header -->
                <div class="px-6 py-4 border-b border-zinc-800/50 bg-cardBg">
                    <span class="text-[13px] font-medium text-white px-3 py-2 bg-zinc-800 rounded-lg">Konten Perlu Review</span>
                </div>

                <!-- Empty State Content List -->
                <div class="flex-1 flex flex-col items-center justify-center text-center p-8">
                    <!-- Icon Jam Pasir -->
                    <div class="w-20 h-20 mb-6 bg-zinc-900 border border-zinc-800 rounded-full flex items-center justify-center shadow-inner">
                        <svg class="w-8 h-8 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-semibold text-white mb-2">Tidak ada konten baru</h3>
                    <p class="text-[14px] text-zinc-500 max-w-xs">Konten baru dari creator akan otomatis muncul di sini.</p>
                </div>
            </div>

            <!-- KOLOM KANAN (Preview Konten) -->
            <div class="w-[350px] lg:w-[450px] hidden md:flex flex-col relative z-10 bg-cardBg/30">
                <div class="flex-1 flex flex-col items-center justify-center text-center p-8">
                    <!-- Icon Play Video -->
                    <div class="w-20 h-20 mb-6 bg-zinc-900 border border-zinc-800 rounded-full flex items-center justify-center shadow-inner">
                        <svg class="w-8 h-8 text-zinc-500 translate-x-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <h3 class="text-lg font-semibold text-white mb-2">Preview konten</h3>
                    <p class="text-[13px] text-zinc-500 max-w-[200px]">Pilih salah satu konten untuk melihat detailnya</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Script Javascript untuk Sidebar Toggle -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const sidebarHeader = document.getElementById('sidebarHeader');
            const logo = document.getElementById('sidebarLogo');
            const navTexts = document.querySelectorAll('.nav-text');
            const navLinks = document.querySelectorAll('.nav-link');

            if (sidebar.classList.contains('w-64')) {
                // Minimize
                sidebar.classList.replace('w-64', 'w-20');
                sidebarHeader.classList.remove('px-6');
                sidebarHeader.classList.add('justify-center');
                logo.classList.add('opacity-0');
                navTexts.forEach(t => t.classList.add('opacity-0'));

                navLinks.forEach(l => {
                    l.classList.remove('px-4');
                    l.classList.add('justify-center');
                });

                setTimeout(() => {
                    logo.classList.add('hidden');
                    navTexts.forEach(t => t.classList.add('hidden'));
                }, 200);

            } else {
                // Expand
                sidebar.classList.replace('w-20', 'w-64');
                sidebarHeader.classList.add('px-6');
                sidebarHeader.classList.remove('justify-center');

                logo.classList.remove('hidden');
                navTexts.forEach(t => t.classList.remove('hidden'));

                navLinks.forEach(l => {
                    l.classList.add('px-4');
                    l.classList.remove('justify-center');
                });
                
                setTimeout(() => {
                    logo.classList.remove('opacity-0');
                    navTexts.forEach(t => t.classList.remove('opacity-0'));
                }, 10);
            }
        }
    </script>
</body>
</html>
