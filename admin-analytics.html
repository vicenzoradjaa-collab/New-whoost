<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],

    <style>
        /* Mengunci body agar tidak double scroll. Scroll hanya pada <main> */
        * { -webkit-tap-highlight-color: transparent !important; outline: none; }
        html, body { background-color: #0a0a0c; color: white; font-family: 'Inter', sans-serif; height: 100dvh; margin: 0; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom Donut Chart Base */
        .donut-ring { stroke: #27272a; stroke-width: 3.5; fill: transparent; }
        .donut-segment { stroke: #22c55e; stroke-width: 3.5; fill: transparent; stroke-linecap: round; transition: stroke-dasharray 1s ease-in-out; }

</head>

    <!-- Memanggil Navbar Bawah -->
    <script>
        const ACTIVE_MENU = 'performa'; // Identifier menu aktif
    </script>
    <script src="attribute/navbaradmin.js"></script>

    <!-- LOGIKA SUPABASE & ANALYTICS -->
    <script type="module">
        import { supabase } from './authentication/auth.js';

        // State Data
        let allCampaigns = [];
        let allSubmissions = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Cek Sesi User (Admin)
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.replace('login.html');
                return;
            }

            // 2. Ambil data SELURUH Campaigns di Database (Karena ini Admin)
            const { data: campaignsData } = await supabase
                .from('campaigns')
                .select('*');
            
            if (campaignsData) allCampaigns = campaignsData;

            // 3. Populate Dropdown Filter (Dinamis dari db)
            const dropdownList = document.getElementById('dropdownListContainer');
            let dropdownHTML = `
                <div onclick="window.selectCampaign('all', 'Semua Campaign')" class="cursor-pointer px-3 py-2.5 text-xs sm:text-sm text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors flex items-center justify-between group border-b border-zinc-800/50">
                    <span class="truncate">Semua Campaign</span>
                    <svg class="w-4 h-4 text-green-400 shrink-0 ml-2" id="check-camp-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
            `;
            allCampaigns.forEach(c => {
                // Gunakan replace untuk menghindari bug kutip
                const safeTitle = c.title.replace(/'/g, "\\'");
                dropdownHTML += `
                    <div onclick="window.selectCampaign('${c.id}', '${safeTitle}')" class="cursor-pointer px-3 py-2.5 text-xs sm:text-sm text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors flex items-center justify-between group">
                        <span class="truncate">${c.title}</span>
                        <svg class="w-4 h-4 text-green-400 hidden shrink-0 ml-2" id="check-camp-${c.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                `;
            });
            dropdownList.innerHTML = dropdownHTML;

            // 4. Ambil data SELURUH Submissions
            const { data: submissionsData } = await supabase
                .from('submissions')
                .select('*, campaigns(title)');

            if (submissionsData) allSubmissions = submissionsData;

            // 5. Update UI
            updateDashboard('all');

            // 6. Sembunyikan Loader
            setTimeout(() => {
                const loader = document.getElementById('pageLoader');
                if(loader){
                    loader.classList.add('opacity-0');
                    setTimeout(() => loader.style.display = 'none', 500); 
                }
            }, 800); 
        });

        // FUNGSI UPDATE TAMPILAN
        function updateDashboard(filterId) {
            // Filter Data
            const filteredCampaigns = filterId === 'all' ? allCampaigns : allCampaigns.filter(c => c.id === filterId);
            const filteredSubmissions = filterId === 'all' ? allSubmissions : allSubmissions.filter(s => s.campaign_id === filterId);

            // 1. Kalkulasi Data Budget & Campaign
            let totalBudget = 0;
            let totalRemaining = 0;
            let activeCount = 0;

            filteredCampaigns.forEach(c => {
                totalBudget += Number(c.budget_total || 0);
                totalRemaining += Number(c.budget_remaining || 0);
                if (c.status === 'ACTIVE' || c.status === 'RUNNING') activeCount++;
            });
            
            let budgetUsed = totalBudget - totalRemaining;
            let budgetPercent = totalBudget > 0 ? Math.round((budgetUsed / totalBudget) * 100) : 0;

            // 2. Kalkulasi Data View & Konten (Hanya yang APPROVED)
            let totalViews = 0;
            let approvedContentCount = 0;
            
            let viewsTT = 0;
            let viewsIG = 0;
            let viewsYT = 0;

            filteredSubmissions.forEach(sub => {
                if (sub.status === 'APPROVED') {
                    approvedContentCount++;
                    
                    let v = Math.max(sub.views_claimed || 0, sub.views_paid || 0);
                    totalViews += v;
                    
                    let link = (sub.video_link || '').toLowerCase();
                    if (link.includes('tiktok.com')) viewsTT += v;
                    else if (link.includes('instagram.com')) viewsIG += v;
                    else if (link.includes('youtube.com') || link.includes('youtu.be')) viewsYT += v;
                }
            });

            // 3. Format Data untuk UI
            const fmt = new Intl.NumberFormat('id-ID');

            document.getElementById('stat-total-views').textContent = formatCompact(totalViews);
            document.getElementById('stat-total-budget').textContent = 'Rp ' + formatCompact(totalBudget);
            
            document.getElementById('stat-budget-percent').textContent = budgetPercent + '%';
            document.getElementById('stat-budget-bar').style.width = budgetPercent + '%';
            document.getElementById('stat-budget-details').textContent = `Rp ${formatCompact(budgetUsed)} / Rp ${formatCompact(totalBudget)}`;
            document.getElementById('stat-budget-remaining').textContent = `Sisa Rp ${formatCompact(totalRemaining)}`;

            document.getElementById('stat-total-campaigns').textContent = filteredCampaigns.length;
            document.getElementById('stat-active-campaigns').textContent = activeCount;
            document.getElementById('stat-total-content').textContent = approvedContentCount;

            document.getElementById('stat-filter-views').textContent = fmt.format(totalViews) + ' Total Views';
            document.getElementById('donut-text-views').textContent = formatCompact(totalViews);
            
            document.getElementById('plat-tiktok').textContent = fmt.format(viewsTT);
            document.getElementById('plat-ig').textContent = fmt.format(viewsIG);
            document.getElementById('plat-yt').textContent = fmt.format(viewsYT);

            // 4. Update Donut Chart
            const donutSegment = document.getElementById('donutSegment');
            if (totalViews > 0) {
                donutSegment.setAttribute('stroke-dasharray', '100, 100');
            } else {
                donutSegment.setAttribute('stroke-dasharray', '0, 100');
            }
        }

        // Format angka (ribuan ke K, jutaan ke M)
        function formatCompact(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + ' Jt';
            if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + ' K';
            return num.toString();
        }

        // LOGIKA DROPDOWN CAMPAIGN
        window.toggleCampaignDropdown = function() {
            const menu = document.getElementById('campaignDropdownMenu');
            const icon = document.getElementById('campaignDropdownIcon');
            if (menu.classList.contains('invisible')) {
                menu.classList.remove('invisible', 'opacity-0', 'scale-95');
                menu.classList.add('visible', 'opacity-100', 'scale-100');
                icon.classList.add('rotate-180');
            } else {
                closeCampaignDropdown();
            }
        }

        function closeCampaignDropdown() {
            const menu = document.getElementById('campaignDropdownMenu');
            const icon = document.getElementById('campaignDropdownIcon');
            if(menu && icon) {
                menu.classList.add('invisible', 'opacity-0', 'scale-95');
                menu.classList.remove('visible', 'opacity-100', 'scale-100');
                icon.classList.remove('rotate-180');
            }
        }

        window.selectCampaign = function(value, textName) {
            currentFilter = value;
            document.getElementById('campaignSelectedText').textContent = textName;
            
            // Atur checkmark logic
            document.querySelectorAll('[id^="check-camp-"]').forEach(el => el.classList.add('hidden'));
            const selectedCheck = document.getElementById('check-camp-' + value);
            if(selectedCheck) selectedCheck.classList.remove('hidden');

            closeCampaignDropdown();
            updateDashboard(value);
        }

        document.addEventListener('click', (event) => {
            const container = document.getElementById('campaignDropdownContainer');
            if (container && !container.contains(event.target)) {
                closeCampaignDropdown();
            }
        });

        // FUNGSI EXPORT CSV
        window.exportToCSV = function() {
            if (allSubmissions.length === 0) {
                alert("Belum ada data untuk diexport.");
                return;
            }

            const filteredSubmissions = currentFilter === 'all' 
                ? allSubmissions 
                : allSubmissions.filter(s => s.campaign_id === currentFilter);

            if (filteredSubmissions.length === 0) {
                alert("Tidak ada data pada campaign ini.");
                return;
            }

            // Header CSV
            let csvContent = "Tanggal,Campaign,Platform,Link Video,Views,Status\n";

            filteredSubmissions.forEach(sub => {
                // Parsing Data
                const date = new Date(sub.created_at).toLocaleDateString('id-ID');
                const campName = sub.campaigns?.title || 'Unknown Campaign';
                
                let platform = 'Lainnya';
                const link = (sub.video_link || '').toLowerCase();
                if (link.includes('tiktok.com')) platform = 'TikTok';
                else if (link.includes('instagram.com')) platform = 'Instagram';
                else if (link.includes('youtube.com') || link.includes('youtu.be')) platform = 'YouTube';

                const status = sub.status;
                const views = Math.max(sub.views_claimed || 0, sub.views_paid || 0);
                const url = sub.video_link || '-';

                // Escape koma pada nama string dengan quote ""
                csvContent += `"${date}","${campName}","${platform}","${url}","${views}","${status}"\n`;
            });

            // Trigger Download File
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            link.setAttribute("href", url);
            link.setAttribute("download", `whoost_admin_analytics_${Date.now()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

    </script>
</body>
</html>
