<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilih Campaign - Whoost Clipper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { darkBg: '#0a0a0c', cardBg: '#121214' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        html, body { background-color: #0a0a0c; color: white; font-family: 'Inter', sans-serif; height: 100dvh; margin: 0; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .bg-dots-card { background-image: radial-gradient(#27272a 1px, transparent 1px); background-size: 10px 10px; }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black flex flex-col relative w-full h-full">

    <!-- Header -->
    <header class="h-20 sm:h-24 flex items-center justify-between px-4 sm:px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md z-20 flex-shrink-0 w-full relative">
        <div class="flex items-center gap-3 sm:gap-4">
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-6 sm:h-10 w-auto object-contain" onerror="this.src='https://via.placeholder.com/150x50?text=WHOOST'">
            <div class="h-5 sm:h-6 w-px bg-zinc-800 hidden sm:block"></div>
            <div>
                <h1 class="text-lg sm:text-xl md:text-2xl font-semibold tracking-tight">Submit Konten</h1>
            </div>
        </div>
    </header>

    <!-- Main Area -->
    <main class="flex-1 overflow-y-auto px-4 sm:px-8 py-6 pb-32 z-0 w-full relative scroll-smooth">
        <div class="max-w-7xl mx-auto space-y-6">
            
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div>
                    <h2 class="text-base sm:text-lg font-semibold text-white">Campaign Aktif Kamu</h2>
                    <p class="text-xs text-zinc-400 mt-1">Pilih campaign untuk mengunggah link videomu.</p>
                </div>

                <!-- Search Bar -->
                <div class="relative w-full sm:w-64">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <!-- Trigger filter/pencarian -->
                    <input type="text" id="searchInput" onkeyup="window.searchCampaign()" placeholder="Cari campaign..." class="w-full bg-zinc-900 border border-zinc-700 rounded-full pl-10 pr-4 py-2 text-xs sm:text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-zinc-400 transition-colors">
                </div>
            </div>

            <!-- List Campaign Aktif -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6" id="cards-container">
                <p class="text-zinc-500 text-sm col-span-full">Memuat campaign aktif...</p>
            </div>

            <!-- Pesan Kosong (Hidden Default) -->
            <div id="no-data-alert" class="hidden text-center py-20 col-span-full">
                <svg class="w-16 h-16 text-zinc-600 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <h3 class="text-xl font-bold text-white mb-2">Belum ada Campaign</h3>
                <p class="text-zinc-500 text-sm">Kamu belum bergabung di campaign apapun, atau pencarian tidak ditemukan.</p>
                <a href="clipper-campaign.html" class="inline-block mt-4 text-sm font-semibold text-black bg-white px-6 py-2 rounded-full hover:bg-zinc-200 transition-colors">Cari Campaign</a>
            </div>

            <!-- TOMBOL LOAD MORE -->
            <div id="load-more-container" class="w-full flex justify-center mt-8 hidden">
                <button onclick="window.loadMore()" class="bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 text-zinc-300 text-xs sm:text-sm font-semibold px-6 py-2.5 rounded-full transition-colors flex items-center gap-2">
                    Muat Lebih Banyak
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
            </div>

        </div>
    </main>

    <!-- Navigasi Bawah -->
    <script> const ACTIVE_MENU = 'campaignselector'; </script>
    <script src="attribute/navbarclipper.js"></script>

    <!-- SCRIPT UTAMA (SUPABASE & LOGIC) -->
    <script type="module">
        import { supabase, enforceRoleProtection } from './authentication/auth.js'; // Tambahan Proteksi

        let sessionUser = null;
        let joinedCampaigns = [];
        let currentSearch = '';

        // FUNGSI ANTI-XSS (Mencegah Eksekusi Script Jahat)
        function escapeHTML(str) {
            if (!str) return '';
            return str.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Menghitung kolom grid berdasarkan ukuran layar
        function getCols() {
            const w = window.innerWidth;
            if (w >= 1280) return 4; 
            if (w >= 1024) return 3; 
            if (w >= 640) return 2;
            return 1;                
        }

        let currentLimit = getCols() * 2;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // 1. Cek Role Terlebih Dahulu
                await enforceRoleProtection();

                // 2. Verifikasi Sesi Lanjutan
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                if (sessionError || !session) {
                    window.location.replace('login.html');
                    return;
                }
                sessionUser = session.user;
                
                // 3. Ambil Data
                await fetchJoinedCampaigns();
                
                // Refresh grid limit jika ukuran di resize
                window.addEventListener('resize', () => {
                    const newCols = getCols();
                    if(currentLimit < newCols * 2) {
                        currentLimit = newCols * 2;
                        applyRender();
                    }
                });
            } catch (error) {
                console.error("Terjadi kesalahan sistem saat inisialisasi:", error);
                document.getElementById('cards-container').innerHTML = '<p class="text-red-500 text-sm col-span-full">Gagal memuat halaman dengan benar. Silakan refresh.</p>';
            }
        });

        async function fetchJoinedCampaigns() {
            try {
                // Ambil relasi user_campaigns ke campaigns
                const { data, error } = await supabase
                    .from('user_campaigns')
                    .select(`
                        joined_at,
                        campaigns (
                            id, title, brand_name, budget_total, budget_remaining, 
                            reward_per_1k, price_per_video, payment_type, niche, status, 
                            banner_url, platforms, type
                        )
                    `)
                    .eq('user_id', sessionUser.id)
                    .order('joined_at', { ascending: false });

                if (error) throw error;

                // Ekstrak data yang tidak null (exclude null campaigns jika campaign dihapus)
                joinedCampaigns = data.filter(item => item.campaigns !== null).map(item => item.campaigns);
                applyRender();

            } catch (err) {
                console.error("Gagal load joined campaigns:", err);
                document.getElementById('cards-container').innerHTML = '<p class="text-red-500/80 text-sm col-span-full">Gagal memuat data dari server. Silakan coba lagi nanti.</p>';
            }
        }

        function generateCard(camp) {
            let statusColor = 'border-zinc-700 bg-zinc-800/40 text-green-400';
            let statText = 'ACTIVE';
            let overlayOpacity = 'opacity-100';

            if (camp.status === 'HOLDING') {
                statusColor = 'border-yellow-900/50 bg-yellow-900/20 text-yellow-500';
                statText = 'HOLD';
            } else if (camp.status === 'CLOSED' || camp.budget_remaining <= 0) {
                statusColor = 'border-red-900/50 bg-red-900/20 text-red-500';
                statText = 'CLOSED';
                overlayOpacity = 'opacity-50 grayscale';
            }

            const price = camp.payment_type === 'video' ? (camp.price_per_video || 0) : (camp.reward_per_1k || 0);
            const priceFormatted = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(price);
            const priceLabel = camp.payment_type === 'video' ? '/ video' : '/ 1k views';

            const percentage = camp.budget_total > 0 ? Math.round((camp.budget_remaining / camp.budget_total) * 100) : 0;
            const validPercentage = percentage > 100 ? 100 : (percentage < 0 ? 0 : percentage);

            // Sanitasi data dari database sebelum ditampilkan (Mencegah XSS Attack)
            const safeTitle = escapeHTML(camp.title || 'Tanpa Judul');
            const safeBrand = escapeHTML(camp.brand_name || '-');
            const safeNiche = escapeHTML(camp.niche || 'General');
            const safeBanner = camp.banner_url ? escapeHTML(camp.banner_url) : null;
            
            const fallbackText = safeTitle.substring(0, 10).toUpperCase();
            const typeLabel = camp.type === 'ugc' ? 'UGC' : 'CLIPPING';
            
            // Generate platform icons
            let platformIcons = '';
            if (camp.platforms && Array.isArray(camp.platforms)) {
                if (camp.platforms.includes('tiktok')) platformIcons += `<svg class="w-3.5 h-3.5 text-zinc-300" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.1z"/></svg>`;
                if (camp.platforms.includes('instagram')) platformIcons += `<svg class="w-3.5 h-3.5 text-zinc-300" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.88z"/></svg>`;
                if (camp.platforms.includes('youtube')) platformIcons += `<svg class="w-3.5 h-3.5 text-zinc-300" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`;
            }

            let bgContent = '';
            if (safeBanner) {
                bgContent = `<img src="${safeBanner}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 ${overlayOpacity}">`;
            } else {
                bgContent = `
                    <div class="absolute inset-0 bg-gradient-to-t from-[#121214] via-transparent to-transparent z-0 opacity-80"></div>
                    <h3 class="text-lg md:text-2xl font-black text-white relative z-10 tracking-tighter">${fallbackText}</h3>
                    <p class="text-zinc-400 font-black text-[8px] md:text-[10px] tracking-[0.2em] relative z-10 mt-0.5">${typeLabel}</p>
                `;
            }

            return `
            <div class="campaign-card bg-cardBg border border-zinc-800/80 rounded-[1.25rem] md:rounded-[1.5rem] p-3 md:p-4 flex flex-col h-full hover:border-zinc-500 hover:-translate-y-1 transition-all duration-300 shadow-xl group cursor-pointer" onclick="window.location.href='clipper-submit.html?campaign_id=${camp.id}'">
                
                <div class="w-full aspect-[16/9] bg-zinc-950 rounded-xl mb-4 flex flex-col items-center justify-center relative overflow-hidden shrink-0 border border-zinc-800/50">
                    ${bgContent}
                </div>
                
                <div class="flex justify-between items-center mb-2 md:mb-3">
                    <div class="flex items-center overflow-hidden pr-2">
                        <span class="text-[11px] md:text-xs font-bold text-zinc-400 hover:text-white transition truncate">${safeBrand}</span>
                    </div>
                    <div class="shrink-0 px-2 py-0.5 rounded-full border text-[8px] md:text-[9px] font-bold tracking-wider ${statusColor}">${statText}</div>
                </div>
                
                <h4 class="text-base md:text-xl font-black text-white mb-2 md:mb-3 truncate group-hover:text-zinc-300 transition-colors" title="${safeTitle}">${safeTitle}</h4>
                
                <div class="mb-3 md:mb-4 flex items-baseline gap-1">
                    <span class="text-lg md:text-2xl font-extrabold text-white tracking-tight">${priceFormatted}</span>
                    <span class="text-zinc-500 text-[9px] md:text-xs font-medium">${priceLabel}</span>
                </div>
                
                <div class="flex flex-wrap items-center gap-2 mb-4">
                    <div class="flex items-center gap-1.5 px-2 py-1 rounded-md border border-zinc-800 bg-zinc-900/50">
                        ${platformIcons || `<span class="text-[10px] text-zinc-500">-</span>`}
                    </div>
                    <div class="flex items-center px-2 py-1 rounded-md border border-zinc-800 bg-zinc-900/80">
                        <span class="text-[8px] md:text-[10px] font-bold text-zinc-300 uppercase tracking-wider">${safeNiche}</span>
                    </div>
                </div>
                
                <div class="mt-auto pt-3 border-t border-zinc-800/50">
                    <div class="flex justify-between items-end mb-1.5 md:mb-2">
                        <span class="text-[9px] md:text-xs text-zinc-400 font-semibold">Budget Tersisa</span>
                        <span class="text-[9px] md:text-xs font-black text-white">${validPercentage}%</span>
                    </div>
                    <div class="w-full h-1 md:h-1.5 bg-zinc-800 rounded-full overflow-hidden mb-4">
                        <div class="h-full bg-white rounded-full transition-all duration-500" style="width: ${validPercentage}%"></div>
                    </div>
                    <a href="clipper-submit.html?campaign_id=${camp.id}" onclick="event.stopPropagation()" class="w-full bg-white text-black py-1.5 md:py-2.5 rounded-lg md:rounded-xl font-bold text-[10px] md:text-sm hover:bg-zinc-200 active:scale-[0.98] transition-all block text-center">Submit Video</a>
                </div>
            </div>`;
        }

        function applyRender() {
            const container = document.getElementById('cards-container');
            const alertBox = document.getElementById('no-data-alert');
            const loadMoreBtn = document.getElementById('load-more-container');

            // Proses Filter Pencarian
            let filtered = joinedCampaigns;
            if (currentSearch.trim() !== '') {
                const q = currentSearch.toLowerCase();
                filtered = joinedCampaigns.filter(c => 
                    (c.title && c.title.toLowerCase().includes(q)) || 
                    (c.brand_name && c.brand_name.toLowerCase().includes(q))
                );
            }

            container.innerHTML = '';

            if (filtered.length === 0) {
                alertBox.classList.remove('hidden');
                loadMoreBtn.classList.add('hidden');
                return;
            } else {
                alertBox.classList.add('hidden');
            }

            // Render Pagination
            let html = '';
            const toShow = filtered.slice(0, currentLimit);
            toShow.forEach(camp => {
                html += generateCard(camp);
            });
            container.innerHTML = html;

            // Tombol Load More logic
            if (filtered.length > currentLimit) {
                loadMoreBtn.classList.remove('hidden');
            } else {
                loadMoreBtn.classList.add('hidden');
            }
        }

        // Global functions
        window.searchCampaign = function() {
            const inputVal = document.getElementById('searchInput').value;
            currentSearch = inputVal;
            currentLimit = getCols() * 2; 
            applyRender();
        };

        window.loadMore = function() {
            currentLimit += getCols() * 2;
            applyRender();
        };
    </script>
</body>
</html>
