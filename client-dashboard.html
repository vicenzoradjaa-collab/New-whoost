<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',

                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],

    <style>

            color: white;
            font-family: 'Inter', sans-serif;

        /* Custom scrollbar untuk dashboard */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        /* Hide scrollbar for horizontal scroll areas */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black h-screen flex overflow-hidden">

    <!-- SIDEBAR (KIRI)                             -->

                        </div>
                        <div class="bg-cardBg border border-zinc-800 rounded-2xl p-6 flex flex-col justify-center items-center text-center hover:border-zinc-500 transition-colors duration-300">

            </div>

    </main>

    <!-- Script Javascript untuk Sidebar Toggle -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const sidebarHeader = document.getElementById('sidebarHeader');
            const logo = document.getElementById('sidebarLogo');
            const navTexts = document.querySelectorAll('.nav-text');
            const navLinks = document.querySelectorAll('.nav-link');

            // Jika sidebar saat ini Terbuka / Expand (lebar w-64)
            if (sidebar.classList.contains('w-64')) {
                
                // 1. Perkecil lebar sidebar jadi 80px (w-20)
                sidebar.classList.replace('w-64', 'w-20');
                
                // 2. Pusatkan icon garis tiga di header sidebar
                sidebarHeader.classList.remove('px-6');
                sidebarHeader.classList.add('justify-center');

                // 3. Efek memudar pada logo & teks menu
                logo.classList.add('opacity-0');
                navTexts.forEach(t => t.classList.add('opacity-0'));

                // 4. Ubah padding tiap menu agar iconnya berada di tengah
                navLinks.forEach(l => {
                    l.classList.remove('px-4');
                    l.classList.add('justify-center');
                });

                // 5. Hilangkan logo & teks sepenuhnya (display: none) setelah transisi selesai
                setTimeout(() => {
                    logo.classList.add('hidden');
                    navTexts.forEach(t => t.classList.add('hidden'));
                }, 200);

            } 
            // Jika sidebar saat ini Tertutup / Minimized
            else {
                
                // 1. Kembalikan ukuran sidebar ke lebar asli (w-64)
                sidebar.classList.replace('w-20', 'w-64');
                
                // 2. Kembalikan padding header sidebar ke awal
                sidebarHeader.classList.add('px-6');
                sidebarHeader.classList.remove('justify-center');

                // 3. Tampilkan display logo & teks menu (dari display: none jadi flex/block)
                logo.classList.remove('hidden');
                navTexts.forEach(t => t.classList.remove('hidden'));

                // 4. Kembalikan posisi padding agar icon di kiri dan teks di kanan
                navLinks.forEach(l => {
                    l.classList.add('px-4');
                    l.classList.remove('justify-center');
                });
                
                // 5. Delay sejenak, agar efek Fade-in beraksi mulus
                setTimeout(() => {
                    logo.classList.remove('opacity-0');
                    navTexts.forEach(t => t.classList.remove('opacity-0'));
                }, 10);
            }
        }
    </script>
