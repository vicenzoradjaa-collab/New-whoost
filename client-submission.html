<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengajuan - Whoost Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        input[type="radio"] { accent-color: #ef4444; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black flex flex-col relative w-full h-full">

    <!-- LOADING SCREEN -->
    <div id="pageLoader" class="fixed inset-0 z-[9999] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative flex flex-col items-center">
            <div class="absolute inset-0 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-zinc-600/20 blur-[40px] rounded-full w-32 h-32 animate-pulse"></div>
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-10 sm:h-12 w-auto object-contain relative z-10 animate-bounce" style="animation-duration: 2s;">
            <p class="mt-6 text-zinc-500 text-[11px] sm:text-xs font-semibold tracking-widest uppercase animate-pulse">Memuat Data...</p>
        </div>
    </div>

    <!-- Background Ornamen -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-20%] right-[-10%] w-[50rem] h-[50rem] bg-zinc-800/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- HEADER -->
    <header class="h-20 sm:h-24 flex items-center justify-between px-4 sm:px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md z-20 flex-shrink-0 w-full">
        <div class="flex items-center gap-3 sm:gap-4">
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-6 sm:h-10 w-auto object-contain">
            <div class="h-5 sm:h-6 w-px bg-zinc-800 hidden sm:block"></div>
            <h1 class="text-lg sm:text-xl md:text-2xl font-semibold tracking-tight">Daftar Pengajuan Video</h1>
        </div>
    </header>

    <!-- TOOLBAR (Search & Filter) -->
    <div class="px-4 sm:px-8 py-4 sm:py-6 z-10 flex flex-col md:flex-row gap-3 sm:gap-4 items-center justify-between bg-darkBg flex-shrink-0 w-full border-b border-zinc-800/30">
        <div class="relative w-full md:max-w-md">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 sm:w-5 sm:h-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" id="searchInput" oninput="window.handleSearch(event)" placeholder="Cari kreator, judul campaign..." 
                class="w-full bg-cardBg border border-zinc-800 rounded-xl pl-10 sm:pl-11 pr-4 py-2.5 sm:py-3 text-[13px] sm:text-[14px] text-white placeholder-zinc-500 focus:outline-none focus:border-zinc-500 transition-shadow">
        </div>

        <div class="relative w-full md:w-auto">
            <button onclick="window.toggleFilter()" id="btnFilter" class="w-full md:w-auto flex items-center justify-between md:justify-center gap-3 bg-cardBg border border-zinc-800 px-4 sm:px-5 py-2.5 sm:py-3 rounded-xl text-[13px] sm:text-[14px] font-medium text-white hover:bg-zinc-900 transition-colors focus:outline-none">
                <div class="flex items-center gap-2">
                    <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                    <span id="filterLabel">Status: Perlu Review Brand</span>
                </div>
                <svg class="w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            
            <div id="dropdownFilter" class="absolute right-0 top-full mt-2 w-full md:w-56 bg-cardBg border border-zinc-800 rounded-xl shadow-2xl hidden flex-col overflow-hidden z-50">
                <button onclick="window.selectFilter('Semua')" class="text-left px-5 py-3 text-[13px] hover:bg-zinc-800 transition-colors text-white">Semua Status</button>
                <button onclick="window.selectFilter('PENDING_CLIENT')" class="text-left px-5 py-3 text-[13px] text-amber-400 hover:bg-zinc-800 transition-colors border-t border-zinc-800/50">Perlu Review Brand</button>
                <button onclick="window.selectFilter('PENDING_ADMIN')" class="text-left px-5 py-3 text-[13px] text-blue-400 hover:bg-zinc-800 transition-colors border-t border-zinc-800/50">Diproses Admin (Klaim Saldo)</button>
                <button onclick="window.selectFilter('SELESAI')" class="text-left px-5 py-3 text-[13px] text-zinc-400 hover:bg-zinc-800 transition-colors border-t border-zinc-800/50">Selesai / Ditolak</button>
            </div>
        </div>
    </div>

    <!-- MAIN GRID KONTEN -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 sm:px-8 pt-4 pb-32 z-0 scroll-smooth w-full relative">
        <div id="contentGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-3 sm:gap-5 w-full">
            <p class="text-zinc-500 text-sm col-span-full">Memuat pengajuan...</p>
        </div>

        <div class="mt-8 flex justify-center w-full">
            <button id="btnLoadMore" onclick="window.loadMore()" class="hidden px-5 sm:px-6 py-2.5 sm:py-3 bg-zinc-900 border border-zinc-700 hover:bg-white hover:text-black hover:border-white rounded-xl text-[13px] sm:text-[14px] font-semibold text-white transition-colors focus:outline-none">
                Lihat Selengkapnya
            </button>
        </div>
    </main>

    <!-- ========================================== -->
    <!-- MODAL POPUP REVIEW KONTEN (CLIENT)         -->
    <!-- ========================================== -->
    <div id="reviewModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden items-center justify-center opacity-0 transition-opacity duration-300 px-4">
        <div id="reviewModalBox" class="bg-cardBg border border-zinc-700 shadow-2xl rounded-2xl w-full max-w-md p-5 sm:p-6 transform scale-95 transition-transform duration-300 relative">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-lg sm:text-xl font-semibold text-white">Review Kualitas Konten</h3>
                <button onclick="window.closeReviewModal()" class="text-zinc-500 hover:text-white hover:bg-zinc-800 w-8 h-8 rounded-full flex items-center justify-center transition-colors focus:outline-none">
                    <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <p class="text-[12px] sm:text-[13px] text-zinc-400 mb-5 leading-relaxed">Tentukan apakah video ini sesuai dengan brief campaign Anda. Jika disetujui, kreator akan dapat melanjutkan untuk mengklaim pembayaran ke Admin.</p>
            
            <div class="flex gap-3 sm:gap-4 mb-5 sm:mb-6">
                <button id="btnSetuju" onclick="window.selectDecision('setuju')" class="flex-1 py-2.5 sm:py-3 rounded-xl border-2 border-zinc-800 bg-zinc-900 text-zinc-400 text-[13px] sm:text-base font-semibold hover:border-green-500 hover:text-green-500 transition-all focus:outline-none">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6 mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    Setujui Video
                </button>
                <button id="btnTolak" onclick="window.selectDecision('tolak')" class="flex-1 py-2.5 sm:py-3 rounded-xl border-2 border-zinc-800 bg-zinc-900 text-zinc-400 text-[13px] sm:text-base font-semibold hover:border-red-500 hover:text-red-500 transition-all focus:outline-none">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6 mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    Tolak Video
                </button>
            </div>

            <div id="formTolak" class="hidden flex-col gap-2.5 sm:gap-3 mb-5 sm:mb-6 bg-zinc-900/50 p-3 sm:p-4 rounded-xl border border-zinc-800">
                <label class="text-[12px] sm:text-[13px] font-medium text-white mb-1">Pilih Alasan Penolakan:</label>
                <label class="flex items-center gap-2 sm:gap-3 cursor-pointer group">
                    <input type="radio" name="alasan" value="Tidak sesuai dengan brief campaign" class="w-3.5 h-3.5 sm:w-4 sm:h-4" onchange="window.toggleCustomReason(false)">
                    <span class="text-[13px] sm:text-[14px] text-zinc-300 group-hover:text-white transition-colors">Tidak sesuai brief</span>
                </label>
                <label class="flex items-center gap-2 sm:gap-3 cursor-pointer group">
                    <input type="radio" name="alasan" value="Kualitas video / resolusi buruk" class="w-3.5 h-3.5 sm:w-4 sm:h-4" onchange="window.toggleCustomReason(false)">
                    <span class="text-[13px] sm:text-[14px] text-zinc-300 group-hover:text-white transition-colors">Kualitas video buruk</span>
                </label>
                <label class="flex items-center gap-2 sm:gap-3 cursor-pointer group">
                    <input type="radio" name="alasan" value="lainnya" class="w-3.5 h-3.5 sm:w-4 sm:h-4" onchange="window.toggleCustomReason(true)">
                    <span class="text-[13px] sm:text-[14px] text-zinc-300 group-hover:text-white transition-colors">Lainnya (Ketik Manual)</span>
                </label>
                <textarea id="customReason" class="w-full bg-black/50 border border-zinc-700 rounded-lg p-2.5 sm:p-3 text-[12px] sm:text-[13px] text-white focus:outline-none focus:border-red-500 hidden mt-1.5 sm:mt-2 placeholder-zinc-600 resize-none" rows="2" placeholder="Tuliskan alasan spesifik agar kreator mengerti..."></textarea>
            </div>

            <div class="flex justify-end gap-2 sm:gap-3 pt-4 border-t border-zinc-800/80">
                <button onclick="window.closeReviewModal()" class="w-full sm:w-auto px-4 sm:px-5 py-2.5 rounded-xl text-[13px] sm:text-[14px] font-medium text-white hover:bg-zinc-800 transition-colors focus:outline-none">Batal</button>
                <button id="btnSubmitReview" onclick="window.submitReview()" class="w-full sm:w-auto px-6 py-2.5 bg-white text-black rounded-xl text-[13px] sm:text-[14px] font-bold hover:bg-zinc-200 transition-colors disabled:opacity-30 disabled:cursor-not-allowed focus:outline-none" disabled>
                    Konfirmasi Tindakan
                </button>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- CUSTOM ALERT MODAL                         -->
    <!-- ========================================== -->
    <div id="customAlertModal" class="fixed inset-0 z-[9999] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 transition-opacity opacity-0">
        <div class="bg-cardBg border border-zinc-700 shadow-2xl rounded-2xl w-full max-w-sm p-6 text-center transform scale-95 transition-transform flex flex-col items-center" id="customAlertContent">
            <div id="alertIcon" class="w-16 h-16 rounded-full flex items-center justify-center mb-4"></div>
            <h3 id="alertTitle" class="text-xl font-bold text-white mb-2">Pemberitahuan</h3>
            <p id="alertMessage" class="text-[13px] text-zinc-400 mb-6 leading-relaxed"></p>
            <button onclick="window.closeAlert()" class="w-full px-4 py-2.5 rounded-xl bg-white text-black text-sm font-bold hover:bg-zinc-200 transition-colors focus:outline-none">Tutup</button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- JAVASCRIPT & LOGIC SUPABASE                -->
    <!-- ========================================== -->
    <script>const ACTIVE_MENU = 'pengajuan';</script>
    <script src="attribute/navbarclient.js"></script>

    <script type="module">
        import { supabase, enforceRoleProtection } from './authentication/auth.js';

        let sessionUser = null;
        let submissionsData = [];
        
        let currentItemCount = 14; 
        let currentFilter = 'PENDING_CLIENT'; 
        let searchQuery = '';
        let activeCardId = null;
        let currentDecision = null;

        // FUNGSI ANTI-XSS
        function escapeHTML(str) {
            if (!str) return '';
            return str.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ==========================================
        // SISTEM CUSTOM MODAL POP-UP
        // ==========================================
        window.showAlert = function(msg, type = 'info') {
            const m = document.getElementById('customAlertModal');
            const c = document.getElementById('customAlertContent');
            const icon = document.getElementById('alertIcon');
            const title = document.getElementById('alertTitle');
            document.getElementById('alertMessage').innerText = msg;

            if (type === 'success') {
                icon.className = 'w-16 h-16 bg-green-500/10 text-green-400 border border-green-500/20 rounded-full flex items-center justify-center mb-4';
                icon.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                title.innerText = 'Berhasil';
            } else if (type === 'error') {
                icon.className = 'w-16 h-16 bg-red-500/10 text-red-400 border border-red-500/20 rounded-full flex items-center justify-center mb-4';
                icon.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                title.innerText = 'Gagal';
            } else {
                icon.className = 'w-16 h-16 bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-full flex items-center justify-center mb-4';
                icon.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
                title.innerText = 'Informasi';
            }

            m.classList.remove('hidden'); m.classList.add('flex');
            setTimeout(() => { m.classList.remove('opacity-0'); c.classList.remove('scale-95'); }, 10);
        };

        window.closeAlert = function() {
            const m = document.getElementById('customAlertModal');
            const c = document.getElementById('customAlertContent');
            m.classList.add('opacity-0'); c.classList.add('scale-95');
            setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300);
        };

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await enforceRoleProtection();

                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                if (sessionError || !session) {
                    window.location.replace('login.html');
                    return;
                }
                sessionUser = session.user;

                await loadSubmissions();

            } catch (error) {
                console.error("Initialization error:", error);
            } finally {
                setTimeout(() => {
                    const loader = document.getElementById('pageLoader');
                    if(loader) {
                        loader.classList.add('opacity-0');
                        setTimeout(() => loader.style.display = 'none', 500);
                    }
                }, 500);
            }
        });

        // 1. Tarik Data dari Supabase (Hanya yang Client_ID nya cocok)
        async function loadSubmissions() {
            try {
                const { data, error } = await supabase
                    .from('submissions')
                    .select(`
                        id, video_link, status, created_at, user_id, views_claimed,
                        profiles (full_name, email),
                        campaigns!inner (id, title, client_id, platforms)
                    `)
                    .eq('campaigns.client_id', sessionUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;
                submissionsData = data || [];
                applyFilters();
            } catch (err) {
                console.error("Error loading submissions:", err);
                document.getElementById('contentGrid').innerHTML = '<p class="text-red-500 text-sm col-span-full">Gagal memuat data dari server.</p>';
            }
        }

        function getPlatformInfo(url, campPlatforms) {
            if (!url) return { color: 'bg-zinc-100', name: 'Link Web' };
            if (url.includes('tiktok.com')) return { color: 'bg-cyan-400', name: 'TikTok' };
            if (url.includes('instagram.com')) return { color: 'bg-fuchsia-500', name: 'IG Reels' };
            if (url.match(/(?:youtu\.be\/|youtube\.com\/)/)) return { color: 'bg-red-600', name: 'YT Shorts' };
            return { color: 'bg-zinc-100', name: 'Link Web' };
        }

        // ==========================================
        // FUNGSI INTI: IDENTIFIKASI STATUS KHUSUS CLIENT
        // ==========================================
        function getClientUIStatus(sub) {
            // PENDING_CLIENT = Video baru submit, views masih 0, butuh ACC Client.
            if (sub.status === 'PENDING' && (!sub.views_claimed || sub.views_claimed === 0)) return 'PENDING_CLIENT';
            
            // PENDING_ADMIN = User sudah klaim views (>0), butuh ACC bayaran dari Admin. Client cukup pantau.
            if (sub.status === 'PENDING' && sub.views_claimed > 0) return 'PENDING_ADMIN';
            
            // Jika tidak, kembalikan APPROVED atau REJECTED aslinya
            return sub.status; 
        }

        // 3. Render Kartu HTML
        function generateCard(sub) {
            const creator = escapeHTML(sub.profiles?.full_name || sub.profiles?.email || 'Unknown Creator');
            const title = escapeHTML(sub.campaigns?.title || 'Campaign Dihapus');
            const safeUrl = encodeURI(sub.video_link || '');
            const platInfo = getPlatformInfo(sub.video_link, sub.campaigns?.platforms);

            let uiStatus = getClientUIStatus(sub);
            
            let badgeClass = 'bg-zinc-500/20 border-zinc-500/50 text-zinc-500';
            let badgeText = 'UNKNOWN';
            let btnReviewHTML = '';
            let opacityClass = 'opacity-80';

            // ATUR TAMPILAN BERDASARKAN STATUS
            if (uiStatus === 'PENDING_CLIENT') {
                opacityClass = '';
                badgeClass = 'bg-amber-500/20 border-amber-500/50 text-amber-500';
                badgeText = 'Review Brand';
                btnReviewHTML = `<button onclick="window.openReviewModal('${sub.id}')" class="py-1.5 sm:py-2.5 bg-white text-black hover:bg-zinc-200 rounded-lg text-[10px] sm:text-[13px] font-semibold transition-colors active:scale-95 shadow-sm focus:outline-none">Review Kualitas</button>`;
            } else if (uiStatus === 'PENDING_ADMIN') {
                badgeClass = 'bg-blue-500/20 border-blue-500/50 text-blue-400';
                badgeText = 'Proses Admin';
                btnReviewHTML = `<button disabled class="py-1.5 sm:py-2.5 bg-zinc-800/80 text-zinc-500 border border-zinc-800 rounded-lg text-[10px] sm:text-[13px] font-semibold cursor-not-allowed">Proses Admin</button>`;
            } else if (uiStatus === 'APPROVED') {
                badgeClass = 'bg-green-500/20 border-green-500/50 text-green-500';
                badgeText = 'Disetujui';
                btnReviewHTML = `<button disabled class="py-1.5 sm:py-2.5 bg-green-500/10 text-green-500 border border-green-500/20 rounded-lg text-[10px] sm:text-[13px] font-semibold cursor-not-allowed">Video Di-ACC</button>`;
            } else if (uiStatus === 'REJECTED') {
                badgeClass = 'bg-red-500/20 border-red-500/50 text-red-500';
                badgeText = 'Ditolak';
                btnReviewHTML = `<button disabled class="py-1.5 sm:py-2.5 bg-red-500/10 text-red-500 border border-red-500/20 rounded-lg text-[10px] sm:text-[13px] font-semibold cursor-not-allowed">Video Ditolak</button>`;
            }

            return `
            <div class="content-card bg-cardBg border border-zinc-800 rounded-2xl p-1.5 sm:p-2 flex flex-col hover:border-zinc-500 transition-all duration-300 ${opacityClass}">
                <div class="relative w-full aspect-[3/4] bg-zinc-900 rounded-xl overflow-hidden group border border-zinc-800">
                    <img id="thumb-${sub.id}" data-video-link="${safeUrl}" src="https://placehold.co/300x400/121214/27272a?text=..." class="sub-thumb w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60"></div>
                    
                    <div class="absolute top-2 left-2 sm:top-3 sm:left-3 bg-black/60 backdrop-blur-md border border-white/10 px-1.5 sm:px-2.5 py-0.5 sm:py-1 rounded-md flex items-center gap-1 sm:gap-1.5 shadow-sm">
                        <span class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full ${platInfo.color}"></span>
                        <span class="text-[9px] sm:text-[11px] font-semibold tracking-wider text-white">${platInfo.name}</span>
                    </div>
                    
                    <div class="absolute top-2 right-2 sm:top-3 sm:right-3 ${badgeClass} px-1.5 sm:px-2 py-0.5 rounded text-[8px] sm:text-[10px] font-bold uppercase tracking-wider">${badgeText}</div>

                    <div class="absolute bottom-2 left-2 right-2 sm:bottom-3 sm:left-3 sm:right-3">
                        <p class="text-[11px] sm:text-sm font-semibold text-white truncate">${creator}</p>
                        <p class="text-[9px] sm:text-[11px] text-zinc-300 truncate mt-0.5" title="${title}">${title}</p>
                    </div>
                </div>
                <div class="mt-1.5 sm:mt-2 grid grid-cols-2 gap-1.5 sm:gap-2">
                    <a href="${safeUrl}" target="_blank" class="flex items-center justify-center gap-1 sm:gap-1.5 py-1.5 sm:py-2.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-lg text-[10px] sm:text-[13px] font-medium text-zinc-300 hover:text-white transition-colors focus:outline-none">
                        <svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg> Lihat
                    </a>
                    ${btnReviewHTML}
                </div>
            </div>`;
        }

        function applyFilters() {
            const grid = document.getElementById('contentGrid');
            const btnLoadMore = document.getElementById('btnLoadMore');

            let filtered = submissionsData.filter(sub => {
                const creator = (sub.profiles?.full_name || sub.profiles?.email || '').toLowerCase();
                const title = (sub.campaigns?.title || '').toLowerCase();
                const uiStatus = getClientUIStatus(sub);
                
                let matchesFilter = false;
                if (currentFilter === 'Semua') matchesFilter = true;
                else if (currentFilter === 'PENDING_CLIENT') matchesFilter = (uiStatus === 'PENDING_CLIENT');
                else if (currentFilter === 'PENDING_ADMIN') matchesFilter = (uiStatus === 'PENDING_ADMIN');
                else if (currentFilter === 'SELESAI') matchesFilter = (uiStatus === 'APPROVED' || uiStatus === 'REJECTED');
                
                const matchesSearch = creator.includes(searchQuery) || title.includes(searchQuery);
                
                return matchesFilter && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<p class="text-zinc-500 text-sm col-span-full text-center mt-10">Tidak ada pengajuan yang sesuai.</p>';
                btnLoadMore.classList.add('hidden');
                return;
            }

            let html = '';
            const toRender = filtered.slice(0, currentItemCount);
            toRender.forEach(sub => {
                html += generateCard(sub);
            });
            grid.innerHTML = html;

            if (filtered.length > currentItemCount) {
                btnLoadMore.classList.remove('hidden');
            } else {
                btnLoadMore.classList.add('hidden');
            }

            extractThumbnailsAsync(toRender);
        }

        async function extractThumbnailsAsync(items) {
            for (let sub of items) {
                const imgEl = document.getElementById(`thumb-${sub.id}`);
                if (!imgEl || imgEl.getAttribute('data-loaded') === 'true') continue;
                
                const url = sub.video_link;
                if (!url) continue;

                if (url.match(/(?:youtu\.be\/|youtube\.com\/)/)) {
                    const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))((\w|-){11})/);
                    if (ytMatch && ytMatch[1]) {
                        imgEl.src = `https://img.youtube.com/vi/${ytMatch[1]}/hqdefault.jpg`;
                        imgEl.setAttribute('data-loaded', 'true');
                    }
                    continue;
                }

                try {
                    const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                    const json = await res.json();
                    
                    if (json.status === 'success' && json.data && json.data.image && json.data.image.url) {
                        imgEl.src = json.data.image.url;
                        imgEl.setAttribute('data-loaded', 'true');
                    } else if (url.includes('tiktok.com')) {
                        const tkRes = await fetch(`https://www.tikwm.com/api/?url=${url}`);
                        const tkJson = await tkRes.json();
                        if (tkJson.data && tkJson.data.cover) {
                            imgEl.src = tkJson.data.cover;
                            imgEl.setAttribute('data-loaded', 'true');
                        }
                    }
                } catch(e) {}
            }
        }

        window.handleSearch = function(e) {
            searchQuery = e.target.value.toLowerCase();
            currentItemCount = 14;
            applyFilters();
        };

        window.toggleFilter = function() {
            const dropdown = document.getElementById('dropdownFilter');
            dropdown.classList.toggle('hidden');
            dropdown.classList.toggle('flex');
        };

        window.selectFilter = function(status) {
            currentFilter = status;
            let displayStatus = 'Semua Status';
            if(status === 'PENDING_CLIENT') displayStatus = 'Perlu Review Brand';
            if(status === 'PENDING_ADMIN') displayStatus = 'Diproses Admin';
            if(status === 'SELESAI') displayStatus = 'Selesai / Ditolak';
            
            document.getElementById('filterLabel').innerText = "Status: " + displayStatus;
            window.toggleFilter();
            currentItemCount = 14;
            applyFilters();
        };

        window.loadMore = function() {
            currentItemCount += 14;
            applyFilters();
        };

        window.addEventListener('click', function(e) {
            const filterBtn = document.getElementById('btnFilter');
            const dropdown = document.getElementById('dropdownFilter');
            if(filterBtn && dropdown) {
                if (!filterBtn.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.add('hidden');
                    dropdown.classList.remove('flex');
                }
            }
        });

        // ==========================================
        // MODAL REVIEW CLIENT & SUBMIT KE SUPABASE
        // ==========================================
        window.openReviewModal = function(subId) {
            activeCardId = subId;
            currentDecision = null;
            document.getElementById('btnSubmitReview').disabled = true;
            document.getElementById('formTolak').classList.add('hidden');
            document.getElementById('formTolak').classList.remove('flex');
            document.getElementById('customReason').classList.add('hidden');
            document.getElementById('customReason').value = '';
            
            const btnSetuju = document.getElementById('btnSetuju');
            const btnTolak = document.getElementById('btnTolak');
            btnSetuju.className = "flex-1 py-2.5 sm:py-3 rounded-xl border-2 border-zinc-800 bg-zinc-900 text-zinc-400 text-[13px] sm:text-base font-semibold hover:border-green-500 hover:text-green-500 transition-all focus:outline-none";
            btnTolak.className = "flex-1 py-2.5 sm:py-3 rounded-xl border-2 border-zinc-800 bg-zinc-900 text-zinc-400 text-[13px] sm:text-base font-semibold hover:border-red-500 hover:text-red-500 transition-all focus:outline-none";
            document.querySelectorAll('input[name="alasan"]').forEach(radio => radio.checked = false);

            const reviewModal = document.getElementById('reviewModal');
            const reviewModalBox = document.getElementById('reviewModalBox');
            reviewModal.classList.remove('hidden');
            reviewModal.classList.add('flex');
            setTimeout(() => {
                reviewModal.classList.remove('opacity-0');
                reviewModalBox.classList.remove('scale-95');
                reviewModalBox.classList.add('scale-100');
            }, 10);
        };

        window.closeReviewModal = function() {
            const reviewModal = document.getElementById('reviewModal');
            const reviewModalBox = document.getElementById('reviewModalBox');
            reviewModal.classList.add('opacity-0');
            reviewModalBox.classList.remove('scale-100');
            reviewModalBox.classList.add('scale-95');
            setTimeout(() => {
                reviewModal.classList.add('hidden');
                reviewModal.classList.remove('flex');
            }, 300);
        };

        window.selectDecision = function(decision) {
            currentDecision = decision;
            const btnSetuju = document.getElementById('btnSetuju');
            const btnTolak = document.getElementById('btnTolak');
            const formTolak = document.getElementById('formTolak');
            const btnSubmit = document.getElementById('btnSubmitReview');

            btnSetuju.className = "flex-1 py-2.5 sm:py-3 rounded-xl border-2 border-zinc-800 bg-zinc-900 text-zinc-400 text-[13px] sm:text-base font-semibold hover:border-green-500 hover:text-green-500 transition-all focus:outline-none";
            btnTolak.className = "flex-1 py-2.5 sm:py-3 rounded-xl border-2 border-zinc-800 bg-zinc-900 text-zinc-400 text-[13px] sm:text-base font-semibold hover:border-red-500 hover:text-red-500 transition-all focus:outline-none";

            if (decision === 'setuju') {
                btnSetuju.className = "flex-1 py-2.5 sm:py-3 rounded-xl border-2 border-green-500 bg-green-500/10 text-green-500 text-[13px] sm:text-base font-semibold transition-all focus:outline-none";
                formTolak.classList.add('hidden');
                formTolak.classList.remove('flex');
                btnSubmit.disabled = false;
            } else if (decision === 'tolak') {
                btnTolak.className = "flex-1 py-2.5 sm:py-3 rounded-xl border-2 border-red-500 bg-red-500/10 text-red-500 text-[13px] sm:text-base font-semibold transition-all focus:outline-none";
                formTolak.classList.remove('hidden');
                formTolak.classList.add('flex');
                btnSubmit.disabled = true;
                
                const checkedRadio = document.querySelector('input[name="alasan"]:checked');
                if (checkedRadio) {
                    if (checkedRadio.value !== 'lainnya' || (checkedRadio.value === 'lainnya' && document.getElementById('customReason').value.trim() !== '')) {
                        btnSubmit.disabled = false;
                    }
                }
            }
        };

        window.toggleCustomReason = function(isCustom) {
            const textArea = document.getElementById('customReason');
            const btnSubmit = document.getElementById('btnSubmitReview');
            if (isCustom) {
                textArea.classList.remove('hidden');
                btnSubmit.disabled = textArea.value.trim() === '';
            } else {
                textArea.classList.add('hidden');
                btnSubmit.disabled = false;
            }
        };

        document.getElementById('customReason').addEventListener('input', function(e) {
            if(currentDecision === 'tolak') {
                document.getElementById('btnSubmitReview').disabled = e.target.value.trim() === '';
            }
        });

        // SUBMIT KE SUPABASE (TANPA PERHITUNGAN UANG KARENA INI CLIENT)
        window.submitReview = async function() {
            if (!activeCardId || !currentDecision) return;
            
            const btnSubmit = document.getElementById('btnSubmitReview');
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Memproses...";

            try {
                let updateData = { status: currentDecision === 'setuju' ? 'APPROVED' : 'REJECTED' };
                
                if (currentDecision === 'tolak') {
                    const checked = document.querySelector('input[name="alasan"]:checked');
                    let rawReason = checked.value === 'lainnya' ? document.getElementById('customReason').value.trim() : checked.value;
                    updateData.reject_reason = escapeHTML(rawReason);
                } else {
                    updateData.reject_reason = null; 
                }

                const { error } = await supabase.from('submissions').update(updateData).eq('id', activeCardId);
                
                if (error) throw error;

                // Dapatkan user_id dari submissionsData lokal
                const sub = submissionsData.find(s => s.id === activeCardId);
                if (sub) {
                    // Kirim Notif ke Clipper
                    const notifTitle = currentDecision === 'setuju' ? 'Video Disetujui Brand! ✅' : 'Video Ditolak Brand ❌';
                    const notifMsg = currentDecision === 'setuju' 
                        ? `Selamat! Video untuk campaign "${escapeHTML(sub.campaigns.title)}" telah lolos review kualitas. Sekarang Anda bisa mengajukan klaim views di Dashboard Anda.`
                        : `Mohon maaf, video untuk campaign "${escapeHTML(sub.campaigns.title)}" ditolak. Alasan: ${updateData.reject_reason}`;
                        
                    await supabase.from('notifications').insert([{
                        user_id: sub.user_id,
                        title: notifTitle,
                        message: notifMsg,
                        type: currentDecision === 'setuju' ? 'success' : 'warning'
                    }]);
                }

                window.showAlert(`Review berhasil dikirim! Video telah di-${currentDecision === 'setuju' ? 'Setujui' : 'Tolak'}.`, 'success');
                window.closeReviewModal();
                btnSubmit.innerText = "Konfirmasi Tindakan";
                
                await loadSubmissions();

            } catch (err) {
                window.showAlert("Terjadi kesalahan: " + err.message, 'error');
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Konfirmasi Tindakan";
            }
        };
    </script>
</body>
