<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pengguna - Whoost Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        /* Animasi Modal */
        .modal-active { opacity: 1; pointer-events: auto; }
        .modal-inactive { opacity: 0; pointer-events: none; }
        .modal-content-active { transform: scale(1); }
        .modal-content-inactive { transform: scale(0.95); }
    </style>
</head>
<body class="antialiased selection:bg-blue-500 selection:text-white flex flex-col relative w-full h-full">

    <!-- Background Ornamen -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-20%] right-[-10%] w-[50rem] h-[50rem] bg-blue-900/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- HEADER ADMIN -->
    <header class="h-20 sm:h-24 flex items-center justify-between px-4 sm:px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md z-20 flex-shrink-0 w-full">
        <div class="flex items-center gap-3 sm:gap-4">
            <img src="asset/logow.webp" alt="Whoost Admin Logo" class="h-6 sm:h-10 w-auto object-contain" onerror="this.src='https://via.placeholder.com/100x40?text=WHOOST'">
            <div class="h-5 sm:h-6 w-px bg-zinc-800 hidden sm:block"></div>
            <h1 class="text-lg sm:text-xl md:text-2xl font-semibold tracking-tight text-blue-400">Kelola Pengguna</h1>
        </div>
        <div></div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 sm:px-8 py-6 pb-20 z-0 scroll-smooth w-full relative">
        <div class="max-w-6xl mx-auto space-y-6">
            
            <!-- CONTROLS: TABS, DROPDOWN & SEARCH -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                
                <!-- Tabs -->
                <div class="flex bg-cardBg border border-zinc-800 rounded-lg p-1 w-full md:w-auto shrink-0">
                    <button onclick="switchTab('clipper')" id="tab-clipper" class="flex-1 md:w-32 px-4 py-2 text-sm font-medium rounded-md transition-all duration-300 bg-zinc-800 text-white shadow">
                        Clipper
                    </button>
                    <button onclick="switchTab('client')" id="tab-client" class="flex-1 md:w-32 px-4 py-2 text-sm font-medium rounded-md transition-all duration-300 text-zinc-400 hover:text-white">
                        Client / Brand
                    </button>
                </div>

                <!-- Filters & Search -->
                <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto relative">
                    
                    <!-- CUSTOM DROPDOWN STATUS FILTER -->
                    <div class="relative w-full sm:w-44" id="customDropdownContainer">
                        <button id="dropdownBtn" onclick="toggleDropdown()" class="flex items-center justify-between w-full pl-3 pr-3 py-2 border border-zinc-800 rounded-lg bg-cardBg text-zinc-300 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 hover:border-zinc-600 transition-colors">
                            <span id="dropdownSelectedText">Semua Status</span>
                            <svg class="w-4 h-4 text-zinc-500 transition-transform duration-200" id="dropdownIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        
                        <!-- Dropdown Menu Item -->
                        <div id="dropdownMenu" class="absolute z-[60] w-full mt-1 bg-zinc-900 border border-zinc-700 rounded-lg shadow-xl opacity-0 invisible transform scale-95 transition-all duration-200 origin-top-right">
                            <div class="py-1">
                                <div onclick="selectFilter('all', 'Semua Status')" class="cursor-pointer px-3 py-2 text-sm text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors flex items-center justify-between group">
                                    Semua Status
                                    <svg class="w-4 h-4 text-blue-500 hidden" id="check-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <div onclick="selectFilter('active', 'Active')" class="cursor-pointer px-3 py-2 text-sm text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors flex items-center justify-between group">
                                    Active
                                    <svg class="w-4 h-4 text-green-400 hidden" id="check-active" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <div onclick="selectFilter('banned', 'Banned')" class="cursor-pointer px-3 py-2 text-sm text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors flex items-center justify-between group">
                                    Banned
                                    <svg class="w-4 h-4 text-red-400 hidden" id="check-banned" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Search Input -->
                    <div class="relative w-full sm:w-72">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input type="text" id="searchInput" onkeyup="filterUsers()" placeholder="Cari nama atau gmail..." class="block w-full pl-10 pr-3 py-2 border border-zinc-800 rounded-lg leading-5 bg-cardBg text-zinc-300 placeholder-zinc-500 focus:outline-none focus:ring-1 focus:ring-blue-500 hover:border-zinc-600 sm:text-sm transition-colors">
                    </div>
                </div>
            </div>

            <!-- TABLE CONTAINER -->
            <div class="bg-cardBg border border-zinc-800 rounded-2xl overflow-hidden shadow-xl">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-zinc-800/50">
                        <thead class="bg-zinc-900/50">
                            <tr>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-zinc-400 uppercase tracking-wider">Info Pengguna</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-zinc-400 uppercase tracking-wider">Role</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-zinc-400 uppercase tracking-wider">Status</th>
                                <th scope="col" class="px-6 py-4 text-right text-xs font-semibold text-zinc-400 uppercase tracking-wider">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody" class="divide-y divide-zinc-800/50 bg-transparent">
                            <!-- Data Table akan di-render di sini oleh JavaScript -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Empty State -->
                <div id="emptyState" class="hidden flex-col items-center justify-center py-12 px-4 text-center">
                    <svg class="w-12 h-12 text-zinc-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <h3 class="text-sm font-semibold text-zinc-300">Pengguna tidak ditemukan</h3>
                    <p class="text-xs text-zinc-500 mt-1">Coba gunakan kata kunci pencarian atau filter yang lain.</p>
                </div>
            </div>

        </div>
    </main>

    <!-- MODAL KONFIRMASI BAN/UNBAN -->
    <div id="confirmModal" class="fixed inset-0 z-[1000] flex items-center justify-center modal-inactive transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeModal('confirmModal')"></div>
        <div id="confirmModalContent" class="bg-cardBg border border-zinc-800 rounded-2xl shadow-2xl relative z-10 w-[90%] max-w-sm p-6 flex flex-col transform modal-content-inactive transition-transform duration-300">
            <div class="w-12 h-12 rounded-full bg-red-500/10 flex items-center justify-center mb-4 border border-red-500/20 mx-auto" id="modalIconContainer">
                <svg id="modalIcon" class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h3 id="confirmTitle" class="text-lg font-bold text-white text-center mb-2">Konfirmasi Blokir</h3>
            <p id="confirmMessage" class="text-sm text-zinc-400 text-center mb-6 leading-relaxed">
                Apakah Anda yakin ingin memblokir <span id="targetUserName" class="font-bold text-white">User</span>?
            </p>
            <div class="flex gap-3">
                <button onclick="closeModal('confirmModal')" class="flex-1 py-2.5 rounded-lg border border-zinc-700 bg-zinc-800 text-zinc-300 text-sm font-semibold hover:bg-zinc-700 hover:text-white transition-colors">Batal</button>
                <button id="confirmBtn" onclick="executeAction()" class="flex-1 py-2.5 rounded-lg bg-red-600 text-white text-sm font-semibold hover:bg-red-500 transition-colors shadow-lg shadow-red-900/20">Ya, Blokir</button>
            </div>
        </div>
    </div>

    <!-- MODAL SUKSES -->
    <div id="successModal" class="fixed inset-0 z-[1000] flex items-center justify-center modal-inactive transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeModal('successModal')"></div>
        <div id="successModalContent" class="bg-cardBg border border-zinc-800 rounded-2xl shadow-2xl relative z-10 w-[90%] max-w-sm p-6 flex flex-col items-center text-center transform modal-content-inactive transition-transform duration-300">
            <div class="w-12 h-12 rounded-full bg-green-500/10 flex items-center justify-center mb-4 border border-green-500/20">
                <svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-lg font-bold text-white mb-2">Berhasil!</h3>
            <p id="successMessage" class="text-sm text-zinc-400 mb-6">Status pengguna telah diperbarui.</p>
            <button onclick="closeModal('successModal')" class="w-full py-2.5 rounded-lg bg-blue-600 text-white text-sm font-semibold hover:bg-blue-500 transition-colors shadow-lg shadow-blue-900/20">Tutup</button>
        </div>
    </div>

    <script>
        // DATA DUMMY
        const usersData = {
            clipper: [
                { id: 'u1', name: 'Ahmad Fauzi', email: 'ahmad.fauzi@gmail.com', status: 'active', avatar: 'https://images.unsplash.com/photo-1599566150163-29194dcaad36?ixlib=rb-4.0.3&w=100&q=80' },
                { id: 'u2', name: 'Budi Santoso', email: 'budi.creator@gmail.com', status: 'banned', avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&w=100&q=80' },
                { id: 'u3', name: 'Siti Aminah', email: 'siti.vlogs@gmail.com', status: 'active', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-4.0.3&w=100&q=80' },
                { id: 'u4', name: 'Reza Ardiansyah', email: 'reza.gaming@gmail.com', status: 'active', avatar: 'https://images.unsplash.com/photo-1527980965255-d3b416303d12?ixlib=rb-4.0.3&w=100&q=80' }
            ],
            client: [
                { id: 'c1', name: 'PK Entertainment', email: 'contact@pk-ent.com', status: 'active', avatar: 'https://via.placeholder.com/100?text=PK' },
                { id: 'c2', name: 'The Keranjang Bali', email: 'marketing@thekeranjang.com', status: 'active', avatar: 'https://via.placeholder.com/100?text=TK' },
                { id: 'c3', name: 'Scammer Brand', email: 'fakebrand123@gmail.com', status: 'banned', avatar: 'https://via.placeholder.com/100?text=SB' }
            ]
        };

        let currentTab = 'clipper';
        let currentStatusFilter = 'all'; // Status bawaan dropdown custom
        let pendingAction = null; 

        // ----- SISTEM CUSTOM DROPDOWN -----
        function toggleDropdown() {
            const menu = document.getElementById('dropdownMenu');
            const icon = document.getElementById('dropdownIcon');
            
            if (menu.classList.contains('invisible')) {
                // Buka Dropdown
                menu.classList.remove('invisible', 'opacity-0', 'scale-95');
                menu.classList.add('visible', 'opacity-100', 'scale-100');
                icon.classList.add('rotate-180');
            } else {
                // Tutup Dropdown
                closeDropdown();
            }
        }

        function closeDropdown() {
            const menu = document.getElementById('dropdownMenu');
            const icon = document.getElementById('dropdownIcon');
            menu.classList.add('invisible', 'opacity-0', 'scale-95');
            menu.classList.remove('visible', 'opacity-100', 'scale-100');
            icon.classList.remove('rotate-180');
        }

        function selectFilter(value, textName) {
            currentStatusFilter = value;
            document.getElementById('dropdownSelectedText').textContent = textName;
            
            // Sembunyikan semua checkmark, lalu tampilkan yang terpilih
            document.getElementById('check-all').classList.add('hidden');
            document.getElementById('check-active').classList.add('hidden');
            document.getElementById('check-banned').classList.add('hidden');
            document.getElementById('check-' + value).classList.remove('hidden');

            closeDropdown();
            filterUsers(); // Panggil fungsi filter tabel
        }

        // Click outside untuk menutup dropdown
        document.addEventListener('click', (event) => {
            const container = document.getElementById('customDropdownContainer');
            if (container && !container.contains(event.target)) {
                closeDropdown();
            }
        });


        // ----- MENGUBAH TAB -----
        function switchTab(tab) {
            currentTab = tab;
            
            // Ubah styling tab
            const tabClipper = document.getElementById('tab-clipper');
            const tabClient = document.getElementById('tab-client');
            
            if (tab === 'clipper') {
                tabClipper.className = "flex-1 md:w-32 px-4 py-2 text-sm font-medium rounded-md transition-all duration-300 bg-zinc-800 text-white shadow";
                tabClient.className = "flex-1 md:w-32 px-4 py-2 text-sm font-medium rounded-md transition-all duration-300 text-zinc-400 hover:text-white";
            } else {
                tabClient.className = "flex-1 md:w-32 px-4 py-2 text-sm font-medium rounded-md transition-all duration-300 bg-zinc-800 text-white shadow";
                tabClipper.className = "flex-1 md:w-32 px-4 py-2 text-sm font-medium rounded-md transition-all duration-300 text-zinc-400 hover:text-white";
            }

            // Reset search input
            document.getElementById('searchInput').value = '';
            
            // Reset custom dropdown ke 'Semua Status'
            selectFilter('all', 'Semua Status');
        }


        // ----- MERENDER TABEL -----
        function renderTable(data) {
            const tbody = document.getElementById('userTableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';

            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                
                data.forEach(user => {
                    const isBanned = user.status === 'banned';
                    const roleName = currentTab === 'clipper' ? 'Clipper' : 'Brand / Client';
                    
                    // Badge HTML
                    const statusBadge = isBanned 
                        ? `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-bold bg-red-500/10 text-red-500 border border-red-500/20 uppercase tracking-wider"><span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>Banned</span>`
                        : `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-bold bg-green-500/10 text-green-400 border border-green-500/20 uppercase tracking-wider"><span class="w-1.5 h-1.5 rounded-full bg-green-400"></span>Active</span>`;

                    // Button HTML
                    const actionBtn = isBanned
                        ? `<button onclick="confirmAction('${user.id}', 'unban', '${user.name}')" class="px-3 py-1.5 rounded-lg border border-zinc-700 bg-zinc-800 text-zinc-300 text-xs font-semibold hover:bg-zinc-700 hover:text-white transition-colors">Unban</button>`
                        : `<button onclick="confirmAction('${user.id}', 'ban', '${user.name}')" class="px-3 py-1.5 rounded-lg border border-red-900/50 bg-red-500/10 text-red-500 text-xs font-semibold hover:bg-red-500 hover:text-white transition-colors">Ban User</button>`;

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-zinc-900/30 transition-colors";
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="flex-shrink-0 h-10 w-10 relative">
                                    <img class="h-10 w-10 rounded-full object-cover bg-zinc-800 border border-zinc-700" src="${user.avatar}" alt="">
                                </div>
                                <div class="ml-4">
                                    <div class="text-sm font-medium text-white">${user.name}</div>
                                    <div class="text-[11px] text-zinc-500">${user.email}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-xs text-zinc-400">${roleName}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            ${statusBadge}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            ${actionBtn}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }


        // ----- FILTER / SEARCH PENGGUNA -----
        function filterUsers() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            
            const filteredData = usersData[currentTab].filter(user => {
                // Check Search
                const matchSearch = user.name.toLowerCase().includes(searchQuery) || user.email.toLowerCase().includes(searchQuery);
                // Check Dropdown Filter
                const matchStatus = currentStatusFilter === 'all' || user.status === currentStatusFilter;
                
                return matchSearch && matchStatus;
            });

            renderTable(filteredData);
        }


        // ----- FUNGSI MODAL KONFIRMASI -----
        function confirmAction(id, action, name) {
            pendingAction = { id, action, name };
            
            const modalTitle = document.getElementById('confirmTitle');
            const modalMsg = document.getElementById('confirmMessage');
            const targetNameSpan = document.getElementById('targetUserName');
            const confirmBtn = document.getElementById('confirmBtn');
            const iconContainer = document.getElementById('modalIconContainer');
            const modalIcon = document.getElementById('modalIcon');

            targetNameSpan.textContent = name;

            if (action === 'ban') {
                modalTitle.textContent = "Blokir Pengguna";
                modalMsg.innerHTML = `Apakah Anda yakin ingin <b class="text-red-400">memblokir</b> <span class="font-bold text-white">${name}</span>? Mereka tidak akan bisa login lagi.`;
                
                confirmBtn.textContent = "Ya, Blokir";
                confirmBtn.className = "flex-1 py-2.5 rounded-lg bg-red-600 text-white text-sm font-semibold hover:bg-red-500 transition-colors shadow-lg shadow-red-900/20";
                
                iconContainer.className = "w-12 h-12 rounded-full bg-red-500/10 flex items-center justify-center mb-4 border border-red-500/20 mx-auto";
                modalIcon.className = "w-6 h-6 text-red-500";
                modalIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>`;
            } else {
                modalTitle.textContent = "Buka Blokir (Unban)";
                modalMsg.innerHTML = `Apakah Anda yakin ingin <b class="text-green-400">membuka blokir</b> <span class="font-bold text-white">${name}</span>? Akun akan kembali aktif.`;
                
                confirmBtn.textContent = "Ya, Unban";
                confirmBtn.className = "flex-1 py-2.5 rounded-lg bg-green-600 text-white text-sm font-semibold hover:bg-green-500 transition-colors shadow-lg shadow-green-900/20";
                
                iconContainer.className = "w-12 h-12 rounded-full bg-green-500/10 flex items-center justify-center mb-4 border border-green-500/20 mx-auto";
                modalIcon.className = "w-6 h-6 text-green-400";
                modalIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path>`;
            }

            openModal('confirmModal');
        }

        // EKSEKUSI BAN/UNBAN
        function executeAction() {
            if (!pendingAction) return;

            // Update status di array dummy
            const userIndex = usersData[currentTab].findIndex(u => u.id === pendingAction.id);
            if (userIndex !== -1) {
                usersData[currentTab][userIndex].status = pendingAction.action === 'ban' ? 'banned' : 'active';
            }

            closeModal('confirmModal');
            filterUsers(); // Render ulang tabel dan terapkan filter

            // Tampilkan modal sukses
            const successMsg = document.getElementById('successMessage');
            if (pendingAction.action === 'ban') {
                successMsg.innerHTML = `Akun <b class="text-white">${pendingAction.name}</b> telah berhasil diblokir.`;
            } else {
                successMsg.innerHTML = `Blokir untuk <b class="text-white">${pendingAction.name}</b> berhasil dibuka.`;
            }
            
            setTimeout(() => {
                openModal('successModal');
            }, 300);
        }

        // SISTEM MODAL (OPEN/CLOSE)
        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(modalId + 'Content');
            
            modal.classList.remove('modal-inactive');
            modal.classList.add('modal-active');
            
            content.classList.remove('modal-content-inactive');
            content.classList.add('modal-content-active');
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(modalId + 'Content');
            
            modal.classList.remove('modal-active');
            modal.classList.add('modal-inactive');
            
            content.classList.remove('modal-content-active');
            content.classList.add('modal-content-inactive');
            
            if (modalId === 'confirmModal') pendingAction = null;
        }

        // INITIALIZE
        document.addEventListener('DOMContentLoaded', () => {
            selectFilter('all', 'Semua Status'); // Trigger awal untuk merender tabel dengan filter bawaan
        });

        // NAVBAR ACTIVE STATE
        const ACTIVE_MENU = 'users'; 
    </script>
    
    <script src="attribute/navbaradmin.js"></script>
</body>
</html>
