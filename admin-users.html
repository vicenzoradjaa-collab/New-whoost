<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pengguna - Whoost Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        /* Animasi Modal Theme Whoost */
        .modal-active { opacity: 1; pointer-events: auto; }
        .modal-inactive { opacity: 0; pointer-events: none; }
        .modal-content-active { transform: scale(1) translateY(0); }
        .modal-content-inactive { transform: scale(0.95) translateY(10px); }
    </style>
</head>
<body class="antialiased selection:bg-blue-500 selection:text-white flex flex-col relative w-full h-full">

    <!-- Background Ornamen -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-20%] right-[-10%] w-[50rem] h-[50rem] bg-blue-900/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- HEADER ADMIN -->
    <header class="h-20 sm:h-24 flex items-center justify-between px-4 sm:px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md z-20 flex-shrink-0 w-full">
        <div class="flex items-center gap-3 sm:gap-4">
            <img src="asset/logow.webp" alt="Whoost Admin Logo" class="h-6 sm:h-10 w-auto object-contain" onerror="this.src='https://via.placeholder.com/100x40?text=WHOOST'">
            <div class="h-5 sm:h-6 w-px bg-zinc-800 hidden sm:block"></div>
            <h1 class="text-lg sm:text-xl md:text-2xl font-semibold tracking-tight text-blue-400">Kelola Pengguna</h1>
        </div>
        <div></div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 sm:px-8 py-6 pb-20 z-0 scroll-smooth w-full relative">
        <div class="max-w-6xl mx-auto space-y-6">
            
            <!-- CONTROLS: TABS, DROPDOWN & SEARCH -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                
                <!-- Tabs -->
                <div class="flex bg-cardBg border border-zinc-800 rounded-lg p-1 w-full md:w-auto shrink-0 shadow-lg">
                    <button onclick="window.switchTab('clipper')" id="tab-clipper" class="flex-1 md:w-32 px-4 py-2 text-sm font-medium rounded-md transition-all duration-300 bg-zinc-800 text-white shadow">
                        Clipper
                    </button>
                    <button onclick="window.switchTab('client')" id="tab-client" class="flex-1 md:w-32 px-4 py-2 text-sm font-medium rounded-md transition-all duration-300 text-zinc-400 hover:text-white">
                        Client / Brand
                    </button>
                </div>

                <!-- Filters & Search -->
                <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto relative">
                    
                    <!-- CUSTOM DROPDOWN STATUS FILTER -->
                    <div class="relative w-full sm:w-44" id="customDropdownContainer">
                        <button id="dropdownBtn" onclick="window.toggleDropdown()" class="flex items-center justify-between w-full pl-3 pr-3 py-2.5 border border-zinc-800 rounded-lg bg-cardBg text-zinc-300 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 hover:border-zinc-600 transition-colors shadow-lg">
                            <span id="dropdownSelectedText">Semua Status</span>
                            <svg class="w-4 h-4 text-zinc-500 transition-transform duration-200" id="dropdownIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        
                        <!-- Dropdown Menu Item -->
                        <div id="dropdownMenu" class="absolute z-[60] w-full mt-1 bg-zinc-900 border border-zinc-700 rounded-lg shadow-2xl opacity-0 invisible transform scale-95 transition-all duration-200 origin-top-right overflow-hidden">
                            <div class="py-1">
                                <div onclick="window.selectFilter('all', 'Semua Status')" class="cursor-pointer px-3 py-2.5 text-sm text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors flex items-center justify-between group">
                                    Semua Status
                                    <svg class="w-4 h-4 text-blue-500 hidden" id="check-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <div onclick="window.selectFilter('active', 'Active')" class="cursor-pointer px-3 py-2.5 text-sm text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors flex items-center justify-between group">
                                    Active
                                    <svg class="w-4 h-4 text-green-400 hidden" id="check-active" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <div onclick="window.selectFilter('banned', 'Banned')" class="cursor-pointer px-3 py-2.5 text-sm text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors flex items-center justify-between group">
                                    Banned
                                    <svg class="w-4 h-4 text-red-400 hidden" id="check-banned" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Search Input -->
                    <div class="relative w-full sm:w-72">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input type="text" id="searchInput" onkeyup="window.filterUsers()" placeholder="Cari nama atau email..." class="block w-full pl-10 pr-3 py-2.5 border border-zinc-800 rounded-lg leading-5 bg-cardBg text-zinc-300 placeholder-zinc-500 focus:outline-none focus:border-blue-500 transition-colors shadow-lg sm:text-sm">
                    </div>
                </div>
            </div>

            <!-- TABLE CONTAINER -->
            <div class="bg-cardBg border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl relative min-h-[300px]">
                
                <!-- Loading State Tabel -->
                <div id="tableLoader" class="absolute inset-0 bg-cardBg/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                    <svg class="w-10 h-10 text-blue-500 animate-spin mb-3" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <span class="text-sm text-zinc-400 font-medium tracking-wide">Memuat Pengguna...</span>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-zinc-800/50">
                        <thead class="bg-zinc-900/80">
                            <tr>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-zinc-400 uppercase tracking-wider">Pengguna (Nama & Email Google)</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-zinc-400 uppercase tracking-wider">Role</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-zinc-400 uppercase tracking-wider">Status Akun</th>
                                <th scope="col" class="px-6 py-4 text-right text-xs font-semibold text-zinc-400 uppercase tracking-wider">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody" class="divide-y divide-zinc-800/50 bg-transparent">
                            <!-- Data Table -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Empty State -->
                <div id="emptyState" class="hidden flex-col items-center justify-center py-16 px-4 text-center">
                    <svg class="w-14 h-14 text-zinc-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <h3 class="text-base font-semibold text-zinc-300">Pengguna tidak ditemukan</h3>
                    <p class="text-xs text-zinc-500 mt-1">Coba gunakan kata kunci pencarian atau filter yang lain.</p>
                </div>
            </div>

        </div>
    </main>

    <!-- MODAL KONFIRMASI (BAN/UNBAN/PREMIUM) THEMA WHOOST -->
    <div id="confirmModal" class="fixed inset-0 z-[1000] flex items-center justify-center modal-inactive transition-all duration-300">
        <!-- Overlay -->
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="window.closeModal('confirmModal')"></div>
        
        <!-- Box Modal -->
        <div id="confirmModalContent" class="bg-cardBg border border-zinc-700 shadow-2xl relative z-10 w-[90%] max-w-sm p-6 rounded-2xl flex flex-col items-center text-center transform modal-content-inactive transition-transform duration-300 overflow-hidden">
            <!-- Glow Background Effect -->
            <div id="confirmGlow" class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 blur-[50px] opacity-20 pointer-events-none"></div>

            <div class="w-14 h-14 rounded-full flex items-center justify-center mb-4 border-4 relative z-10" id="modalIconContainer">
                <svg id="modalIcon" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
            </div>
            
            <h3 id="confirmTitle" class="text-xl font-bold text-white mb-2 relative z-10">Konfirmasi</h3>
            <p id="confirmMessage" class="text-[13px] text-zinc-400 mb-6 leading-relaxed relative z-10">
                Pesan Konfirmasi
            </p>
            
            <div class="flex gap-3 w-full relative z-10">
                <button onclick="window.closeModal('confirmModal')" class="flex-1 py-3 rounded-xl border border-zinc-700 bg-zinc-800 text-white text-[13px] font-semibold hover:bg-zinc-700 transition-colors disabled:opacity-50" id="btnCancel">Batal</button>
                <button id="confirmBtn" onclick="window.executeAction()" class="flex-1 py-3 rounded-xl text-white text-[13px] font-semibold transition-all shadow-lg disabled:opacity-50">Lanjutkan</button>
            </div>
        </div>
    </div>

    <!-- MODAL SUKSES THEMA WHOOST -->
    <div id="successModal" class="fixed inset-0 z-[1000] flex items-center justify-center modal-inactive transition-all duration-300">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="window.closeModal('successModal')"></div>
        <div id="successModalContent" class="bg-cardBg border border-zinc-700 shadow-2xl relative z-10 w-[90%] max-w-sm p-6 rounded-2xl flex flex-col items-center text-center transform modal-content-inactive transition-transform duration-300 overflow-hidden">
            <!-- Glow Green -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-green-500 blur-[50px] opacity-20 pointer-events-none"></div>

            <div class="w-14 h-14 rounded-full bg-green-500/10 flex items-center justify-center mb-4 border-4 border-green-500/20 relative z-10 text-green-500">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2 relative z-10">Berhasil!</h3>
            <p id="successMessage" class="text-[13px] text-zinc-400 mb-6 relative z-10 leading-relaxed">Aksi berhasil dilakukan.</p>
            <button onclick="window.closeModal('successModal')" class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white text-[13px] font-bold transition-colors shadow-lg shadow-blue-900/20 relative z-10">Tutup</button>
        </div>
    </div>

    <script>const ACTIVE_MENU = 'users';</script>
    <script src="attribute/navbaradmin.js"></script>

    <!-- SUPABASE INTEGRATION -->
    <script type="module">
        import { supabase } from './authentication/auth.js';

        // GLOBAL VARIABLES
        window.usersData = { clipper: [], client: [] };
        window.currentTab = 'clipper';
        window.currentStatusFilter = 'all';
        window.pendingAction = null; 

        document.addEventListener('DOMContentLoaded', async () => {
            await loadUsersFromDB();
            window.selectFilter('all', 'Semua Status'); 
        });

        // ----- PULL DATA DARI SUPABASE -----
        async function loadUsersFromDB() {
            document.getElementById('tableLoader').style.display = 'flex';
            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data) {
                    window.usersData.clipper = data.filter(u => (u.role || '').toLowerCase() === 'clipper');
                    window.usersData.client = data.filter(u => ['client', 'brand'].includes((u.role || '').toLowerCase()));
                }
            } catch (err) {
                console.error("Gagal memuat pengguna:", err);
            } finally {
                document.getElementById('tableLoader').style.display = 'none';
                window.filterUsers(); 
            }
        }


        // ----- SISTEM CUSTOM DROPDOWN -----
        window.toggleDropdown = function() {
            const menu = document.getElementById('dropdownMenu');
            const icon = document.getElementById('dropdownIcon');
            
            if (menu.classList.contains('invisible')) {
                menu.classList.remove('invisible', 'opacity-0', 'scale-95');
                menu.classList.add('visible', 'opacity-100', 'scale-100');
                icon.classList.add('rotate-180');
            } else {
                window.closeDropdown();
            }
        };

        window.closeDropdown = function() {
            const menu = document.getElementById('dropdownMenu');
            const icon = document.getElementById('dropdownIcon');
            menu.classList.add('invisible', 'opacity-0', 'scale-95');
            menu.classList.remove('visible', 'opacity-100', 'scale-100');
            icon.classList.remove('rotate-180');
        };

        window.selectFilter = function(value, textName) {
            window.currentStatusFilter = value;
            document.getElementById('dropdownSelectedText').textContent = textName;
            
            document.getElementById('check-all').classList.add('hidden');
            document.getElementById('check-active').classList.add('hidden');
            document.getElementById('check-banned').classList.add('hidden');
            document.getElementById('check-' + value).classList.remove('hidden');

            window.closeDropdown();
            window.filterUsers(); 
        };

        document.addEventListener('click', (event) => {
            const container = document.getElementById('customDropdownContainer');
            if (container && !container.contains(event.target)) {
                window.closeDropdown();
            }
        });


        // ----- MENGUBAH TAB -----
        window.switchTab = function(tab) {
            window.currentTab = tab;
            
            const tabClipper = document.getElementById('tab-clipper');
            const tabClient = document.getElementById('tab-client');
            
            if (tab === 'clipper') {
                tabClipper.className = "flex-1 md:w-32 px-4 py-2 text-sm font-medium rounded-md transition-all duration-300 bg-zinc-800 text-white shadow";
                tabClient.className = "flex-1 md:w-32 px-4 py-2 text-sm font-medium rounded-md transition-all duration-300 text-zinc-400 hover:text-white";
            } else {
                tabClient.className = "flex-1 md:w-32 px-4 py-2 text-sm font-medium rounded-md transition-all duration-300 bg-zinc-800 text-white shadow";
                tabClipper.className = "flex-1 md:w-32 px-4 py-2 text-sm font-medium rounded-md transition-all duration-300 text-zinc-400 hover:text-white";
            }

            document.getElementById('searchInput').value = '';
            window.selectFilter('all', 'Semua Status');
        };


        // ----- MERENDER TABEL -----
        window.renderTable = function(data) {
            const tbody = document.getElementById('userTableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';

            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                
                data.forEach(user => {
                    const fullName = user.full_name || 'Tanpa Nama';
                    const email = user.email || 'Email belum disinkronkan';
                    const userStatus = user.status || 'active';
                    const isBanned = userStatus === 'banned';
                    const isPremium = user.is_premium || false;
                    
                    let initials = fullName.substring(0,2).toUpperCase();
                    let avatarHtml = '';
                    if (user.avatar_url && user.avatar_url.trim() !== '') {
                        avatarHtml = `<img class="h-10 w-10 rounded-full object-cover bg-zinc-800 border border-zinc-700 shrink-0 shadow-md" src="${user.avatar_url}" alt="${fullName}">`;
                    } else {
                        avatarHtml = `<div class="h-10 w-10 rounded-full bg-zinc-800 flex items-center justify-center shrink-0 border border-zinc-700 shadow-md">
                            <span class="text-white font-bold text-sm tracking-widest">${initials}</span>
                        </div>`;
                    }

                    // Role & Premium Badge
                    let roleHtml = '';
                    if (window.currentTab === 'clipper') {
                        if (isPremium) {
                            roleHtml = `
                                <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[10px] font-bold bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 uppercase tracking-wider shadow-sm">
                                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                                    Premium
                                </span>`;
                        } else {
                            roleHtml = `<span class="text-[11px] text-zinc-400 font-medium px-2.5 py-1 bg-zinc-800/50 rounded-md border border-zinc-800">Clipper</span>`;
                        }
                    } else {
                        roleHtml = `<span class="text-[11px] text-zinc-400 font-medium px-2.5 py-1 bg-zinc-800/50 rounded-md border border-zinc-800">Brand / Client</span>`;
                    }
                    
                    // Status Badge (Banned memilki warna kontras merah)
                    const statusBadge = isBanned 
                        ? `<span class="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-full text-[10px] font-bold bg-red-500/10 text-red-500 border border-red-500/20 uppercase tracking-widest"><span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>Banned</span>`
                        : `<span class="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-full text-[10px] font-bold bg-green-500/10 text-green-400 border border-green-500/20 uppercase tracking-widest"><span class="w-1.5 h-1.5 rounded-full bg-green-400"></span>Active</span>`;

                    // Tombol Aksi Premium
                    let premiumBtn = '';
                    if (window.currentTab === 'clipper') {
                        if (isPremium) {
                            premiumBtn = `<button onclick="window.confirmAction('${user.id}', 'removePremium', '${fullName.replace(/'/g, "\\'")}')" class="px-3.5 py-2 rounded-xl border border-zinc-700 bg-zinc-800 text-zinc-400 text-xs font-semibold hover:bg-zinc-700 hover:text-white transition-all">Cabut Premium</button>`;
                        } else {
                            premiumBtn = `<button onclick="window.confirmAction('${user.id}', 'addPremium', '${fullName.replace(/'/g, "\\'")}')" class="px-3.5 py-2 rounded-xl border border-yellow-500/30 bg-yellow-500/10 text-yellow-500 text-xs font-semibold hover:bg-yellow-500 hover:text-zinc-900 transition-all shadow-sm">Set Premium</button>`;
                        }
                    }

                    // Tombol Aksi Banned
                    const banBtn = isBanned
                        ? `<button onclick="window.confirmAction('${user.id}', 'unban', '${fullName.replace(/'/g, "\\'")}')" class="px-3.5 py-2 rounded-xl border border-zinc-700 bg-zinc-800 text-zinc-300 text-xs font-semibold hover:bg-green-600 hover:border-green-500 hover:text-white transition-all">Unban User</button>`
                        : `<button onclick="window.confirmAction('${user.id}', 'ban', '${fullName.replace(/'/g, "\\'")}')" class="px-3.5 py-2 rounded-xl border border-red-900/50 bg-red-500/10 text-red-500 text-xs font-semibold hover:bg-red-600 hover:text-white transition-all shadow-sm">Ban User</button>`;

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-zinc-800/30 transition-colors group";
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center gap-4">
                                ${avatarHtml}
                                <div class="flex flex-col">
                                    <span class="text-[14px] font-bold text-white group-hover:text-blue-400 transition-colors">${fullName}</span>
                                    <span class="text-[12px] text-zinc-400 mt-0.5 flex items-center gap-1">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                        ${email}
                                    </span>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap align-middle">
                            ${roleHtml}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap align-middle">
                            ${statusBadge}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right align-middle">
                            <div class="flex items-center justify-end gap-2.5">
                                ${premiumBtn}
                                ${banBtn}
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        };


        // ----- FILTER PENGGUNA (SEARCH & DROPDOWN) -----
        window.filterUsers = function() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            
            const filteredData = window.usersData[window.currentTab].filter(user => {
                const fullName = (user.full_name || '').toLowerCase();
                const email = (user.email || '').toLowerCase();
                const userStatus = user.status || 'active';

                const matchSearch = fullName.includes(searchQuery) || email.includes(searchQuery);
                const matchStatus = window.currentStatusFilter === 'all' || userStatus === window.currentStatusFilter;
                
                return matchSearch && matchStatus;
            });

            window.renderTable(filteredData);
        };


        // ----- MODAL KONFIRMASI AKSI (DENGAN TEMA WHOOST) -----
        window.confirmAction = function(id, action, name) {
            window.pendingAction = { id, action, name };
            
            const modalTitle = document.getElementById('confirmTitle');
            const modalMsg = document.getElementById('confirmMessage');
            const confirmBtn = document.getElementById('confirmBtn');
            const iconContainer = document.getElementById('modalIconContainer');
            const modalIcon = document.getElementById('modalIcon');
            const glow = document.getElementById('confirmGlow');

            if (action === 'ban') {
                glow.className = "absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-red-500 blur-[50px] opacity-20 pointer-events-none";
                modalTitle.textContent = "Blokir Akses Login?";
                modalMsg.innerHTML = `Akun <span class="font-bold text-white">${name}</span> akan diblokir (banned). Mereka tidak akan bisa login atau menggunakan fitur platform.`;
                confirmBtn.textContent = "Ya, Blokir";
                confirmBtn.className = "flex-1 py-3 rounded-xl bg-red-600 hover:bg-red-500 text-white text-[13px] font-semibold transition-all shadow-lg shadow-red-900/20";
                iconContainer.className = "w-14 h-14 rounded-full bg-red-500/10 flex items-center justify-center mb-4 border-4 border-red-500/20 relative z-10 text-red-500";
                modalIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>`;
            } 
            else if (action === 'unban') {
                glow.className = "absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-green-500 blur-[50px] opacity-20 pointer-events-none";
                modalTitle.textContent = "Buka Blokir?";
                modalMsg.innerHTML = `Akun <span class="font-bold text-white">${name}</span> akan di-unban. Mereka akan dapat login dan menggunakan platform kembali.`;
                confirmBtn.textContent = "Ya, Buka Blokir";
                confirmBtn.className = "flex-1 py-3 rounded-xl bg-green-600 hover:bg-green-500 text-white text-[13px] font-semibold transition-all shadow-lg shadow-green-900/20";
                iconContainer.className = "w-14 h-14 rounded-full bg-green-500/10 flex items-center justify-center mb-4 border-4 border-green-500/20 relative z-10 text-green-500";
                modalIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path>`;
            } 
            else if (action === 'addPremium') {
                glow.className = "absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-yellow-500 blur-[50px] opacity-20 pointer-events-none";
                modalTitle.textContent = "Jadikan Premium?";
                modalMsg.innerHTML = `<span class="font-bold text-white">${name}</span> akan mendapatkan status <b class="text-yellow-400">Premium</b> dan membuka semua fitur khusus.`;
                confirmBtn.textContent = "Setuju (Premium)";
                confirmBtn.className = "flex-1 py-3 rounded-xl bg-yellow-500 hover:bg-yellow-400 text-zinc-900 text-[13px] font-bold transition-all shadow-lg shadow-yellow-900/20";
                iconContainer.className = "w-14 h-14 rounded-full bg-yellow-500/10 flex items-center justify-center mb-4 border-4 border-yellow-500/20 relative z-10 text-yellow-500";
                modalIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>`;
            } 
            else if (action === 'removePremium') {
                glow.className = "absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-zinc-500 blur-[50px] opacity-20 pointer-events-none";
                modalTitle.textContent = "Cabut Akses Premium?";
                modalMsg.innerHTML = `Status Premium milik <span class="font-bold text-white">${name}</span> akan dicabut. Mereka akan menjadi pengguna reguler.`;
                confirmBtn.textContent = "Ya, Cabut";
                confirmBtn.className = "flex-1 py-3 rounded-xl bg-zinc-200 hover:bg-white text-zinc-900 text-[13px] font-bold transition-all shadow-lg";
                iconContainer.className = "w-14 h-14 rounded-full bg-zinc-800 flex items-center justify-center mb-4 border-4 border-zinc-700 relative z-10 text-zinc-400";
                modalIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>`;
            }

            window.openModal('confirmModal');
        };

        // ----- EXECUTE AKSI KE SUPABASE -----
        window.executeAction = async function() {
            if (!window.pendingAction) return;

            const confirmBtn = document.getElementById('confirmBtn');
            const originalText = confirmBtn.textContent;
            
            confirmBtn.disabled = true;
            confirmBtn.textContent = "Memproses...";
            document.getElementById('btnCancel').disabled = true;

            try {
                let updateData = {};
                if (window.pendingAction.action === 'ban') updateData = { status: 'banned' };
                else if (window.pendingAction.action === 'unban') updateData = { status: 'active' };
                else if (window.pendingAction.action === 'addPremium') updateData = { is_premium: true };
                else if (window.pendingAction.action === 'removePremium') updateData = { is_premium: false };

                // Kirim Update ke DB
                const { error } = await supabase.from('profiles').update(updateData).eq('id', window.pendingAction.id);
                if (error) throw error;

                window.closeModal('confirmModal');
                await loadUsersFromDB(); 

                // Tampilkan Modal Sukses
                const successMsg = document.getElementById('successMessage');
                if (window.pendingAction.action === 'ban') {
                    successMsg.innerHTML = `Akun <b class="text-white">${window.pendingAction.name}</b> telah berhasil diblokir (Banned).`;
                } else if (window.pendingAction.action === 'unban') {
                    successMsg.innerHTML = `Blokir untuk <b class="text-white">${window.pendingAction.name}</b> berhasil dibuka (Active).`;
                } else if (window.pendingAction.action === 'addPremium') {
                    successMsg.innerHTML = `Status Premium berhasil diberikan kepada <b class="text-white">${window.pendingAction.name}</b>.`;
                } else if (window.pendingAction.action === 'removePremium') {
                    successMsg.innerHTML = `Status Premium berhasil dicabut dari <b class="text-white">${window.pendingAction.name}</b>.`;
                }
                
                setTimeout(() => { window.openModal('successModal'); }, 300);

            } catch (err) {
                alert("Gagal memproses aksi: " + err.message);
                window.closeModal('confirmModal');
            } finally {
                confirmBtn.disabled = false;
                confirmBtn.textContent = originalText;
                document.getElementById('btnCancel').disabled = false;
            }
        };


        // ----- SISTEM MODAL UTILITY -----
        window.openModal = function(modalId) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(modalId + 'Content');
            
            modal.classList.remove('modal-inactive');
            modal.classList.add('modal-active');
            
            content.classList.remove('modal-content-inactive');
            content.classList.add('modal-content-active');
        };

        window.closeModal = function(modalId) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(modalId + 'Content');
            
            modal.classList.remove('modal-active');
            modal.classList.add('modal-inactive');
            
            content.classList.remove('modal-content-active');
            content.classList.add('modal-content-inactive');
            
            if (modalId === 'confirmModal') window.pendingAction = null;
        };

    </script>
</body>
</html>
