<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Campaign - Admin Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .bg-dots-card {
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 12px 12px;
        }
    </style>
</head>
<body class="antialiased selection:bg-blue-500 selection:text-white flex flex-col relative w-full h-full">

    <!-- LOADING SCREEN -->
    <div id="pageLoader" class="fixed inset-0 z-[9999] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative flex flex-col items-center">
            <div class="absolute inset-0 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-blue-600/20 blur-[40px] rounded-full w-32 h-32 animate-pulse"></div>
            <img src="asset/logow.webp" alt="Whoost Admin Logo" class="h-10 sm:h-12 w-auto object-contain relative z-10 animate-bounce" style="animation-duration: 2s;">
            <p class="mt-6 text-zinc-500 text-[11px] sm:text-xs font-semibold tracking-widest uppercase animate-pulse">Memuat Data Campaign...</p>
        </div>
    </div>

    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-20%] right-[-10%] w-[50rem] h-[50rem] bg-blue-900/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- HEADER ADMIN (PROFIL DIHAPUS) -->
    <header class="h-20 sm:h-24 flex items-center justify-between px-4 sm:px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md z-20 flex-shrink-0 w-full">
        <div class="flex items-center gap-3 sm:gap-4">
            <a href="admin-dashboard.html" class="hover:opacity-80 transition-opacity flex-shrink-0 mr-1 sm:mr-2">
                <img src="asset/logow.webp" alt="Whoost Admin Logo" class="h-6 sm:h-10 w-auto object-contain">
            </a>
            <div class="h-5 sm:h-6 w-px bg-zinc-800 hidden sm:block"></div>
            <div>
                <h1 class="text-lg sm:text-xl md:text-2xl font-semibold tracking-tight text-white leading-tight">Kelola Campaign</h1>
                <p class="text-[10px] sm:text-xs text-zinc-500 hidden sm:block mt-0.5">Pantau & kelola semua campaign dari client</p>
            </div>
        </div>
    </header>

    <!-- TOOLBAR (CARI, FILTER, TAMBAH) -->
    <div class="px-4 sm:px-8 py-4 sm:py-6 z-10 flex flex-wrap gap-3 sm:gap-4 items-center justify-between bg-darkBg flex-shrink-0 w-full border-b border-zinc-800/30">
        <div class="flex flex-1 sm:flex-none items-center gap-3 w-full sm:w-auto">
            <div class="relative w-full sm:w-72">
                <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="search-input" placeholder="Cari campaign atau brand..." class="w-full bg-cardBg border border-zinc-800 rounded-xl pl-10 pr-4 py-2.5 text-[13px] text-white placeholder-zinc-500 focus:outline-none focus:border-blue-500 transition-colors">
            </div>
            
            <!-- Custom Select Filter -->
            <select id="filter-select" class="bg-cardBg border border-zinc-800 p-2.5 rounded-xl hover:bg-zinc-800 transition-colors text-zinc-400 focus:border-blue-500 focus:outline-none text-[13px] cursor-pointer appearance-none px-4">
                <option value="ALL">Semua Status</option>
                <option value="ACTIVE">Active</option>
                <option value="HOLDING">Holding</option>
                <option value="CLOSED">Closed</option>
            </select>
        </div>
        
        <a href="admin-addcampaign.html" class="w-full sm:w-auto px-5 py-2.5 bg-blue-600 text-white text-[13px] font-semibold rounded-xl hover:bg-blue-500 transition-colors flex items-center justify-center gap-2 shadow-lg shadow-blue-600/20">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
            Buat Campaign
        </a>
    </div>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 overflow-y-auto px-4 sm:px-8 py-6 pb-32 scroll-smooth">
        <!-- Container Grid Dinamis -->
        <div id="campaign-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 z-10 relative">
            <p class="text-zinc-500 text-sm col-span-full text-center py-10">Memuat data...</p>
        </div>
    </main>

    <!-- SCRIPT (SUPABASE & LOGIC) -->
    <script type="module">
        import { supabase } from './authentication/auth.js';

        let allCampaigns = [];

        document.addEventListener('DOMContentLoaded', async () => {
            setTimeout(() => {
                const loader = document.getElementById('pageLoader');
                loader.classList.add('opacity-0');
                setTimeout(() => loader.style.display = 'none', 500);
            }, 800);

            await fetchCampaigns();
            
            // Event Listeners for Search & Filter
            document.getElementById('search-input').addEventListener('input', applyFilters);
            document.getElementById('filter-select').addEventListener('change', applyFilters);
        });

        async function fetchCampaigns() {
            const { data, error } = await supabase
                .from('campaigns')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error fetching campaigns:", error);
                document.getElementById('campaign-grid').innerHTML = `<p class="text-red-500 text-sm col-span-full text-center py-10">Gagal memuat data.</p>`;
                return;
            }
            allCampaigns = data || [];
            applyFilters();
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const statusFilter = document.getElementById('filter-select').value;

            const filtered = allCampaigns.filter(camp => {
                const matchSearch = camp.title.toLowerCase().includes(searchTerm) || camp.brand_name.toLowerCase().includes(searchTerm);
                const matchStatus = statusFilter === 'ALL' || camp.status === statusFilter;
                return matchSearch && matchStatus;
            });

            renderCampaigns(filtered);
        }

        function renderCampaigns(campaigns) {
            const grid = document.getElementById('campaign-grid');
            
            if (campaigns.length === 0) {
                grid.innerHTML = `<p class="text-zinc-500 text-sm col-span-full text-center py-10">Tidak ada campaign yang ditemukan.</p>`;
                return;
            }

            let html = '';
            campaigns.forEach(camp => {
                // Menentukan Tema Warna berdasarkan Status
                let statusColor = 'border-green-900/50 bg-green-900/20 text-green-400';
                let cardOpacity = 'opacity-100 hover:border-zinc-500';
                let imgOpacity = 'opacity-30';
                
                if(camp.status === 'HOLDING') {
                    statusColor = 'border-amber-900/50 bg-amber-900/20 text-amber-400';
                    cardOpacity = 'opacity-100 border-amber-900/30 hover:border-amber-500/50';
                } else if(camp.status === 'CLOSED') {
                    statusColor = 'border-blue-900/50 bg-blue-900/20 text-blue-400';
                    cardOpacity = 'opacity-70 hover:opacity-100 border-zinc-800/80';
                    imgOpacity = 'opacity-20 grayscale';
                }

                // Kalkulasi Progress
                const percentage = camp.budget_total > 0 ? Math.round((camp.budget_remaining / camp.budget_total) * 100) : 0;
                
                // Format Harga
                const formattedPrice = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(camp.payment_type === 'video' ? camp.price_per_video : camp.reward_per_1k);
                const priceLabel = camp.payment_type === 'video' ? '/ video' : '/ 1k views';
                const firstWord = camp.title.split(' ')[0].toUpperCase();

                html += `
                <div class="w-full campaign-card bg-cardBg border rounded-[1.25rem] md:rounded-[1.5rem] p-3 md:p-4 flex flex-col h-full hover:-translate-y-1 transition-all duration-300 shadow-xl group ${cardOpacity}">
                    <div class="w-full h-24 md:h-32 bg-zinc-950 rounded-xl mb-3 md:mb-4 flex flex-col items-center justify-center relative overflow-hidden bg-dots-card shrink-0">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#121214] via-transparent to-transparent z-0 opacity-80"></div>
                        ${camp.banner_url ? `<img src="${camp.banner_url}" class="absolute inset-0 w-full h-full object-cover mix-blend-screen group-hover:scale-105 transition-transform duration-500 ${imgOpacity}">` : ''}
                        <h3 class="text-base md:text-xl font-black text-white relative z-10 tracking-tighter">${firstWord}</h3>
                        <p class="text-zinc-400 font-black text-[7px] md:text-[9px] tracking-[0.2em] relative z-10 mt-0.5">${camp.type === 'ugc' ? 'UGC' : 'CLIPPING'}</p>
                    </div>
                    
                    <div class="flex justify-between items-center mb-2 md:mb-3">
                        <div class="flex items-center gap-1.5 overflow-hidden pr-2">
                            <div class="w-5 h-5 shrink-0 rounded-full bg-white text-black font-extrabold flex items-center justify-center text-[8px]">${camp.brand_initial || 'WH'}</div>
                            <span class="text-[9px] md:text-[11px] font-bold text-zinc-300 hover:text-white transition truncate">${camp.brand_name}</span>
                        </div>
                        <div class="shrink-0 px-1.5 py-0.5 rounded-full border text-[7px] md:text-[8px] font-bold tracking-wider ${statusColor}">${camp.status}</div>
                    </div>
                    
                    <h4 class="text-xs md:text-sm font-bold text-white mb-1.5 md:mb-2 truncate group-hover:text-zinc-300 transition-colors" title="${camp.title}">${camp.title}</h4>
                    
                    <div class="mb-3 flex items-baseline gap-1">
                        <span class="text-sm md:text-lg font-extrabold text-white tracking-tight">${formattedPrice}</span>
                        <span class="text-zinc-500 text-[8px] md:text-[10px] font-bold">${priceLabel}</span>
                    </div>
                    
                    <div class="flex flex-wrap items-center gap-1.5 mb-4">
                        <div class="flex items-center px-1.5 py-1 rounded-md border border-zinc-800 bg-zinc-900/50">
                            <span class="text-[7px] md:text-[9px] font-bold text-zinc-400 uppercase tracking-wider">${camp.niche}</span>
                        </div>
                    </div>
                    
                    <div class="mt-auto pt-2">
                        <div class="flex justify-between items-end mb-1.5">
                            <span class="text-[8px] md:text-[10px] text-zinc-400 font-semibold">Budget Tersisa</span>
                            <span class="text-[8px] md:text-[10px] font-black text-white">${percentage}%</span>
                        </div>
                        <div class="w-full h-1 md:h-1.5 bg-zinc-800 rounded-full overflow-hidden mb-3">
                            <div class="h-full bg-white rounded-full w-[${percentage}%]"></div>
                        </div>
                        
                        <!-- Tombol Aksi -->
                        <div class="grid grid-cols-2 gap-1.5 md:gap-2">
                            <a href="detail-campaign.html?id=${camp.id}" class="w-full bg-zinc-900 border border-zinc-700 text-white py-1.5 rounded-lg font-bold text-[9px] md:text-[11px] hover:bg-zinc-800 transition-all flex items-center justify-center gap-1">Lihat</a>
                            
                            <a href="admin-editcampaign.html?id=${camp.id}" class="w-full bg-zinc-800 border border-zinc-600 text-white py-1.5 rounded-lg font-bold text-[9px] md:text-[11px] hover:border-blue-500 hover:text-blue-400 transition-all flex items-center justify-center gap-1">
                                <svg class="w-2.5 h-2.5 md:w-3 md:h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg> Edit
                            </a>
                        </div>
                    </div>
                </div>`;
            });
            
            grid.innerHTML = html;
        }
    </script>
    
    <script>const ACTIVE_MENU = 'campaign';</script>
    <script src="attribute/navbaradmin.js"></script>
</body>
</html>
