<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Campaign - Admin Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .bg-dots-card {
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 12px 12px;
        }
    </style>
</head>
<body class="antialiased selection:bg-blue-500 selection:text-white flex flex-col relative w-full h-full">

    <!-- LOADING SCREEN -->
    <div id="pageLoader" class="fixed inset-0 z-[9999] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative flex flex-col items-center">
            <div class="absolute inset-0 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-blue-600/20 blur-[40px] rounded-full w-32 h-32 animate-pulse"></div>
            <img src="asset/logow.webp" alt="Whoost Admin Logo" class="h-10 sm:h-12 w-auto object-contain relative z-10 animate-bounce" style="animation-duration: 2s;">
            <p class="mt-6 text-zinc-500 text-[11px] sm:text-xs font-semibold tracking-widest uppercase animate-pulse">Memuat Data Campaign...</p>
        </div>
    </div>

    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-20%] right-[-10%] w-[50rem] h-[50rem] bg-blue-900/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- HEADER ADMIN -->
    <header class="h-20 sm:h-24 flex items-center justify-between px-4 sm:px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md z-20 flex-shrink-0 w-full">
        <div class="flex items-center gap-3 sm:gap-4">
            <a href="admin-dashboard.html" class="hover:opacity-80 transition-opacity flex-shrink-0 mr-1 sm:mr-2">
                <img src="asset/logow.webp" alt="Whoost Admin Logo" class="h-6 sm:h-10 w-auto object-contain">
            </a>
            <div class="h-5 sm:h-6 w-px bg-zinc-800 hidden sm:block"></div>
            <div>
                <h1 class="text-lg sm:text-xl md:text-2xl font-semibold tracking-tight text-white leading-tight">Kelola Campaign</h1>
                <p class="text-[10px] sm:text-xs text-zinc-500 hidden sm:block mt-0.5">Pantau & kelola semua campaign dari client</p>
            </div>
        </div>
    </header>

    <!-- TOOLBAR (CARI, FILTER, TAMBAH) -->
    <div class="px-4 sm:px-8 py-4 sm:py-6 z-10 flex flex-wrap gap-3 sm:gap-4 items-center justify-between bg-darkBg flex-shrink-0 w-full border-b border-zinc-800/30">
        <div class="flex flex-1 sm:flex-none items-center gap-3 w-full sm:w-auto">
            <div class="relative w-full sm:w-72">
                <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="search-input" placeholder="Cari campaign atau brand..." class="w-full bg-cardBg border border-zinc-800 rounded-xl pl-10 pr-4 py-2.5 text-[13px] text-white placeholder-zinc-500 focus:outline-none focus:border-blue-500 transition-colors">
            </div>
            
            <select id="filter-select" class="bg-cardBg border border-zinc-800 p-2.5 rounded-xl hover:bg-zinc-800 transition-colors text-zinc-400 focus:border-blue-500 focus:outline-none text-[13px] cursor-pointer appearance-none px-4">
                <option value="ALL">Semua Status</option>
                <option value="ACTIVE">Active</option>
                <option value="HOLDING">Holding</option>
                <option value="CLOSED">Closed</option>
            </select>
        </div>
        
        <a href="admin-addcampaign.html" class="w-full sm:w-auto px-5 py-2.5 bg-blue-600 text-white text-[13px] font-semibold rounded-xl hover:bg-blue-500 transition-colors flex items-center justify-center gap-2 shadow-lg shadow-blue-600/20">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
            Buat Campaign
        </a>
    </div>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 overflow-y-auto px-4 sm:px-8 py-6 pb-32 scroll-smooth">
        <!-- Container Grid Dinamis -->
        <div id="campaign-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 z-10 relative">
            <p class="text-zinc-500 text-sm col-span-full text-center py-10">Memuat data...</p>
        </div>
    </main>

    <!-- SCRIPT (SUPABASE & LOGIC) -->
    <script type="module">
        import { supabase, enforceRoleProtection } from './authentication/auth.js';

        let allCampaigns = [];

        // FUNGSI ANTI-XSS
        function escapeHTML(str) {
            if (!str) return '';
            return str.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // 1. CEK PROTEKSI ROLE
                if (typeof enforceRoleProtection === 'function') {
                    await enforceRoleProtection();
                }

                // 2. DOUBLE CHECK KHUSUS ADMIN
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                if (sessionError || !session) {
                    window.location.replace('admin-login.html');
                    return;
                }

                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('role, status')
                    .eq('id', session.user.id)
                    .single();

                if (profileError || !profile || profile.role !== 'admin') {
                    window.location.replace('login.html');
                    return;
                }
                
                if (profile.status === 'banned') {
                    await supabase.auth.signOut();
                    window.location.replace('login.html');
                    return;
                }

                // 3. JIKA AMAN, LOAD DATA
                await fetchCampaigns();
                
                document.getElementById('search-input').addEventListener('input', applyFilters);
                document.getElementById('filter-select').addEventListener('change', applyFilters);

            } catch (error) {
                console.error("Kesalahan sistem:", error);
                window.location.replace('admin-login.html');
            } finally {
                // Sembunyikan Loader
                setTimeout(() => {
                    const loader = document.getElementById('pageLoader');
                    if (loader) {
                        loader.classList.add('opacity-0');
                        setTimeout(() => loader.style.display = 'none', 500);
                    }
                }, 800);
            }
        });

        async function fetchCampaigns() {
            const { data, error } = await supabase
                .from('campaigns')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error fetching campaigns:", error);
                document.getElementById('campaign-grid').innerHTML = `<p class="text-red-500 text-sm col-span-full text-center py-10">Gagal memuat data.</p>`;
                return;
            }
            allCampaigns = data || [];
            applyFilters();
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const statusFilter = document.getElementById('filter-select').value;

            const filtered = allCampaigns.filter(camp => {
                const matchSearch = camp.title.toLowerCase().includes(searchTerm) || camp.brand_name.toLowerCase().includes(searchTerm);
                const matchStatus = statusFilter === 'ALL' || camp.status === statusFilter;
                return matchSearch && matchStatus;
            });

            renderCampaigns(filtered);
        }

        function renderCampaigns(campaigns) {
            const grid = document.getElementById('campaign-grid');
            
            if (campaigns.length === 0) {
                grid.innerHTML = `<p class="text-zinc-500 text-sm col-span-full text-center py-10">Tidak ada campaign yang ditemukan.</p>`;
                return;
            }

            let html = '';
            campaigns.forEach(camp => {
                // Menentukan Tema Warna Status & Gambar
                let statusColor = 'border-green-900/50 bg-green-900/20 text-green-400';
                let cardOpacity = 'opacity-100 hover:border-zinc-500';
                let imgOpacity = 'opacity-100'; 
                let statText = 'ACTIVE';
                
                if(camp.status === 'HOLDING') {
                    statusColor = 'border-yellow-900/50 bg-yellow-900/20 text-yellow-500';
                    cardOpacity = 'opacity-100 border-amber-900/30 hover:border-amber-500/50';
                    statText = 'HOLD';
                } else if(camp.status === 'CLOSED') {
                    statusColor = 'border-red-900/50 bg-red-900/20 text-red-500';
                    cardOpacity = 'opacity-70 hover:opacity-100 border-zinc-800/80';
                    imgOpacity = 'opacity-50 grayscale'; 
                    statText = 'CLOSED';
                }

                // Kalkulasi Progress
                const percentage = camp.budget_total > 0 ? Math.round((camp.budget_remaining / camp.budget_total) * 100) : 0;
                
                // Format Harga
                const formattedPrice = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(camp.payment_type === 'video' ? camp.price_per_video : camp.reward_per_1k);
                const priceLabel = camp.payment_type === 'video' ? '/ video' : '/ 1k views';

                // Sanitasi XSS sebelum dirender
                const safeBrandName = escapeHTML(camp.brand_name);
                const safeTitle = escapeHTML(camp.title);
                const safeNiche = escapeHTML(camp.niche);
                const safeBanner = camp.banner_url ? escapeHTML(camp.banner_url) : null;

                // Menyiapkan Icon Platform Dinamis
                let platformIcons = '';
                if (camp.platforms && Array.isArray(camp.platforms)) {
                    if (camp.platforms.includes('tiktok')) platformIcons += `<svg class="w-3.5 h-3.5 text-zinc-300" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.1z"/></svg>`;
                    if (camp.platforms.includes('instagram')) platformIcons += `<svg class="w-3.5 h-3.5 text-zinc-300" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.88z"/></svg>`;
                    if (camp.platforms.includes('youtube')) platformIcons += `<svg class="w-3.5 h-3.5 text-zinc-300" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`;
                }

                // IDENTIK DENGAN CLIPPER CARD
                html += `
                <div class="w-full campaign-card bg-cardBg border rounded-[1.25rem] md:rounded-[1.5rem] p-3 md:p-4 flex flex-col h-full hover:-translate-y-1 transition-all duration-300 shadow-xl group ${cardOpacity}">
                    
                    <!-- BANNER -->
                    <div class="w-full aspect-[16/9] bg-zinc-950 rounded-xl mb-4 flex flex-col items-center justify-center relative overflow-hidden shrink-0 border border-zinc-800/50">
                        ${safeBanner ? `<img src="${safeBanner}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 ${imgOpacity}">` : `<span class="text-zinc-600 text-xs font-medium">No Banner</span>`}
                    </div>
                    
                    <!-- BRAND & STATUS -->
                    <div class="flex justify-between items-center mb-2 md:mb-3">
                        <div class="flex items-center overflow-hidden pr-2">
                            <span class="text-[11px] md:text-xs font-bold text-zinc-400 hover:text-white transition truncate">${safeBrandName}</span>
                        </div>
                        <div class="shrink-0 px-2 py-0.5 rounded-full border text-[8px] md:text-[9px] font-bold tracking-wider ${statusColor}">${statText}</div>
                    </div>
                    
                    <!-- JUDUL CAMPAIGN -->
                    <h4 class="text-base md:text-xl font-black text-white mb-2 md:mb-3 truncate group-hover:text-zinc-300 transition-colors" title="${safeTitle}">${safeTitle}</h4>
                    
                    <!-- BUDGET -->
                    <div class="mb-3 md:mb-4 flex items-baseline gap-1">
                        <span class="text-lg md:text-2xl font-extrabold text-white tracking-tight">${formattedPrice}</span>
                        <span class="text-zinc-500 text-[9px] md:text-xs font-medium">${priceLabel}</span>
                    </div>
                    
                    <!-- NICHE & PLATFORM ICONS -->
                    <div class="flex flex-wrap items-center gap-2 mb-4">
                        <div class="flex items-center gap-1.5 px-2 py-1 rounded-md border border-zinc-800 bg-zinc-900/50">
                            ${platformIcons || `<span class="text-[10px] text-zinc-600">-</span>`}
                        </div>
                        <div class="flex items-center px-2 py-1 rounded-md border border-zinc-800 bg-zinc-900/80">
                            <span class="text-[8px] md:text-[10px] font-bold text-zinc-300 uppercase tracking-wider">${safeNiche}</span>
                        </div>
                    </div>
                    
                    <!-- PROGRESS & TOMBOL -->
                    <div class="mt-auto pt-3 border-t border-zinc-800/50">
                        <div class="flex justify-between items-end mb-1.5 md:mb-2">
                            <span class="text-[9px] md:text-xs text-zinc-400 font-semibold">Budget Tersisa</span>
                            <span class="text-[9px] md:text-xs font-black text-white">${percentage}%</span>
                        </div>
                        <div class="w-full h-1 md:h-1.5 bg-zinc-800 rounded-full overflow-hidden mb-4">
                            <div class="h-full bg-white rounded-full" style="width: ${percentage}%;"></div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-1.5 md:gap-2">
                            <a href="detail-campaign.html?id=${camp.id}" class="w-full bg-zinc-900 border border-zinc-700 text-white py-1.5 md:py-2.5 rounded-lg md:rounded-xl font-bold text-[10px] md:text-sm hover:bg-zinc-800 transition-all flex items-center justify-center text-center focus:outline-none">Lihat</a>
                            
                            <a href="admin-editcampaign.html?id=${camp.id}" class="w-full bg-zinc-800 border border-zinc-600 text-white py-1.5 md:py-2.5 rounded-lg md:rounded-xl font-bold text-[10px] md:text-sm hover:border-blue-500 hover:text-blue-400 transition-all flex items-center justify-center gap-1 focus:outline-none">
                                <svg class="w-3 h-3 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg> Edit
                            </a>
                        </div>
                    </div>
                </div>`;
            });
            
            grid.innerHTML = html;
        }
    </script>
    
    <script>const ACTIVE_MENU = 'campaign';</script>
    <script src="attribute/navbaradmin.js"></script>
</body>
</html>
