<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Peran - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0c; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* Sembunyikan radio button asli */
        input[type="radio"] {
            display: none;
        }

        /* Styling untuk card yang aktif / terpilih */
        .role-card {
            transition: all 0.3s ease;
        }
        
        /* Glow Effect ketika active */
        .role-card.active {
            border-color: #ffffff;
            background-color: #1a1a1e;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.08);
            transform: translateY(-4px);
        }
        
        .role-card.active .check-circle {
            background-color: #ffffff;
            border-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black min-h-screen flex flex-col items-center justify-center relative">

    <!-- Background Ornaments (Efek Blur) -->
    <div class="absolute top-1/4 left-1/4 w-[30rem] h-[30rem] bg-zinc-800/20 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-[30rem] h-[30rem] bg-zinc-800/10 rounded-full blur-[120px] -z-10 pointer-events-none"></div>

    <!-- Main Content Area (Fokus Penuh) -->
    <main class="w-full max-w-4xl px-6 z-10 py-12">
        
        <!-- Header Section -->
        <div class="text-center mb-12" data-aos="fade-up">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">Kamu seorang...?</h1>
            <p class="text-zinc-400 text-lg max-w-xl mx-auto">
                Pilih peranmu di ekosistem Whoost. <br class="hidden md:block">
                <span class="text-white font-semibold border-b border-zinc-700 pb-0.5">Pilih dengan bijak, peran tidak dapat diubah nantinya.</span>
            </p>
        </div>

        <!-- Form Pemilihan Role (Action dihapus karena dihandle JS) -->
        <form id="roleForm" onsubmit="event.preventDefault();">
            
            <div class="grid md:grid-cols-2 gap-6 md:gap-8 mb-12">
                
                <!-- CARD 1: BRAND -->
                <label class="role-card cursor-pointer bg-cardBg border-2 border-zinc-800 rounded-[2rem] p-8 md:p-10 relative group hover:border-zinc-500 block" data-aos="fade-up" data-aos-delay="100">
                    <input type="radio" name="user_role" value="brand" onchange="handleRoleSelection(this)">
                    
                    <!-- Indikator Check -->
                    <div class="absolute top-8 right-8 w-6 h-6 rounded-full border-2 border-zinc-600 flex items-center justify-center transition-colors check-circle text-transparent">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>

                    <!-- Visual Icon Wrapper -->
                    <div class="w-16 h-16 bg-zinc-900 border border-zinc-700 rounded-2xl flex items-center justify-center mb-8 shadow-inner">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                    </div>

                    <h2 class="text-3xl font-bold mb-2 text-white">Brand</h2>
                    <p class="text-zinc-500 text-sm font-semibold uppercase tracking-wider mb-6">Brand & Influencer</p>
                    
                    <ul class="space-y-4 text-zinc-400">
                        <li class="flex items-start gap-3">
                            <svg class="w-5 h-5 text-white flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            Buat kampanye UGC & viral distribution
                        </li>
                        <li class="flex items-start gap-3">
                            <svg class="w-5 h-5 text-white flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            Jangkau ribuan kreator & clipper terverifikasi
                        </li>
                        <li class="flex items-start gap-3">
                            <svg class="w-5 h-5 text-white flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            Pantau performa kampanye secara realtime
                        </li>
                    </ul>
                </label>

                <!-- CARD 2: CLIPPER / KREATOR -->
                <label class="role-card cursor-pointer bg-cardBg border-2 border-zinc-800 rounded-[2rem] p-8 md:p-10 relative group hover:border-zinc-500 block" data-aos="fade-up" data-aos-delay="200">
                    <input type="radio" name="user_role" value="clipper" onchange="handleRoleSelection(this)">
                    
                    <!-- Indikator Check -->
                    <div class="absolute top-8 right-8 w-6 h-6 rounded-full border-2 border-zinc-600 flex items-center justify-center transition-colors check-circle text-transparent">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>

                    <!-- Visual Icon Wrapper -->
                    <div class="w-16 h-16 bg-zinc-900 border border-zinc-700 rounded-2xl flex items-center justify-center mb-8 shadow-inner">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                        </svg>
                    </div>

                    <h2 class="text-3xl font-bold mb-2 text-white">Kreator</h2>
                    <p class="text-zinc-500 text-sm font-semibold uppercase tracking-wider mb-6">Kreator Konten & Clipper</p>
                    
                    <ul class="space-y-4 text-zinc-400">
                        <li class="flex items-start gap-3">
                            <svg class="w-5 h-5 text-white flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            Ikut kampanye brand dan hasilkan uang
                        </li>
                        <li class="flex items-start gap-3">
                            <svg class="w-5 h-5 text-white flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            Viral distribution konten ke akun sosialmu
                        </li>
                        <li class="flex items-start gap-3">
                            <svg class="w-5 h-5 text-white flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            Terima bayaran langsung ke dompet / rekening
                        </li>
                    </ul>
                </label>

            </div>

            <div class="flex justify-center" data-aos="fade-up" data-aos-delay="300">
                <button type="button" id="btnSubmit" disabled onclick="openPopup()"
                    class="w-full max-w-md py-4 rounded-xl font-bold text-lg transition-all duration-300 bg-zinc-800 text-zinc-500 cursor-not-allowed shadow-none border border-transparent flex items-center justify-center gap-2">
                    <span id="btnText">Pilih peran terlebih dahulu</span>
                </button>
            </div>

        </form>
    </main>

    <!-- ========================================== -->
    <!-- POPUP KONFIRMASI MODAL                     -->
    <!-- ========================================== -->
    <div id="confirmationModal" class="fixed inset-0 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm transition-opacity" onclick="closePopup()"></div>
        
        <div id="modalContent" class="relative bg-cardBg border border-zinc-800 rounded-[2rem] w-[90%] max-w-md p-8 shadow-2xl transform scale-95 transition-transform duration-300">
            
            <div class="flex flex-col items-center text-center">
                <div id="modalIcon" class="w-16 h-16 bg-zinc-900 border border-zinc-700 rounded-2xl flex items-center justify-center mb-5 shadow-inner">
                </div>

                <p class="text-[10px] font-bold tracking-[0.2em] text-zinc-500 mb-2 uppercase">Konfirmasi Peran</p>
                <h3 id="modalTitle" class="text-3xl font-extrabold text-white mb-1">Brand</h3>
                <p id="modalSubtitle" class="text-zinc-400 text-sm mb-6">Brand & Influencer</p>

                <div class="w-full flex items-start gap-3 bg-amber-500/10 border border-amber-500/20 rounded-xl p-4 mb-8 text-left">
                    <svg class="w-5 h-5 text-amber-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                    <p class="text-sm text-amber-500 font-medium leading-relaxed">
                        Pilihan ini bersifat permanen dan tidak dapat diubah di kemudian hari.
                    </p>
                </div>

                <div class="flex w-full gap-3">
                    <button type="button" onclick="closePopup()" class="flex-1 py-3.5 rounded-xl font-bold bg-zinc-800 text-white hover:bg-zinc-700 transition duration-300">
                        Batal
                    </button>
                    <!-- Tombol ini sudah dipanggil window.submitForm() di bawah -->
                    <button type="button" id="btnConfirmRole" onclick="submitForm()" class="flex-1 py-3.5 rounded-xl font-bold bg-white text-black hover:bg-zinc-200 transition duration-300 shadow-[0_0_20px_rgba(255,255,255,0.1)] active:scale-95">
                        Ya, Lanjutkan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- MENGUBAH KE type="module" UNTUK MEMANGGIL SUPABASE -->
    <script type="module">
        // Import supabase dari file auth.js Anda
        import { supabase } from './authentication/auth.js';

        AOS.init({
            once: true,
            offset: 20,
            duration: 800
        });

        const iconBrandSVG = `<svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>`;
        const iconKreatorSVG = `<svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>`;

        // Karena kita menggunakan type="module", fungsi harus ditempel ke window agar bisa dipanggil dari HTML (onclick)
        window.handleRoleSelection = function(radioInput) {
            const allCards = document.querySelectorAll('.role-card');
            allCards.forEach(card => card.classList.remove('active'));

            radioInput.closest('.role-card').classList.add('active');

            const btnSubmit = document.getElementById('btnSubmit');
            const btnText = document.getElementById('btnText');
            
            btnSubmit.removeAttribute('disabled');
            btnSubmit.classList.remove('bg-zinc-800', 'text-zinc-500', 'cursor-not-allowed');
            btnSubmit.classList.add('bg-white', 'text-black', 'hover:bg-zinc-200', 'cursor-pointer', 'shadow-[0_0_20px_rgba(255,255,255,0.1)]', 'active:scale-95');
            btnText.innerHTML = `Lanjutkan &rarr;`;
        }

        window.openPopup = function() {
            const selectedRole = document.querySelector('input[name="user_role"]:checked').value;
            const modal = document.getElementById('confirmationModal');
            const modalContent = document.getElementById('modalContent');
            const modalTitle = document.getElementById('modalTitle');
            const modalSubtitle = document.getElementById('modalSubtitle');
            const modalIcon = document.getElementById('modalIcon');

            if (selectedRole === 'brand') {
                modalTitle.innerText = "Brand";
                modalSubtitle.innerText = "Brand & Influencer";
                modalIcon.innerHTML = iconBrandSVG;
            } else {
                modalTitle.innerText = "Kreator";
                modalSubtitle.innerText = "Kreator Konten & Clipper";
                modalIcon.innerHTML = iconKreatorSVG;
            }

            modal.classList.remove('hidden');
            void modal.offsetWidth; 
            modal.classList.remove('opacity-0');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
        }

        window.closePopup = function() {
            const modal = document.getElementById('confirmationModal');
            const modalContent = document.getElementById('modalContent');
            
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // ===============================================
        // FUNGSI SUBMIT KE SUPABASE (SUDAH DIPERBAIKI)
        // ===============================================
        window.submitForm = async function() {
            // Ambil role yang dipilih
            const selectedRole = document.querySelector('input[name="user_role"]:checked').value;
            
            // Ubah tombol jadi loading state
            const btnConfirm = document.getElementById('btnConfirmRole');
            const originalText = btnConfirm.innerHTML;
            btnConfirm.disabled = true;
            btnConfirm.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-black inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Memproses...`;

            try {
                // 1. Cek sesi user saat ini (apakah dia masih login?)
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                
                if (sessionError || !session) {
                    alert('Sesi Anda telah habis. Silakan login kembali.');
                    window.location.replace('login.html');
                    return;
                }

                // 2. Update role ke tabel 'profiles'
                const { error: updateError } = await supabase
                    .from('profiles')
                    .update({ role: selectedRole })
                    .eq('id', session.user.id);

                if (updateError) {
                    console.error("Gagal mengupdate role:", updateError.message);
                    alert("Terjadi kesalahan sistem, silakan coba lagi!");
                    btnConfirm.disabled = false;
                    btnConfirm.innerHTML = originalText;
                    return;
                }

                // 3. Arahkan halaman (sesuai logika auth.js Anda sebelumnya)
                // Jika Brand -> Karena baru daftar, is_profile_complete pasti false, maka arahkan ke lengkapi profil
                // Jika Clipper -> Langsung ke clipper dashboard
                if (selectedRole === 'brand') {
                    window.location.replace('client-completeprofile.html');
                } else if (selectedRole === 'clipper') {
                    window.location.replace('clipper-dashboard.html');
                }

            } catch (error) {
                console.error("Error:", error);
                btnConfirm.disabled = false;
                btnConfirm.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
