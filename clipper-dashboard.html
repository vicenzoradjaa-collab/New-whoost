<head>

    <title>Dashboard Clipper - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',

    <style>
        html, body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 12px 12px;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    </style>
</head>

    </div>

    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 sm:px-8 py-6 pb-32 z-0 scroll-smooth w-full relative">
        <div class="max-w-7xl mx-auto space-y-8 sm:space-y-10">
            
            <!-- SECTION 1: RINGKASAN AKUN -->
            <section>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-5">
                    <div class="bg-cardBg border border-zinc-800 rounded-2xl p-5 sm:p-6 flex flex-col justify-center hover:border-zinc-500 transition-colors duration-300 relative group">

                            <button onclick="window.toggleSensor()" class="text-zinc-500 hover:text-white transition-colors focus:outline-none">
                                <svg id="eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                            </button>
                        </div>
                        <h3 id="total-penghasilan" class="text-xl sm:text-2xl md:text-3xl font-semibold text-white transition-all">Rp 0</h3>
                    </div>

                    <div class="bg-cardBg border border-zinc-800 rounded-2xl p-5 sm:p-6 flex flex-col justify-center hover:border-zinc-500 transition-colors duration-300">
                        <p class="text-[10px] sm:text-[11px] font-medium text-zinc-400 uppercase tracking-wide mb-1 sm:mb-2">Bisa Dicairkan</p>
                        <h3 id="bisa-dicairkan" class="text-xl sm:text-2xl md:text-3xl font-semibold text-white transition-all">Rp 0</h3>
                    </div>
                    
                    <div class="bg-cardBg border border-zinc-800 rounded-2xl p-5 sm:p-6 flex flex-col justify-center hover:border-zinc-500 transition-colors duration-300">
                        <p class="text-[10px] sm:text-[11px] font-medium text-zinc-400 uppercase tracking-wide mb-1 sm:mb-2">Total Views</p>

            <!-- SECTION 2: AKSI CEPAT (MENU ICON) -->
            <section>
                <h2 class="text-sm font-semibold mb-3 text-zinc-300 uppercase tracking-wide">Menu Cepat</h2>
                <div class="grid grid-cols-3 md:grid-cols-6 gap-3 sm:gap-4">
                    <a href="clipper-claim.html" class="flex flex-col items-center justify-center p-3 rounded-xl bg-cardBg border border-zinc-800 hover:border-white hover:bg-zinc-900 transition-all group">
                        <svg class="w-6 h-6 text-zinc-400 group-hover:text-white mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        <span class="text-[9px] sm:text-[10px] font-medium text-center text-zinc-400 group-hover:text-white">Klaim Views</span>
                    </a>
                    <a href="clipper-subscription.html" class="flex flex-col items-center justify-center p-3 rounded-xl bg-cardBg border border-zinc-800 hover:border-white hover:bg-zinc-900 transition-all group relative">
                        <div class="absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-bold px-1.5 py-0.5 rounded-full">PRO</div>
                        <svg class="w-6 h-6 text-zinc-400 group-hover:text-white mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                        <span class="text-[9px] sm:text-[10px] font-medium text-center text-zinc-400 group-hover:text-white">Akses VIP</span>
                    </a>
                    <a href="clipper-campaignselector.html" class="flex flex-col items-center justify-center p-3 rounded-xl bg-cardBg border border-zinc-800 hover:border-white hover:bg-zinc-900 transition-all group">
                        <svg class="w-6 h-6 text-zinc-400 group-hover:text-white mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path></svg>
                        <span class="text-[9px] sm:text-[10px] font-medium text-center text-zinc-400 group-hover:text-white">Submit Konten</span>
                    </a>
                    <a href="clipper-wallet.html" class="flex flex-col items-center justify-center p-3 rounded-xl bg-cardBg border border-zinc-800 hover:border-white hover:bg-zinc-900 transition-all group">
                        <svg class="w-6 h-6 text-zinc-400 group-hover:text-white mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                        <span class="text-[9px] sm:text-[10px] font-medium text-center text-zinc-400 group-hover:text-white">Wallet</span>
                    </a>
                    <a href="clipper-leaderboard.html" class="flex flex-col items-center justify-center p-3 rounded-xl bg-cardBg border border-zinc-800 hover:border-white hover:bg-zinc-900 transition-all group">
                        <svg class="w-6 h-6 text-zinc-400 group-hover:text-white mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        <span class="text-[9px] sm:text-[10px] font-medium text-center text-zinc-400 group-hover:text-white">Leaderboard</span>
                    </a>
                    <a href="clipper-blog.html" class="flex flex-col items-center justify-center p-3 rounded-xl bg-cardBg border border-zinc-800 hover:border-white hover:bg-zinc-900 transition-all group">
                        <svg class="w-6 h-6 text-zinc-400 group-hover:text-white mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        <span class="text-[9px] sm:text-[10px] font-medium text-center text-zinc-400 group-hover:text-white">Alat Tempur</span>
                    </a>
                </div>
            </section>

            <!-- SECTION 3: CAMPAIGN AKTIF KAMU (Horizontal Scroll) -->
            <section>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-white">Campaign Aktif Kamu</h2>
                    <a href="clipper-campaignselector.html" class="text-[12px] sm:text-[13px] font-medium text-zinc-400 hover:text-white transition-colors flex items-center gap-1">
                        Lihat Semua
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                    </a>
                </div>

                <div id="campaign-container" class="flex gap-4 sm:gap-5 overflow-x-auto hide-scrollbar snap-x snap-mandatory pb-4">
                    <p class="text-sm text-zinc-500 py-8 px-4" id="campaign-empty">Memuat data campaign...</p>
                </div>
            </section>

        </div>
    </main>

    <!-- JAVASCRIPT & LOGIC NAVBAR -->
    <script>const ACTIVE_MENU = 'beranda';</script>
    <script src="attribute/navbarclipper.js"></script>

    <!-- SCRIPT UTAMA (MODULE) MENGGUNAKAN AUTH.JS -->
    <script type="module">
        import { supabase, enforceRoleProtection } from './authentication/auth.js'; // Ditambahkan enforceRoleProtection

        let realEarnings = 0;
        let realWithdrawable = 0;
        let isSensorActive = false;

        // FUNGSI ANTI-XSS (Mencegah Eksekusi Script Jahat dari Database)
        function escapeHTML(str) {
            if (!str) return '';
            return str.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // 1. CEK PROTEKSI ROLE TERLEBIH DAHULU SEBELUM DATA DIMUAT
                await enforceRoleProtection();

                // 2. JIKA AMAN, LOAD DATA DASHBOARD
                await syncDashboardData();

            } catch (error) {
                console.error("Terjadi kesalahan sistem:", error);
            } finally {
                // 3. SEMBUNYIKAN LOADER SETELAH SEMUA SELESAI
                const loader = document.getElementById('pageLoader');
                if (loader) {
                    loader.classList.add('opacity-0'); 
                    setTimeout(() => loader.style.display = 'none', 500); 
                }
            }
        });

        async function syncDashboardData() {
            const { data: { session }, error: sessionError } = await supabase.auth.getSession();
            
            // Double check safety
            if (sessionError || !session) {
                window.location.replace('login.html');
                return;
            }
            
            const userId = session.user.id;

            // Load secara parallel
            await Promise.all([
                loadUserStats(userId),
                loadActiveCampaigns(userId)
            ]);
        }

        // FUNGSI LOAD STATS DARI TABEL clipper_stats
        async function loadUserStats(userId) {
            try {
                const { data, error } = await supabase
                    .from('clipper_stats')
                    .select('*')
                    .eq('user_id', userId)
                    .single();

                if (data && !error) {
                    realEarnings = data.total_earnings || 0;
                    realWithdrawable = data.withdrawable || 0;
                    
                    document.getElementById('total-penghasilan').innerText = formatRupiahK(realEarnings);
                    document.getElementById('bisa-dicairkan').innerText = formatRupiahK(realWithdrawable);
                    document.getElementById('total-views').innerText = formatK(data.total_views || 0);
                    document.getElementById('total-video').innerText = data.total_videos || 0;
                } else {
                    // Jika data tidak ada
                    document.getElementById('total-penghasilan').innerText = 'Rp 0';
                    document.getElementById('bisa-dicairkan').innerText = 'Rp 0';
                    document.getElementById('total-views').innerText = '0';
                    document.getElementById('total-video').innerText = '0';
                }
            } catch (err) {
                console.error("Gagal memuat stats:", err);
            }
        }

        // FUNGSI LOAD ACTIVE CAMPAIGNS
        async function loadActiveCampaigns(userId) {
            const container = document.getElementById('campaign-container');
            
            try {
                const { data: userCampaigns, error } = await supabase
                    .from('user_campaigns')
                    .select(`
                        campaign_id,
                        campaigns (id, title, brand_name, niche, budget_total, budget_remaining, reward_per_1k, status, type, payment_type, price_per_video, platforms, banner_url)
                    `)
                    .eq('user_id', userId)
                    .eq('campaigns.status', 'ACTIVE'); 

                if (error) throw error;

                const activeCampaigns = userCampaigns ? userCampaigns.filter(uc => uc.campaigns !== null).map(uc => uc.campaigns) : [];

                if (!activeCampaigns || activeCampaigns.length === 0) {
                    container.innerHTML = `<p class="text-sm text-zinc-500 py-8 px-4">Kamu belum bergabung di campaign yang aktif saat ini.</p>`;
                    return;
                }

                let html = '';
                activeCampaigns.forEach(camp => {
                    const percentage = camp.budget_total > 0 ? Math.round((camp.budget_remaining / camp.budget_total) * 100) : 0;
                    const price = camp.payment_type === 'video' ? camp.price_per_video : camp.reward_per_1k;
                    const formattedPrice = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(price);
                    const priceLabel = camp.payment_type === 'video' ? '/ video' : '/ 1k views';
                    
                    // Sanitasi teks dari potensi kode berbahaya
                    const safeBrand = escapeHTML(camp.brand_name);
                    const safeTitle = escapeHTML(camp.title);
                    const safeNiche = escapeHTML(camp.niche);
                    const safeBanner = camp.banner_url ? escapeHTML(camp.banner_url) : null;

                    let platformIcons = '';
                    if (camp.platforms && Array.isArray(camp.platforms)) {
                        if (camp.platforms.includes('tiktok')) platformIcons += `<svg class="w-3.5 h-3.5 text-zinc-300" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.1z"/></svg>`;
                        if (camp.platforms.includes('instagram')) platformIcons += `<svg class="w-3.5 h-3.5 text-zinc-300" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.88z"/></svg>`;
                        if (camp.platforms.includes('youtube')) platformIcons += `<svg class="w-3.5 h-3.5 text-zinc-300" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`;
                    }

                    html += `
                    <div class="snap-center flex-shrink-0 w-[280px] md:w-[320px] campaign-card bg-cardBg border border-zinc-800/80 rounded-[1.25rem] md:rounded-[1.5rem] p-3 md:p-4 flex flex-col h-full hover:-translate-y-1 transition-all duration-300 shadow-xl group">
                        <div class="w-full aspect-[16/9] bg-zinc-950 rounded-xl mb-4 flex flex-col items-center justify-center relative overflow-hidden shrink-0 border border-zinc-800/50">
                            ${safeBanner ? `<img src="${safeBanner}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">` : `<span class="text-zinc-600 text-xs font-medium">No Banner</span>`}
                        </div>
                        <div class="flex justify-between items-center mb-2 md:mb-3">
                            <div class="flex items-center overflow-hidden pr-2">
                                <span class="text-[11px] md:text-xs font-bold text-zinc-400 hover:text-white transition truncate">${safeBrand}</span>
                            </div>
                            <div class="shrink-0 px-2 py-0.5 rounded-full border text-[8px] md:text-[9px] font-bold tracking-wider border-green-900/50 bg-green-900/20 text-green-400">ACTIVE</div>
                        </div>
                        <h4 class="text-base md:text-xl font-black text-white mb-2 md:mb-3 truncate group-hover:text-zinc-300 transition-colors" title="${safeTitle}">${safeTitle}</h4>
                        <div class="mb-3 md:mb-4 flex items-baseline gap-1">
                            <span class="text-lg md:text-2xl font-extrabold text-white tracking-tight">${formattedPrice}</span>
                            <span class="text-zinc-500 text-[9px] md:text-xs font-medium">${priceLabel}</span>
                        </div>
                        <div class="flex flex-wrap items-center gap-2 mb-4">
                            <div class="flex items-center gap-1.5 px-2 py-1 rounded-md border border-zinc-800 bg-zinc-900/50">
                                ${platformIcons || `<span class="text-[10px] text-zinc-600">-</span>`}
                            </div>
                            <div class="flex items-center px-2 py-1 rounded-md border border-zinc-800 bg-zinc-900/80">
                                <span class="text-[8px] md:text-[10px] font-bold text-zinc-300 uppercase tracking-wider">${safeNiche}</span>
                            </div>
                        </div>
                        <div class="mt-auto pt-3 border-t border-zinc-800/50">
                            <div class="flex justify-between items-end mb-1.5 md:mb-2">
                                <span class="text-[9px] md:text-xs text-zinc-400 font-semibold">Budget Tersisa</span>
                                <span class="text-[9px] md:text-xs font-black text-white">${percentage}%</span>
                            </div>
                            <div class="w-full h-1 md:h-1.5 bg-zinc-800 rounded-full overflow-hidden mb-4">
                                <div class="h-full bg-white rounded-full" style="width: ${percentage}%;"></div>
                            </div>
                            <a href="clipper-submit.html?campaign_id=${camp.id}" class="w-full bg-white text-black py-1.5 md:py-2.5 rounded-lg md:rounded-xl font-bold text-[10px] md:text-sm hover:bg-zinc-200 active:scale-[0.98] transition-all block text-center focus:outline-none">Submit Video</a>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
            } catch (err) {
                console.error("Gagal memuat campaign:", err);
                container.innerHTML = `<p class="text-sm text-red-400/80 py-8 px-4">Gagal memuat campaign. Silakan muat ulang halaman.</p>`;
            }
        }

        window.toggleSensor = function() {
            isSensorActive = !isSensorActive;
            const totalElement = document.getElementById('total-penghasilan');
            const cairElement = document.getElementById('bisa-dicairkan');
            const iconElement = document.getElementById('eye-icon');

            if (isSensorActive) {
                totalElement.innerText = 'Rp ••••••';
                cairElement.innerText = 'Rp ••••••';
                iconElement.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                `;
            } else {
                totalElement.innerText = formatRupiahK(realEarnings);
                cairElement.innerText = formatRupiahK(realWithdrawable);
                iconElement.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                `;
            }
        };

        // FUNGSI FORMAT RUPIAH
        function formatRupiahK(num) {
            if (num >= 1000000000000) return 'Rp ' + (num / 1000000000000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + ' T';
            if (num >= 1000000000) return 'Rp ' + (num / 1000000000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + ' M';
            if (num >= 1000000) return 'Rp ' + (num / 1000000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + ' jt';
            if (num >= 1000) return 'Rp ' + (num / 1000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + ' rb';
            return 'Rp ' + num;
        }

        // FUNGSI FORMAT VIEWS (ANGKA BIASA)
        function formatK(num) {
            if (num >= 1000000000) return (num / 1000000000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + 'B';
            if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + 'K';
            return num;
        }
    </script>
