<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Edit Campaign - Whoost Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { darkBg: '#0a0a0c', cardBg: '#121214' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
    <style>
        html, body { background-color: #0a0a0c; color: white; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <!-- HEADER (Kustom Dropdown Status) -->
    <header class="h-20 flex items-center px-4 sm:px-8 border-b border-zinc-800 bg-darkBg sticky top-0 z-20">
        <a href="admin-campaign.html" class="mr-4 text-zinc-400 hover:text-white transition-colors focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </a>
        <h1 class="text-lg sm:text-xl font-bold">Edit Campaign</h1>
        
        <!-- STATUS DROPDOWN -->
        <div class="ml-auto relative custom-select-container w-40 sm:w-48">
            <div class="bg-zinc-900 border border-zinc-700 hover:border-zinc-500 rounded-xl px-4 py-2.5 text-sm text-white font-bold cursor-pointer flex justify-between items-center transition-colors" onclick="window.toggleSelect('status-options')">
                <span id="status-selected-text" class="flex items-center gap-2">
                    <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Memuat...
                </span>
                <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
            <div id="status-options" class="custom-select-options hidden absolute top-full right-0 mt-2 w-full bg-zinc-800 border border-zinc-700 rounded-xl shadow-xl z-50 overflow-hidden">
                <div onclick="window.selectStatus('ACTIVE')" class="px-4 py-3 hover:bg-zinc-700 cursor-pointer flex items-center gap-2 text-sm text-white font-bold"><svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ACTIVE</div>
                <div onclick="window.selectStatus('HOLDING')" class="px-4 py-3 hover:bg-zinc-700 cursor-pointer flex items-center gap-2 text-sm text-white font-bold"><svg class="w-4 h-4 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> HOLDING</div>
                <div onclick="window.selectStatus('CLOSED')" class="px-4 py-3 hover:bg-zinc-700 cursor-pointer flex items-center gap-2 text-sm text-white font-bold"><svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg> CLOSED</div>
            </div>
            <input type="hidden" id="status_val" value="ACTIVE">
        </div>
    </header>

    <main class="flex-1 overflow-y-auto px-4 sm:px-8 py-6 pb-40 w-full relative z-0">
        <div class="max-w-5xl mx-auto space-y-6">
            
            <!-- BANNER UPLOAD 16:9 -->
            <div class="bg-cardBg border border-zinc-800 rounded-2xl p-5 w-full">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-base font-bold text-white">Banner Campaign <span class="text-red-500">*</span></h3>
                    <span class="text-[10px] text-zinc-500 bg-zinc-900 px-2 py-1 rounded">16:9</span>
                </div>
                <input type="file" id="banner-file" accept="image/*" class="hidden" onchange="handleBannerUpload(event)">
                <div id="banner-upload-box" onclick="triggerUpload()" class="w-full aspect-video border-2 border-dashed border-zinc-700 bg-zinc-900/50 hover:bg-zinc-800/50 transition-colors rounded-2xl flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group">
                    <img id="banner-preview" class="absolute inset-0 w-full h-full object-cover hidden z-10">
                    <div class="absolute inset-0 bg-black/40 hidden z-10 group-hover:flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="text-white font-bold text-sm bg-black/60 px-4 py-2 rounded-lg">Ganti Gambar</span>
                    </div>
                    <div id="banner-icon-container" class="z-0 flex flex-col items-center">
                        <div class="w-12 h-12 bg-zinc-800 text-zinc-400 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-all">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <p id="banner-text" class="text-sm font-semibold text-white">Klik untuk Upload Banner</p>
                    </div>
                </div>
            </div>

            <!-- LAYOUT DUA KOLOM SAMA RATA -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
                
                <!-- KOLOM KIRI (Info Dasar & Budget) -->
                <div class="flex flex-col gap-6">
                    
                    <div class="bg-cardBg border border-zinc-800 rounded-2xl p-5 flex flex-col flex-1">
                        <h3 class="text-base font-bold text-white mb-4 border-b border-zinc-800 pb-2">Informasi Dasar</h3>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-4">
                            <!-- Custom Dropdown Client -->
                            <div class="relative custom-select-container w-full">
                                <label class="block text-sm font-medium text-cyan-400 mb-1">Akun Client (Opsional)</label>
                                <div class="bg-zinc-900 border border-zinc-700 hover:border-zinc-500 rounded-xl px-4 py-3 text-sm text-white cursor-pointer flex justify-between items-center transition-colors" onclick="window.toggleSelect('client-options')">
                                    <span id="client-selected-text" class="truncate">-- Tidak Dihubungkan --</span>
                                    <svg class="w-4 h-4 text-zinc-400 shrink-0 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                                <div id="client-options" class="custom-select-options hidden absolute top-[72px] left-0 w-full bg-zinc-800 border border-zinc-700 rounded-xl shadow-xl z-50 max-h-60 overflow-y-auto custom-scrollbar">
                                    <div class="p-4 text-center text-xs text-zinc-500">Memuat data client...</div>
                                </div>
                                <input type="hidden" id="client_id" value="">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-zinc-400 mb-1">Nama Brand <span class="text-red-500">*</span></label>
                                <input type="text" id="brand_name" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white outline-none">
                            </div>
                        </div>

                        <label class="block text-sm font-medium text-zinc-400 mb-1">Judul Campaign <span class="text-red-500">*</span></label>
                        <input type="text" id="title" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white mb-4 outline-none">

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-4">
                            <!-- Custom Dropdown Tipe -->
                            <div class="relative custom-select-container">
                                <label class="block text-sm font-medium text-zinc-400 mb-1">Tipe</label>
                                <div class="bg-zinc-900 border border-zinc-700 hover:border-zinc-500 rounded-xl px-4 py-3 text-sm text-white cursor-pointer flex justify-between items-center transition-colors" onclick="window.toggleSelect('type-options')">
                                    <span id="type-selected-text">Clipping</span>
                                    <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                                <div id="type-options" class="custom-select-options hidden absolute top-[72px] left-0 w-full bg-zinc-800 border border-zinc-700 rounded-xl shadow-xl z-50 overflow-hidden">
                                    <div onclick="window.selectType('clipping', 'Clipping')" class="px-4 py-3 hover:bg-zinc-700 cursor-pointer text-sm text-white">Clipping</div>
                                    <div onclick="window.selectType('ugc', 'UGC')" class="px-4 py-3 hover:bg-zinc-700 cursor-pointer text-sm text-white">UGC</div>
                                </div>
                                <input type="hidden" id="type_val" value="clipping">
                            </div>

                            <!-- Custom Dropdown Niche -->
                            <div class="relative custom-select-container">
                                <label class="block text-sm font-medium text-zinc-400 mb-1">Kategori (Niche)</label>
                                <div class="bg-zinc-900 border border-zinc-700 hover:border-zinc-500 rounded-xl px-4 py-3 text-sm text-white cursor-pointer flex justify-between items-center transition-colors" onclick="window.toggleSelect('niche-options')">
                                    <span id="niche-selected-text">Memuat...</span>
                                    <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                                <div id="niche-options" class="custom-select-options hidden absolute top-[72px] left-0 w-full bg-zinc-800 border border-zinc-700 rounded-xl shadow-xl z-50 max-h-60 overflow-y-auto custom-scrollbar"></div>
                                <input type="hidden" id="niche_val" value="">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-zinc-400 mb-1">Deadline <span class="text-red-500">*</span></label>
                                <input type="date" id="deadline" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white outline-none">
                            </div>
                        </div>

                        <label class="block text-sm font-medium text-zinc-400 mb-1">Deskripsi Singkat</label>
                        <textarea id="desc-input" rows="2" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white resize-none mt-auto"></textarea>
                    </div>

                    <div class="bg-cardBg border border-zinc-800 rounded-2xl p-5 flex flex-col">
                        <div class="flex flex-col sm:flex-row justify-between sm:items-center border-b border-zinc-800 pb-4 gap-4 mb-4">
                            <h3 class="text-base font-bold text-white">Anggaran & Keuangan</h3>
                            <div class="bg-zinc-900 border border-zinc-800 p-1 rounded-full flex gap-1 shadow-inner w-max">
                                <button type="button" id="btn-type-views" onclick="setPaymentType('views')" class="px-5 py-1.5 rounded-full bg-white text-black text-xs font-semibold focus:outline-none">Per Views</button>
                                <button type="button" id="btn-type-video" onclick="setPaymentType('video')" class="px-5 py-1.5 rounded-full text-zinc-400 hover:text-white text-xs font-semibold focus:outline-none">Per Video</button>
                            </div>
                        </div>

                        <!-- DINAMIS: Views -->
                        <div id="budget-views-section" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-medium text-zinc-400 mb-1">Total Budget (Rp) <span class="text-red-500">*</span></label>
                                <input type="text" id="budget_total_views" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white outline-none currency-input">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-zinc-400 mb-1">Budget Tersisa <span class="text-[10px] text-amber-500">(Auto)</span></label>
                                <input type="text" id="budget_remaining" readonly class="w-full bg-zinc-950 border border-zinc-800/50 rounded-xl px-4 py-3 text-sm text-zinc-500 cursor-not-allowed select-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-zinc-400 mb-1">Tarif per 1k views <span class="text-red-500">*</span></label>
                                <input type="text" id="reward_per_1k" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white outline-none currency-input">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-[11px] font-medium text-zinc-400 mb-1">Min. Views</label>
                                    <input type="text" id="min_views" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-3 py-3 text-sm text-white outline-none number-input">
                                </div>
                                <div>
                                    <label class="block text-[11px] font-medium text-zinc-400 mb-1">Max Claim</label>
                                    <input type="text" id="max_claim" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-3 py-3 text-sm text-white outline-none number-input">
                                </div>
                            </div>
                        </div>

                        <!-- DINAMIS: Video -->
                        <div id="budget-video-section" class="hidden grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-medium text-zinc-400 mb-1">Target Video <span class="text-red-500">*</span></label>
                                <input type="number" id="target_video" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-zinc-400 mb-1">Harga per Video <span class="text-red-500">*</span></label>
                                <input type="text" id="price_per_video" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white outline-none currency-input">
                            </div>
                        </div>
                    </div>

                </div>

                <!-- KOLOM KANAN (Platform & Brief) -->
                <div class="flex flex-col gap-6 h-full">
                    
                    <div class="bg-cardBg border border-zinc-800 rounded-2xl p-5 flex flex-col">
                        <h3 class="text-base font-bold text-white mb-4 border-b border-zinc-800 pb-2">Platform & Link Materi</h3>
                        
                        <label class="block text-sm font-medium text-zinc-400 mb-2">Platform yang Diperbolehkan <span class="text-red-500">*</span></label>
                        <div class="flex flex-wrap gap-2 mb-6">
                            <button type="button" onclick="window.togglePlatform('tiktok')" id="btn-plat-tiktok" class="px-5 py-2 rounded-lg border border-zinc-700 bg-zinc-900 text-zinc-400 text-xs font-semibold transition-colors focus:outline-none">TikTok</button>
                            <button type="button" onclick="window.togglePlatform('ig')" id="btn-plat-ig" class="px-5 py-2 rounded-lg border border-zinc-700 bg-zinc-900 text-zinc-400 text-xs font-semibold transition-colors focus:outline-none">IG Reels</button>
                            <button type="button" onclick="window.togglePlatform('yt')" id="btn-plat-yt" class="px-5 py-2 rounded-lg border border-zinc-700 bg-zinc-900 text-zinc-400 text-xs font-semibold transition-colors focus:outline-none">YT Shorts</button>
                        </div>

                        <label class="block text-sm font-medium text-zinc-400 mb-2">Link Materi / Bahan</label>
                        <div id="video-links-container" class="space-y-2 mb-3"></div>
                        <button type="button" onclick="window.openLinkModal()" class="w-full py-3 rounded-xl border border-dashed border-zinc-700 text-zinc-400 hover:text-white hover:bg-zinc-800 transition-all text-xs font-semibold flex items-center justify-center gap-2 focus:outline-none">
                            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Tambah Link Materi Baru
                        </button>
                    </div>

                    <div class="bg-cardBg border border-zinc-800 rounded-2xl p-5 flex flex-col flex-1">
                        <h3 class="text-base font-bold text-white mb-4 border-b border-zinc-800 pb-2">Detail Brief & Persyaratan</h3>
                        
                        <label class="block text-sm font-medium text-zinc-400 mb-1">Hashtags & Mentions Wajib</label>
                        <input type="text" id="hashtags" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white outline-none mb-4">

                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-sm font-medium text-zinc-400">Brief Singkat (Muncul di Card)</label>
                            <button type="button" onclick="window.fillBrief('short')" class="text-[10px] text-cyan-400 border border-cyan-500/30 bg-cyan-500/10 px-2 py-0.5 rounded hover:bg-cyan-500/20 focus:outline-none">Pakai Template</button>
                        </div>
                        <textarea id="brief" rows="3" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white resize-none outline-none mb-4"></textarea>

                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-sm font-medium text-zinc-400">Panduan Lengkap (Full Brief)</label>
                            <button type="button" onclick="window.fillBrief('full')" class="text-[10px] text-cyan-400 border border-cyan-500/30 bg-cyan-500/10 px-2 py-0.5 rounded hover:bg-cyan-500/20 focus:outline-none">Pakai Template</button>
                        </div>
                        <textarea id="full_brief" rows="4" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white resize-none outline-none mb-4 flex-1"></textarea>

                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-sm font-medium text-zinc-400">Larangan (Restrictions)</label>
                            <button type="button" onclick="window.fillBrief('restrict')" class="text-[10px] text-red-400 border border-red-500/30 bg-red-500/10 px-2 py-0.5 rounded hover:bg-red-500/20 focus:outline-none">Pakai Template</button>
                        </div>
                        <textarea id="restrictions" rows="3" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white resize-none outline-none mt-auto"></textarea>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- TOMBOL SUBMIT FIXED DI BAWAH -->
    <div class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-darkBg/95 backdrop-blur-md px-4 sm:px-8 py-4 z-40 flex items-center justify-end">
        <button id="btn-save" class="w-full max-w-[250px] px-5 py-3 rounded-xl bg-blue-600 text-white text-sm font-bold hover:bg-blue-500 transition-colors shadow-[0_0_15px_rgba(37,99,235,0.3)] focus:outline-none">
            Simpan Perubahan
        </button>
    </div>

    <!-- MODAL LINK -->
    <div id="linkModal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 transition-opacity opacity-0">
        <div class="bg-cardBg border border-zinc-700 shadow-2xl rounded-2xl w-full max-w-md p-6 transform scale-95 transition-transform relative" id="linkModalContent">
            <h3 class="text-lg font-bold text-white mb-4">Tambah Link Materi</h3>
            <label class="block text-xs font-medium text-zinc-400 mb-1">Nama / Keterangan Link</label>
            <input type="text" id="linkModalName" placeholder="Contoh: Video Mentahan Drive" class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white outline-none mb-4">
            
            <label class="block text-xs font-medium text-zinc-400 mb-1">URL / Link</label>
            <input type="url" id="linkModalUrl" placeholder="https://..." class="w-full bg-zinc-900 border border-zinc-700 focus:border-white rounded-xl px-4 py-3 text-sm text-white outline-none mb-6">
            
            <div class="flex justify-end gap-3">
                <button onclick="window.closeModal('linkModal', 'linkModalContent')" class="px-5 py-2 rounded-xl text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors focus:outline-none">Batal</button>
                <button onclick="window.submitLink()" class="px-5 py-2 rounded-xl bg-white text-black text-sm font-bold hover:bg-zinc-200 transition-colors focus:outline-none">Tambahkan</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT LOGIC MENGGUNAKAN AUTH.JS -->
    <script type="module">
        import { supabase } from './authentication/auth.js';

        const urlParams = new URLSearchParams(window.location.search);
        const campaignId = urlParams.get('id');

        let uploadedBannerUrl = null;
        let selectedPlatforms = { tiktok: false, ig: false, yt: false };
        let linksData = [];
        let currentPaymentType = 'views';
        let clientsList = [];

        const niches = {
            clipping: ['WhaleClipping', 'Brand', 'Music', 'Podcast', 'Stream', 'Film', 'Tourism', 'Show', 'Entertainment'],
            ugc: ['Produk Digital', 'Produk Fisik', 'FnB']
        };

        const templates = {
            short: "Download video mentahan dari Link yang disediakan.\nCari momen paling menarik/lucu (Hook 3 detik pertama).\nPotong menjadi klip 15-60 detik.",
            full: "1. Seluruh konten wajib dibuat dengan tone yang positif dan informatif.\n2. Wajib menggunakan materi dari link bahan yang diberikan.\n3. Tambahkan subtitle otomatis agar menarik.\n4. Volume background music tidak boleh lebih besar dari suara utama.\n5. Jangan lupa gunakan hashtag yang telah ditentukan.",
            restrict: "Anti-Botting: Dilarang keras menggunakan view botting, ads boosting, atau pembelian views. Hanya Organic Views yang dihitung.\nOriginalitas: Dilarang keras mencuri atau melakukan re-post konten milik sesama clipper.\nManual Editing Only: Penggunaan alat editing AI otomatis (seperti Opus Clip atau sejenisnya) dilarang.\nNo Raw Reupload: Dilarang mengunggah ulang video mentah tanpa sentuhan kreativitas atau editing tambahan.\nEtika & Nama Baik: Dilarang membuat konten yang mengandung unsur SARA, ujaran kebencian, atau menjelekkan pihak tertentu."
        };

        const statusHTMLMap = {
            'ACTIVE': `<svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ACTIVE`,
            'HOLDING': `<svg class="w-4 h-4 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> HOLDING`,
            'CLOSED': `<svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg> CLOSED`
        };

        document.addEventListener('DOMContentLoaded', async () => {
            if(!campaignId) {
                alert("ID Campaign tidak ditemukan!");
                window.location.replace('admin-campaign.html');
                return;
            }

            await fetchClientAccounts();
            await fetchCampaignData();
        });

        // ==========================================
        // 1. FETCH & INITIALIZATION
        // ==========================================
        async function fetchClientAccounts() {
            const { data } = await supabase.from('profiles').select('id, email, business_name, full_name').in('role', ['client', 'brand']);
            if (data && data.length > 0) {
                clientsList = data;
                const container = document.getElementById('client-options');
                let html = `<div onclick="window.selectClient('', '-- Tidak Dihubungkan --')" class="px-4 py-3 hover:bg-zinc-700 cursor-pointer text-sm text-zinc-400">-- Tidak Dihubungkan --</div>`;
                data.forEach(c => {
                    let bName = c.business_name && c.business_name.toLowerCase() !== 'null' ? c.business_name : '';
                    let fName = c.full_name && c.full_name.toLowerCase() !== 'null' ? c.full_name : '';
                    let dName = bName || fName || c.email;
                    html += `<div onclick="window.selectClient('${c.id}', '${dName}')" class="px-4 py-3 hover:bg-zinc-700 cursor-pointer text-sm text-white border-t border-zinc-700/50">${dName}</div>`;
                });
                container.innerHTML = html;
            }
        }

        async function fetchCampaignData() {
            const { data, error } = await supabase.from('campaigns').select('*').eq('id', campaignId).single();
            
            if(error || !data) {
                alert("Data campaign tidak ditemukan!");
                window.location.replace('admin-campaign.html');
                return;
            }

            // Setting Status
            const statusVal = data.status || 'HOLDING';
            window.selectStatus(statusVal);

            // Setting Client
            if(data.client_id) {
                const c = clientsList.find(x => x.id === data.client_id);
                if(c) {
                    let bName = c.business_name && c.business_name.toLowerCase() !== 'null' ? c.business_name : '';
                    let fName = c.full_name && c.full_name.toLowerCase() !== 'null' ? c.full_name : '';
                    let dName = bName || fName || c.email;
                    window.selectClient(c.id, dName);
                }
            }

            // Setting Brand & Text Fields
            document.getElementById('brand_name').value = data.brand_name || '';
            document.getElementById('title').value = data.title || '';
            if(data.deadline) document.getElementById('deadline').value = data.deadline;
            document.getElementById('desc-input').value = data.description || '';
            
            // Setting Type & Niche
            const typeVal = data.type || 'clipping';
            const typeText = typeVal === 'ugc' ? 'UGC' : 'Clipping';
            window.selectType(typeVal, typeText);
            
            setTimeout(() => {
                window.selectNiche(data.niche || niches[typeVal][0]);
            }, 50);

            // Setting Budget & Payment Type
            const payType = data.payment_type || 'views';
            window.setPaymentType(payType);

            if(payType === 'views') {
                document.getElementById('budget_total_views').value = data.budget_total ? 'Rp ' + data.budget_total.toLocaleString('id-ID') : '';
                document.getElementById('reward_per_1k').value = data.reward_per_1k ? 'Rp ' + data.reward_per_1k.toLocaleString('id-ID') : '';
            } else {
                document.getElementById('target_video').value = data.target_video || '';
                document.getElementById('price_per_video').value = data.price_per_video ? 'Rp ' + data.price_per_video.toLocaleString('id-ID') : '';
            }
            
            document.getElementById('budget_remaining').value = data.budget_remaining ? 'Rp ' + data.budget_remaining.toLocaleString('id-ID') : 'Rp 0';
            document.getElementById('min_views').value = data.min_views ? data.min_views.toLocaleString('id-ID') : '';
            document.getElementById('max_claim').value = data.max_claim ? data.max_claim.toLocaleString('id-ID') : '';
            
            // Briefs
            document.getElementById('hashtags').value = data.hashtags || '';
            document.getElementById('brief').value = data.brief || '';
            document.getElementById('full_brief').value = data.full_brief || '';
            document.getElementById('restrictions').value = data.restrictions || '';

            // Platforms
            if(data.platforms && Array.isArray(data.platforms)) {
                if(data.platforms.includes('tiktok')) window.togglePlatform('tiktok');
                if(data.platforms.includes('instagram')) window.togglePlatform('ig');
                if(data.platforms.includes('youtube')) window.togglePlatform('yt');
            }

            // Links (Parsing JSON)
            if(data.video_links && Array.isArray(data.video_links)) {
                linksData = data.video_links.map(item => {
                    if(typeof item === 'string') {
                        try { return JSON.parse(item); } catch(e) { return { name: 'Link Materi', url: item }; }
                    }
                    return item;
                });
                window.renderLinks();
            }

            // Banner
            if(data.banner_url) {
                uploadedBannerUrl = data.banner_url;
                const preview = document.getElementById('banner-preview');
                preview.src = uploadedBannerUrl;
                preview.classList.remove('hidden');
                document.getElementById('banner-icon-container').classList.add('hidden');
                document.getElementById('banner-text').innerText = "Banner Terpasang";
            }
        }

        // ==========================================
        // 2. CUSTOM DROPDOWNS & UI TOGGLES
        // ==========================================
        window.toggleSelect = function(id) {
            document.querySelectorAll('.custom-select-options').forEach(el => { if(el.id !== id) el.classList.add('hidden'); });
            document.getElementById(id).classList.toggle('hidden');
        };

        window.addEventListener('click', e => {
            if(!e.target.closest('.custom-select-container')) {
                document.querySelectorAll('.custom-select-options').forEach(el => el.classList.add('hidden'));
            }
        });

        window.selectStatus = function(val) {
            document.getElementById('status_val').value = val;
            document.getElementById('status-selected-text').innerHTML = statusHTMLMap[val];
            document.getElementById('status-options').classList.add('hidden');
        };

        window.selectClient = function(id, text) {
            document.getElementById('client_id').value = id;
            document.getElementById('client-selected-text').innerText = text;
            document.getElementById('client-options').classList.add('hidden');
        };

        window.selectType = function(val, text) {
            document.getElementById('type_val').value = val;
            document.getElementById('type-selected-text').innerText = text;
            document.getElementById('type-options').classList.add('hidden');
            window.updateNicheOptions();
        };

        window.updateNicheOptions = function() {
            const type = document.getElementById('type_val').value;
            const container = document.getElementById('niche-options');
            let html = '';
            niches[type].forEach(n => {
                html += `<div onclick="window.selectNiche('${n}')" class="px-4 py-3 hover:bg-zinc-700 cursor-pointer text-sm text-white border-b border-zinc-700/50">${n}</div>`;
            });
            container.innerHTML = html;
            window.selectNiche(niches[type][0]); 
        };

        window.selectNiche = function(val) {
            document.getElementById('niche_val').value = val;
            document.getElementById('niche-selected-text').innerText = val;
            document.getElementById('niche-options').classList.add('hidden');
        };

        window.setPaymentType = function(type) {
            currentPaymentType = type;
            document.getElementById('btn-type-views').className = type === 'views' ? "px-5 py-1.5 rounded-full bg-white text-black text-xs font-semibold focus:outline-none" : "px-5 py-1.5 rounded-full text-zinc-400 hover:text-white text-xs font-semibold focus:outline-none";
            document.getElementById('btn-type-video').className = type === 'video' ? "px-5 py-1.5 rounded-full bg-white text-black text-xs font-semibold focus:outline-none" : "px-5 py-1.5 rounded-full text-zinc-400 hover:text-white text-xs font-semibold focus:outline-none";
            document.getElementById('budget-views-section').classList.toggle('hidden', type !== 'views');
            document.getElementById('budget-video-section').classList.toggle('hidden', type !== 'video');
        };

        window.togglePlatform = function(platform) {
            selectedPlatforms[platform] = !selectedPlatforms[platform];
            const btn = document.getElementById('btn-plat-' + platform);
            if(selectedPlatforms[platform]) {
                btn.classList.add('bg-white', 'text-black', 'border-white');
                btn.classList.remove('bg-zinc-900', 'text-zinc-400', 'border-zinc-700');
            } else {
                btn.classList.remove('bg-white', 'text-black', 'border-white');
                btn.classList.add('bg-zinc-900', 'text-zinc-400', 'border-zinc-700');
            }
        };

        // ==========================================
        // 3. MODAL LINKS & TEMPLATES
        // ==========================================
        window.openLinkModal = function() {
            document.getElementById('linkModalName').value = '';
            document.getElementById('linkModalUrl').value = '';
            const m = document.getElementById('linkModal'), c = document.getElementById('linkModalContent');
            m.classList.remove('hidden'); m.classList.add('flex');
            setTimeout(() => { m.classList.remove('opacity-0'); c.classList.remove('scale-95'); }, 10);
        };

        window.closeModal = function(id, contentId) {
            const m = document.getElementById(id), c = document.getElementById(contentId);
            m.classList.add('opacity-0'); c.classList.add('scale-95');
            setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300);
        };

        window.submitLink = function() {
            const nameVal = document.getElementById('linkModalName').value.trim() || 'Link Materi / Bahan';
            const urlVal = document.getElementById('linkModalUrl').value.trim();
            if(urlVal) {
                linksData.push({ name: nameVal, url: urlVal });
                window.renderLinks();
                window.closeModal('linkModal', 'linkModalContent');
            }
        };

        window.removeLink = function(idx) {
            linksData.splice(idx, 1);
            window.renderLinks();
        };

        window.renderLinks = function() {
            const container = document.getElementById('video-links-container');
            container.innerHTML = '';
            linksData.forEach((item, idx) => {
                const el = document.createElement('div');
                el.className = 'flex items-center justify-between p-3 bg-zinc-900 border border-zinc-700 rounded-xl mb-2';
                el.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <svg class="w-4 h-4 text-indigo-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                        <div class="truncate">
                            <p class="text-xs font-bold text-white truncate">${item.name}</p>
                            <a href="${item.url}" target="_blank" class="text-[10px] text-zinc-400 hover:text-white truncate block mt-0.5">${item.url}</a>
                        </div>
                    </div>
                    <button type="button" onclick="window.removeLink(${idx})" class="text-zinc-500 hover:text-red-500 p-2 focus:outline-none"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>`;
                container.appendChild(el);
            });
        };

        window.fillBrief = function(type) {
            if(type === 'short') document.getElementById('brief').value = templates.short;
            if(type === 'full') document.getElementById('full_brief').value = templates.full;
            if(type === 'restrict') document.getElementById('restrictions').value = templates.restrict;
        };

        // ==========================================
        // 4. FORMAT CURRENCY & NUMBER
        // ==========================================
        function parseRupiah(val) { return parseInt(val.replace(/[^0-9]/g, '')) || 0; }
        
        document.querySelectorAll('.currency-input').forEach(input => {
            input.addEventListener('input', e => {
                let val = parseRupiah(e.target.value);
                e.target.value = val === 0 ? '' : 'Rp ' + val.toLocaleString('id-ID');
            });
        });
        
        document.querySelectorAll('.number-input').forEach(input => {
            input.addEventListener('input', e => {
                let val = parseRupiah(e.target.value);
                e.target.value = val === 0 ? '' : val.toLocaleString('id-ID');
            });
        });

        // ==========================================
        // 5. UPLOAD BANNER
        // ==========================================
        window.triggerUpload = function() { document.getElementById('banner-file').click(); };
        window.handleBannerUpload = async function(event) {
            const file = event.target.files[0];
            if(!file) return;

            const textEl = document.getElementById('banner-text');
            textEl.innerText = "Mengupload ke Supabase...";
            textEl.classList.add('text-amber-400');

            const fileExt = file.name.split('.').pop();
            const fileName = `campaigns/banner_${Date.now()}_${Math.random().toString(36).substring(2,7)}.${fileExt}`;

            const { data, error } = await supabase.storage.from('avatars').upload(fileName, file);

            if(error) {
                alert("Upload error: " + error.message);
                textEl.innerText = "Gagal upload!";
                textEl.classList.remove('text-amber-400');
                textEl.classList.add('text-red-500');
                return;
            }

            const { data: pUrl } = supabase.storage.from('avatars').getPublicUrl(fileName);
            uploadedBannerUrl = pUrl.publicUrl;

            const preview = document.getElementById('banner-preview');
            preview.src = uploadedBannerUrl;
            preview.classList.remove('hidden');
            document.getElementById('banner-icon-container').classList.add('hidden');
            document.getElementById('banner-text').innerText = "Banner Terpasang";
        };

        // ==========================================
        // 6. UPDATE DATA (SAVE)
        // ==========================================
        document.getElementById('btn-save').addEventListener('click', async () => {
            const btn = document.getElementById('btn-save');
            btn.innerText = 'Menyimpan...';
            btn.disabled = true;

            const bTotal = currentPaymentType === 'views' 
                ? parseRupiah(document.getElementById('budget_total_views').value) 
                : ((parseInt(document.getElementById('target_video').value)||0) * parseRupiah(document.getElementById('price_per_video').value));
            
            const platforms = [];
            if(selectedPlatforms.tiktok) platforms.push('tiktok');
            if(selectedPlatforms.ig) platforms.push('instagram');
            if(selectedPlatforms.yt) platforms.push('youtube');
            
            const clientId = document.getElementById('client_id').value;
            const bName = document.getElementById('brand_name').value.trim();

            const jsonLinks = linksData.map(obj => JSON.stringify(obj));

            const payload = {
                status: document.getElementById('status_val').value,
                client_id: clientId ? clientId : null,
                type: document.getElementById('type_val').value,
                niche: document.getElementById('niche_val').value,
                brand_name: bName,
                brand_initial: bName.substring(0,2).toUpperCase(),
                title: document.getElementById('title').value.trim(),
                deadline: document.getElementById('deadline').value,
                description: document.getElementById('desc-input').value.trim(),
                budget_total: bTotal,
                payment_type: currentPaymentType,
                reward_per_1k: parseRupiah(document.getElementById('reward_per_1k').value),
                min_views: parseRupiah(document.getElementById('min_views').value),
                max_claim: parseRupiah(document.getElementById('max_claim').value),
                target_video: parseInt(document.getElementById('target_video').value) || 0,
                price_per_video: parseRupiah(document.getElementById('price_per_video').value),
                platforms: platforms,
                video_links: jsonLinks,
                hashtags: document.getElementById('hashtags').value.trim(),
                brief: document.getElementById('brief').value.trim(),
                full_brief: document.getElementById('full_brief').value.trim(),
                restrictions: document.getElementById('restrictions').value.trim()
            };

            if (uploadedBannerUrl) {
                payload.banner_url = uploadedBannerUrl;
            }

            const { error } = await supabase.from('campaigns').update(payload).eq('id', campaignId);

            if(error) {
                alert("Gagal update data: " + error.message);
                btn.innerText = 'Simpan Perubahan';
                btn.disabled = false;
            } else {
                alert("Perubahan berhasil disimpan!");
                window.location.replace('admin-campaign.html');
            }
        });
    </script>
</body>
</html>
