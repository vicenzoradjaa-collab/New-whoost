<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
        }
        
        .input-error {
            border-color: #ef4444 !important;
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black flex flex-col items-center justify-center relative w-full h-full">

    <!-- Background Blur Ornaments -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0 flex items-center justify-center">
        <div class="w-[40rem] h-[40rem] bg-indigo-900/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- LOADING SCREEN AWAL -->
    <div id="pageLoader" class="fixed inset-0 z-[9999] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative flex flex-col items-center">
            <div class="absolute inset-0 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-zinc-600/20 blur-[40px] rounded-full w-32 h-32 animate-pulse"></div>
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-10 sm:h-12 w-auto object-contain relative z-10 animate-bounce" style="animation-duration: 2s;">
            <p class="mt-6 text-zinc-500 text-[11px] sm:text-xs font-semibold tracking-widest uppercase animate-pulse">Memuat Portal...</p>
        </div>
    </div>

    <!-- LOGIN CARD -->
    <main class="w-full max-w-md px-6 relative z-10">
        
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <img src="asset/logow.webp" alt="Whoost" class="h-12 object-contain">
        </div>

        <div class="bg-cardBg border border-zinc-800 rounded-3xl p-8 sm:p-10 shadow-2xl relative overflow-hidden">
            <!-- Dekorasi Garis Atas -->
            <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent opacity-50"></div>
            
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-white tracking-tight mb-2">Admin Portal</h1>
                <p class="text-sm text-zinc-400">Masuk dengan kredensial administrator Anda.</p>
            </div>

            <!-- Error Message Alert -->
            <div id="errorAlert" class="hidden mb-6 bg-red-500/10 border border-red-500/30 text-red-500 text-sm px-4 py-3 rounded-xl flex items-start gap-3">
                <svg class="w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <span id="errorText">Pesan error di sini.</span>
            </div>

            <form id="loginForm" class="space-y-5">
                
                <!-- Input Email -->
                <div>
                    <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Alamat Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path></svg>
                        </div>
                        <input type="email" id="email" required placeholder="admin@whoost.com" 
                            class="w-full bg-zinc-900 border border-zinc-800 focus:border-indigo-500 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white placeholder-zinc-600 outline-none transition-colors">
                    </div>
                </div>

                <!-- Input Password -->
                <div>
                    <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Kata Sandi</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full bg-zinc-900 border border-zinc-800 focus:border-indigo-500 rounded-xl py-3.5 pl-11 pr-12 text-sm text-white placeholder-zinc-600 outline-none transition-colors">
                        
                        <!-- Toggle Password -->
                        <button type="button" onclick="window.togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-zinc-500 hover:text-white transition-colors focus:outline-none">
                            <svg id="eyeIcon" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- Tombol Submit -->
                <div class="pt-4">
                    <button type="submit" id="btnSubmit" class="w-full py-3.5 rounded-xl bg-indigo-600 text-white text-sm font-bold hover:bg-indigo-500 transition-colors shadow-[0_0_20px_rgba(79,70,229,0.3)] flex justify-center items-center gap-2 focus:outline-none disabled:opacity-70 disabled:cursor-not-allowed">
                        <span id="btnText">Masuk ke Portal</span>
                        <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center">
                <a href="login.html" class="text-[13px] text-zinc-500 hover:text-white transition-colors">Bukan Admin? Kembali ke Portal Utama</a>
            </div>
        </div>
        
        <p class="text-center text-[10px] text-zinc-600 mt-8">Secure Admin Access &copy; 2026 Whoost</p>
    </main>

    <!-- SCRIPT & LOGIKA SUPABASE -->
    <script type="module">
        import { supabase } from './authentication/auth.js';

        // 1. Cek Sesi (Apakah sudah login?)
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                
                if (session) {
                    // Cek role-nya
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('role')
                        .eq('id', session.user.id)
                        .single();

                    if (profile && profile.role === 'admin') {
                        window.location.replace('admin-dashboard.html');
                    } else if (profile && profile.role === 'clipper') {
                        window.location.replace('clipper-dashboard.html');
                    } else if (profile && (profile.role === 'client' || profile.role === 'brand')) {
                        window.location.replace('client-dashboard.html');
                    } else {
                        await supabase.auth.signOut();
                    }
                }
            } catch (err) {
                console.error("Session check error:", err);
            } finally {
                // Sembunyikan loader
                setTimeout(() => {
                    const loader = document.getElementById('pageLoader');
                    if(loader) {
                        loader.classList.add('opacity-0');
                        setTimeout(() => loader.style.display = 'none', 500);
                    }
                }, 500);
            }
        });

        // 2. Fitur Toggle Password
        window.togglePassword = function() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>`;
            } else {
                pwdInput.type = 'password';
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
            }
        };

        // 3. Fungsi Menampilkan Error
        function showError(message) {
            const alertBox = document.getElementById('errorAlert');
            const errorText = document.getElementById('errorText');
            errorText.innerText = message;
            alertBox.classList.remove('hidden');
            
            // Animasi shake
            alertBox.classList.remove('input-error');
            void alertBox.offsetWidth; // trigger reflow
            alertBox.classList.add('input-error');
        }

        // 4. Submit Login Form
        const loginForm = document.getElementById('loginForm');
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Sembunyikan error sebelumnya
            document.getElementById('errorAlert').classList.add('hidden');
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            const btnSubmit = document.getElementById('btnSubmit');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            // UI Loading State
            btnSubmit.disabled = true;
            btnText.innerText = "Memverifikasi...";
            btnSpinner.classList.remove('hidden');

            try {
                // Eksekusi Login Supabase
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    if (error.message.includes("Invalid login credentials")) {
                        throw new Error("Email atau kata sandi salah.");
                    } else {
                        throw new Error("Gagal masuk: " + error.message);
                    }
                }

                // Cek Role User setelah Login
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

                if (profileError || !profile) {
                    await supabase.auth.signOut();
                    throw new Error("Gagal mengambil profil akun.");
                }

                // Routing Otomatis Berdasarkan Role
                if (profile.role === 'admin') {
                    window.location.replace('admin-dashboard.html');
                } else if (profile.role === 'clipper') {
                    window.location.replace('clipper-dashboard.html');
                } else if (profile.role === 'client' || profile.role === 'brand') {
                    window.location.replace('client-dashboard.html');
                } else {
                    await supabase.auth.signOut();
                    throw new Error("Akses ditolak! Akun ini tidak memiliki akses yang valid.");
                }

            } catch (err) {
                // Tampilkan pesan error
                showError(err.message);
                
                // Kembalikan tombol
                btnSubmit.disabled = false;
                btnText.innerText = "Masuk ke Portal";
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
