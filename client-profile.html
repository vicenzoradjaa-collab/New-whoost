<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Brand - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent !important; outline: none; }
        html, body { background-color: #0a0a0c; color: white; font-family: 'Inter', sans-serif; height: 100dvh; margin: 0; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animasi transisi antar view */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black flex flex-col relative w-full h-full">

    <!-- LOADING SCREEN -->
    <div id="pageLoader" class="fixed inset-0 z-[9999] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative flex flex-col items-center">
            <div class="absolute inset-0 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-zinc-600/20 blur-[40px] rounded-full w-32 h-32 animate-pulse"></div>
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-10 sm:h-12 w-auto object-contain relative z-10 animate-bounce" style="animation-duration: 2s;">
            <p class="mt-6 text-zinc-500 text-[11px] sm:text-xs font-semibold tracking-widest uppercase animate-pulse">Memuat Profil...</p>
        </div>
    </div>

    <!-- Background Ornamen -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-20%] right-[-10%] w-[50rem] h-[50rem] bg-zinc-800/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- ========================================== -->
    <!-- VIEW: PROFIL UTAMA                         -->
    <!-- ========================================== -->
    <div id="view-profile" class="flex flex-col h-full w-full relative z-10 fade-in block">
        <!-- HEADER -->
        <header class="h-16 sm:h-20 flex items-center justify-between px-4 sm:px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md flex-shrink-0 w-full">
            <div class="flex items-center gap-3 sm:gap-4">
                <img src="asset/logow.webp" alt="Whoost Logo" class="h-6 sm:h-8 w-auto object-contain">
                <div class="h-4 sm:h-5 w-px bg-zinc-800 hidden sm:block"></div>
                <h1 class="text-base sm:text-lg font-semibold tracking-tight">Profil Bisnis</h1>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto px-4 sm:px-8 py-8 pb-32 scroll-smooth w-full">
            <div class="max-w-3xl mx-auto space-y-6">

                <!-- KARTU IDENTITAS -->
                <div class="bg-cardBg border border-zinc-800 rounded-3xl p-6 sm:p-8 flex flex-col sm:flex-row items-center sm:items-start gap-6 shadow-lg relative overflow-hidden">
                    <div class="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-zinc-700 via-zinc-500 to-zinc-700"></div>
                    
                    <!-- Avatar -->
                    <div class="relative shrink-0">
                        <div class="w-24 h-24 sm:w-28 sm:h-28 rounded-full bg-zinc-900 border-4 border-cardBg shadow-xl flex items-center justify-center overflow-hidden">
                            <!-- Placeholder Icon -->
                            <svg class="w-12 h-12 text-zinc-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                        </div>
                        <button onclick="toggleEditMode()" class="absolute bottom-0 right-0 w-8 h-8 bg-white text-black rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-transform focus:outline-none">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                    </div>

                    <!-- Info -->
                    <div class="flex-1 text-center sm:text-left">
                        <h2 class="text-2xl sm:text-3xl font-bold text-white mb-2" id="display-name">hagsa</h2>
                        <div class="flex items-center justify-center sm:justify-start gap-2 text-zinc-400 mb-6">
                            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                            <span class="text-sm font-medium" id="display-category">Fashion & Pakaian</span>
                        </div>
                        <button onclick="toggleEditMode()" class="w-full sm:w-auto px-6 py-2.5 rounded-xl border border-zinc-700 bg-zinc-900 text-white text-sm font-semibold hover:bg-zinc-800 transition-colors focus:outline-none">
                            Edit Profil
                        </button>
                    </div>
                </div>

                <!-- STATUS & REPUTASI -->
                <div>
                    <h3 class="text-lg font-bold text-white mb-3 px-1">Status & Reputasi</h3>
                    <div class="bg-cardBg border border-zinc-800 rounded-3xl p-6 sm:p-8 flex flex-col space-y-4 shadow-sm">
                        <div class="flex justify-between items-end mb-1">
                            <span class="text-sm font-semibold text-white">Kesehatan Profil</span>
                            <span class="text-lg font-bold text-green-400">50%</span>
                        </div>
                        
                        <!-- Progress Bar Container -->
                        <div class="w-full h-2.5 sm:h-3 bg-zinc-900 rounded-full overflow-hidden border border-zinc-800">
                            <!-- Progress Bar Fill (Lebar disesuaikan) -->
                            <div class="h-full bg-green-500 rounded-full shadow-[0_0_10px_rgba(34,197,94,0.4)] transition-all duration-1000" style="width: 50%;"></div>
                        </div>

                        <p class="text-xs text-zinc-500 leading-relaxed mt-2">Profil bisnis kredibel yang lengkap dapat menarik 3x lebih banyak Creator berkualitas. <button onclick="toggleEditMode()" class="text-zinc-300 hover:text-white underline">Lengkapi sekarang</button></p>
                    </div>
                </div>

                <!-- LOGOUT BUTTON -->
                <div class="pt-6">
                    <button onclick="confirmLogout()" class="w-full flex items-center justify-center gap-2 px-6 py-4 rounded-2xl border border-red-500/20 bg-red-500/5 text-red-500 text-sm font-bold hover:bg-red-500/10 hover:border-red-500/40 transition-all focus:outline-none shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        Keluar Akun
                    </button>
                </div>

            </div>
        </main>
    </div>

    <!-- ========================================== -->
    <!-- VIEW: EDIT PROFIL                          -->
    <!-- ========================================== -->
    <div id="view-edit" class="flex flex-col h-full w-full relative z-20 bg-darkBg hidden fade-in">
        <!-- HEADER EDIT -->
        <header class="h-16 sm:h-20 flex items-center justify-between px-4 sm:px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md flex-shrink-0 w-full">
            <button onclick="toggleEditMode()" class="flex items-center gap-2 text-zinc-400 hover:text-white transition-colors focus:outline-none">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span class="text-sm font-medium hidden sm:inline">Kembali</span>
            </button>
            
            <h1 class="text-base sm:text-lg font-bold tracking-tight text-white">Edit Profil</h1>

            <button onclick="saveProfile()" class="px-5 py-2 rounded-xl bg-white text-black text-xs sm:text-sm font-bold hover:bg-zinc-200 transition-colors focus:outline-none shadow-[0_0_15px_rgba(255,255,255,0.15)]">
                Simpan
            </button>
        </header>

        <!-- MAIN FORM EDIT -->
        <main class="flex-1 overflow-y-auto px-4 sm:px-8 py-8 pb-32 scroll-smooth w-full">
            <div class="max-w-2xl mx-auto">
                
                <!-- Edit Avatar -->
                <div class="flex flex-col items-center justify-center mb-10">
                    <div class="relative group cursor-pointer" onclick="alert('Membuka file explorer untuk ganti foto profil')">
                        <div class="w-24 h-24 sm:w-28 sm:h-28 rounded-full bg-zinc-900 border border-zinc-700 flex items-center justify-center overflow-hidden group-hover:border-zinc-500 transition-colors">
                            <svg class="w-12 h-12 text-zinc-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                            <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            </div>
                        </div>
                        <div class="absolute bottom-0 right-0 w-8 h-8 bg-zinc-800 border border-zinc-700 text-white rounded-full flex items-center justify-center shadow-lg pointer-events-none">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                        </div>
                    </div>
                    <p class="text-[11px] text-zinc-500 mt-3 font-medium">Ketuk untuk mengubah foto</p>
                </div>

                <!-- Form Section 1: Informasi -->
                <div class="mb-8">
                    <div class="flex items-center gap-4 mb-4">
                        <h4 class="text-xs font-bold tracking-widest text-zinc-500 uppercase shrink-0">Informasi</h4>
                        <div class="h-px bg-zinc-800 w-full"></div>
                    </div>

                    <div class="space-y-5">
                        <!-- Nama Bisnis -->
                        <div>
                            <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Nama Bisnis</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                </div>
                                <input type="text" id="input-name" value="hagsa" class="w-full bg-zinc-900 border border-zinc-800 focus:border-white rounded-xl py-3.5 pl-11 pr-4 text-sm text-white outline-none transition-colors">
                            </div>
                        </div>

                        <!-- Kategori Bisnis -->
                        <div>
                            <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Kategori Bisnis</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                </div>
                                <select id="input-category" class="appearance-none w-full bg-zinc-900 border border-zinc-800 focus:border-white rounded-xl py-3.5 pl-11 pr-10 text-sm text-white outline-none transition-colors cursor-pointer">
                                    <option value="Fashion & Pakaian" selected>Fashion & Pakaian</option>
                                    <option value="F&B / Restoran">F&B / Restoran</option>
                                    <option value="Produk Digital / Jasa">Produk Digital / Jasa</option>
                                    <option value="Kecantikan & Skincare">Kecantikan & Skincare</option>
                                    <option value="Teknologi & Gadget">Teknologi & Gadget</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-zinc-500">
                                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Form Section 2: Kontak -->
                <div>
                    <div class="flex items-center gap-4 mb-4">
                        <h4 class="text-xs font-bold tracking-widest text-zinc-500 uppercase shrink-0">Kontak</h4>
                        <div class="h-px bg-zinc-800 w-full"></div>
                    </div>

                    <div class="space-y-5">
                        <!-- Alamat -->
                        <div>
                            <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Alamat Bisnis</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                </div>
                                <input type="text" placeholder="Masukkan alamat bisnis" class="w-full bg-zinc-900 border border-zinc-800 focus:border-white rounded-xl py-3.5 pl-11 pr-4 text-sm text-white outline-none transition-colors">
                            </div>
                        </div>

                        <!-- Website -->
                        <div>
                            <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Website</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                                </div>
                                <input type="url" placeholder="https://yourbusiness.com" class="w-full bg-zinc-900 border border-zinc-800 focus:border-white rounded-xl py-3.5 pl-11 pr-4 text-sm text-white outline-none transition-colors">
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- ========================================== -->
    <!-- JAVASCRIPT & LOGIC                         -->
    <!-- ========================================== -->
    
    <!-- Memanggil Navbar Bawah -->
    <script>
        const ACTIVE_MENU = 'profil'; // Identifier menu aktif untuk navbarclient.js
    </script>
    <script src="attribute/navbarclient.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Hilangkan Loading Screen
            setTimeout(() => {
                const loader = document.getElementById('pageLoader');
                if(loader){
                    loader.classList.add('opacity-0');
                    setTimeout(() => loader.style.display = 'none', 500); 
                }
            }, 800); 
        });

        // Toggle antara Mode View Profil & Edit Profil
        function toggleEditMode() {
            const viewProfile = document.getElementById('view-profile');
            const viewEdit = document.getElementById('view-edit');

            if (viewProfile.classList.contains('block')) {
                // Pindah ke Edit
                viewProfile.classList.remove('block');
                viewProfile.classList.add('hidden');
                
                viewEdit.classList.remove('hidden');
                viewEdit.classList.add('block');
            } else {
                // Pindah kembali ke Profile
                viewEdit.classList.remove('block');
                viewEdit.classList.add('hidden');
                
                viewProfile.classList.remove('hidden');
                viewProfile.classList.add('block');
            }
        }

        // Simpan Profil
        function saveProfile() {
            const btn = document.querySelector('button[onclick="saveProfile()"]');
            const originalText = btn.innerText;
            
            // Animasi tombol loading
            btn.innerText = "Menyimpan...";
            btn.classList.add('opacity-75');
            btn.disabled = true;

            setTimeout(() => {
                // Update text di Profil Utama
                const newName = document.getElementById('input-name').value;
                const newCat = document.getElementById('input-category').value;
                
                document.getElementById('display-name').innerText = newName;
                document.getElementById('display-category').innerText = newCat;

                // Kembalikan state tombol
                btn.innerText = originalText;
                btn.classList.remove('opacity-75');
                btn.disabled = false;

                // Kembali ke tampilan profil
                toggleEditMode();
                
                // Optional: Munculkan notifikasi sukses kecil
                alert("Profil berhasil diperbarui!");
            }, 1000);
        }

        // Konfirmasi Logout
        function confirmLogout() {
            const isConfirmed = confirm("Apakah Anda yakin ingin keluar dari akun?");
            if (isConfirmed) {
                // Arahkan ke halaman login
                window.location.href = "login.html"; // Sesuaikan dengan link login Anda
            }
        }
    </script>
</body>
</html>
