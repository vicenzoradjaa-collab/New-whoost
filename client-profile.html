<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Brand - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent !important; outline: none; }
        html, body { background-color: #0a0a0c; color: white; font-family: 'Inter', sans-serif; height: 100dvh; margin: 0; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black flex flex-col relative w-full h-full">

    <!-- LOADING SCREEN -->
    <div id="pageLoader" class="fixed inset-0 z-[9999] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative flex flex-col items-center">
            <div class="absolute inset-0 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-zinc-600/20 blur-[40px] rounded-full w-32 h-32 animate-pulse"></div>
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-10 sm:h-12 w-auto object-contain relative z-10 animate-bounce" style="animation-duration: 2s;">
            <p class="mt-6 text-zinc-500 text-[11px] sm:text-xs font-semibold tracking-widest uppercase animate-pulse">Memuat Profil...</p>
        </div>
    </div>

    <!-- Background Ornamen -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-20%] right-[-10%] w-[50rem] h-[50rem] bg-zinc-800/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- ========================================== -->
    <!-- HEADER                                     -->
    <!-- ========================================== -->
    <header class="h-16 sm:h-20 flex items-center justify-between px-4 sm:px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md flex-shrink-0 w-full z-20">
        <div class="flex items-center gap-3 sm:gap-4">
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-6 sm:h-8 w-auto object-contain">
            <div class="h-4 sm:h-5 w-px bg-zinc-800 hidden sm:block"></div>
            <h1 class="text-base sm:text-lg font-semibold tracking-tight text-white">Profil Bisnis</h1>
        </div>
        
        <!-- Tombol Simpan di Header -->
        <button id="btn-save-header" onclick="saveProfile()" class="hidden sm:block px-5 py-2 rounded-xl bg-white text-black text-sm font-bold hover:bg-zinc-200 transition-colors focus:outline-none shadow-[0_0_15px_rgba(255,255,255,0.15)]">
            Simpan
        </button>
    </header>

    <!-- ========================================== -->
    <!-- MAIN CONTENT (Single Page Profile & Edit)  -->
    <!-- ========================================== -->
    <main class="flex-1 overflow-y-auto px-4 sm:px-8 py-8 pb-32 scroll-smooth w-full relative z-10">
        <div class="max-w-2xl mx-auto">
            
            <!-- 1. FOTO PROFIL / AVATAR -->
            <div class="flex flex-col items-center justify-center mb-10">
                <!-- Tambah ID avatar-preview-bg untuk ganti gambar via JS -->
                <div class="relative group cursor-pointer" onclick="alert('Fitur ganti foto profil di dalam dashboard akan segera hadir!')">
                    <div id="avatar-preview-bg" class="w-24 h-24 sm:w-28 sm:h-28 rounded-full bg-zinc-900 border-2 border-zinc-700 flex items-center justify-center overflow-hidden group-hover:border-zinc-500 transition-colors shadow-lg">
                        <svg class="w-12 h-12 text-zinc-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                        <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </div>
                    </div>
                    <!-- Icon Camera Overlapping -->
                    <div class="absolute bottom-0 right-0 w-8 h-8 bg-zinc-800 border border-zinc-700 text-white rounded-full flex items-center justify-center shadow-lg pointer-events-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                    </div>
                </div>
                <p class="text-[11px] text-zinc-500 mt-3 font-medium">Ketuk untuk mengubah foto</p>
            </div>

            <!-- 2. STATUS & REPUTASI (Kesehatan Profil) -->
            <div class="mb-10">
                <div class="flex items-center gap-4 mb-4">
                    <h4 class="text-xs font-bold tracking-widest text-zinc-500 uppercase shrink-0">Status Akun</h4>
                    <div class="h-px bg-zinc-800 w-full"></div>
                </div>

                <div class="bg-cardBg border border-zinc-800 rounded-3xl p-5 sm:p-6 flex flex-col space-y-4 shadow-sm relative overflow-hidden">
                    <div class="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-zinc-700 via-green-500 to-zinc-700 opacity-50"></div>
                    <div class="flex justify-between items-end mb-1">
                        <span class="text-sm font-semibold text-white">Kesehatan Profil</span>
                        <!-- ID health-text ditambahkan -->
                        <span id="health-text" class="text-lg font-bold text-green-400">0%</span>
                    </div>
                    
                    <!-- Progress Bar Container -->
                    <div class="w-full h-2.5 sm:h-3 bg-zinc-900 rounded-full overflow-hidden border border-zinc-800">
                        <!-- ID health-bar ditambahkan -->
                        <div id="health-bar" class="h-full bg-green-500 rounded-full shadow-[0_0_10px_rgba(34,197,94,0.4)] transition-all duration-1000" style="width: 0%;"></div>
                    </div>

                    <p class="text-xs text-zinc-500 leading-relaxed mt-2">Profil bisnis kredibel yang lengkap dapat menarik 3x lebih banyak Creator berkualitas. Lengkapi data Anda di bawah ini.</p>
                </div>
            </div>

            <!-- 3. FORM INFORMASI BISNIS -->
            <div class="mb-10">
                <div class="flex items-center gap-4 mb-4">
                    <h4 class="text-xs font-bold tracking-widest text-zinc-500 uppercase shrink-0">Informasi</h4>
                    <div class="h-px bg-zinc-800 w-full"></div>
                </div>

                <div class="space-y-5">
                    <!-- Nama Bisnis -->
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Nama Bisnis</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            </div>
                            <input type="text" id="input-name" placeholder="Nama Bisnis Anda" class="w-full bg-cardBg border border-zinc-800 focus:border-white focus:bg-zinc-900 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white outline-none transition-colors">
                        </div>
                    </div>

                    <!-- Kategori Bisnis -->
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Kategori Bisnis</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                            </div>
                            <select id="input-category" class="appearance-none w-full bg-cardBg border border-zinc-800 focus:border-white focus:bg-zinc-900 rounded-xl py-3.5 pl-11 pr-10 text-sm text-white outline-none transition-colors cursor-pointer">
                                <option value="Fashion & Pakaian">Fashion & Pakaian</option>
                                <option value="Makanan & Minuman (F&B)">Makanan & Minuman (F&B)</option>
                                <option value="Kecantikan & Skincare">Kecantikan & Skincare</option>
                                <option value="Teknologi & Gadget">Teknologi & Gadget</option>
                                <option value="Gaya Hidup">Gaya Hidup</option>
                                <!-- Option tambahan digenerate lewat JS agar pas dengan yang di database -->
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-zinc-500">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 4. FORM KONTAK -->
            <div class="mb-10">
                <div class="flex items-center gap-4 mb-4">
                    <h4 class="text-xs font-bold tracking-widest text-zinc-500 uppercase shrink-0">Kontak</h4>
                    <div class="h-px bg-zinc-800 w-full"></div>
                </div>

                <div class="space-y-5">
                    <!-- Alamat -->
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Alamat Bisnis</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            </div>
                            <!-- ID input-address -->
                            <input type="text" id="input-address" placeholder="Masukkan alamat lengkap bisnis" class="w-full bg-cardBg border border-zinc-800 focus:border-white focus:bg-zinc-900 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white outline-none transition-colors">
                        </div>
                    </div>

                    <!-- Website -->
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wide">Website</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                            </div>
                            <!-- ID input-website -->
                            <input type="url" id="input-website" placeholder="https://yourbusiness.com" class="w-full bg-cardBg border border-zinc-800 focus:border-white focus:bg-zinc-900 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white outline-none transition-colors">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 5. TOMBOL AKSI BAWAH -->
            <div class="space-y-4 pt-2">
                <!-- Simpan -->
                <button id="btn-save-bottom" onclick="saveProfile()" class="w-full px-6 py-3.5 rounded-xl bg-white text-black text-sm font-bold hover:bg-zinc-200 transition-colors focus:outline-none shadow-[0_0_15px_rgba(255,255,255,0.15)] flex justify-center items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                    Simpan Perubahan
                </button>

                <!-- Logout -->
                <button onclick="confirmLogout()" class="w-full px-6 py-3.5 rounded-xl border border-red-500/20 bg-red-500/5 text-red-500 text-sm font-bold hover:bg-red-500/10 hover:border-red-500/40 transition-all focus:outline-none flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Keluar Akun
                </button>
            </div>

        </div>
    </main>

    <!-- Memanggil Navbar Bawah -->
    <script>
        const ACTIVE_MENU = 'profil'; 
    </script>
    <script src="attribute/navbarclient.js"></script>

    <!-- ========================================== -->
    <!-- SCRIPT SUPABASE & LOGIC                    -->
    <!-- ========================================== -->
    <script type="module">
        import { supabase } from './authentication/auth.js';

        // 1. KETIKA HALAMAN DIMUAT (Ambil data)
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Cek User Session
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                
                if (sessionError || !session) {
                    window.location.replace('login.html');
                    return;
                }

                // Ambil data profil berdasarkan ID
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', session.user.id)
                    .single();

                if (profile) {
                    // Isi Nama
                    if (profile.business_name) document.getElementById('input-name').value = profile.business_name;
                    
                    // Isi Kategori
                    if (profile.business_category) {
                        const selectCat = document.getElementById('input-category');
                        // Cek apakah kategori ada di dropdown list, jika belum buatkan secara otomatis
                        let optionExists = Array.from(selectCat.options).some(opt => opt.value === profile.business_category);
                        if (!optionExists) {
                            const newOpt = document.createElement('option');
                            newOpt.value = profile.business_category;
                            newOpt.text = profile.business_category;
                            selectCat.appendChild(newOpt);
                        }
                        selectCat.value = profile.business_category;
                    }

                    // Isi Alamat & Web
                    if (profile.business_address) document.getElementById('input-address').value = profile.business_address;
                    if (profile.business_website) document.getElementById('input-website').value = profile.business_website;

                    // Tampilkan Gambar
                    if (profile.avatar_url) {
                        const avatarContainer = document.getElementById('avatar-preview-bg');
                        avatarContainer.innerHTML = ''; // Hilangkan SVG icon
                        avatarContainer.style.backgroundImage = `url('${profile.avatar_url}')`;
                        avatarContainer.style.backgroundSize = 'cover';
                        avatarContainer.style.backgroundPosition = 'center';
                    }

                    // Kalkulasi Kesehatan Profil (Total 5 Data)
                    let filledFields = 0;
                    if (profile.business_name) filledFields++;
                    if (profile.business_category) filledFields++;
                    if (profile.business_address) filledFields++;
                    if (profile.business_website) filledFields++;
                    if (profile.avatar_url) filledFields++;

                    const healthPercentage = Math.round((filledFields / 5) * 100);
                    
                    document.getElementById('health-text').innerText = healthPercentage + '%';
                    const healthBar = document.getElementById('health-bar');
                    healthBar.style.width = healthPercentage + '%';
                    
                    // Ubah warna bar jika < 100% (opsional, untuk UI lebih interaktif)
                    if(healthPercentage < 100) {
                        healthBar.classList.replace('bg-green-500', 'bg-yellow-500');
                        healthBar.style.boxShadow = "0 0 10px rgba(234,179,8,0.4)";
                        document.getElementById('health-text').classList.replace('text-green-400', 'text-yellow-400');
                    }
                }
            } catch (error) {
                console.error("Gagal memuat profil:", error);
            } finally {
                // Sembunyikan Loading Animasi SETELAH data masuk semua
                setTimeout(() => {
                    const loader = document.getElementById('pageLoader');
                    if(loader){
                        loader.classList.add('opacity-0');
                        setTimeout(() => loader.style.display = 'none', 500); 
                    }
                }, 500);
            }
        });

        // 2. FUNGSI SIMPAN PROFIL
        window.saveProfile = async function() {
            const btnBottom = document.getElementById('btn-save-bottom');
            const btnHeader = document.getElementById('btn-save-header');
            
            const originalBottomText = btnBottom.innerHTML;
            
            // Efek Loading UI
            btnBottom.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-black inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Menyimpan...`;
            
            [btnBottom, btnHeader].forEach(btn => {
                if(btn) { btn.classList.add('opacity-75'); btn.disabled = true; }
            });

            try {
                const { data: { session } } = await supabase.auth.getSession();
                if(!session) throw new Error("Anda belum login");
                
                // Kumpulkan update terbaru
                const updateData = {
                    business_name: document.getElementById('input-name').value,
                    business_category: document.getElementById('input-category').value,
                    business_address: document.getElementById('input-address').value,
                    business_website: document.getElementById('input-website').value,
                };
                
                // Simpan ke database
                const { error } = await supabase.from('profiles').update(updateData).eq('id', session.user.id);
                if(error) throw error;
                
                alert("Perubahan profil berhasil disimpan!");
            } catch(e) {
                console.error(e);
                alert("Gagal menyimpan profil: " + e.message);
            } finally {
                // Kembalikan tombol seperti semula
                btnBottom.innerHTML = originalBottomText;
                [btnBottom, btnHeader].forEach(btn => {
                    if(btn) { btn.classList.remove('opacity-75'); btn.disabled = false; }
                });
            }
        };

        // 3. FUNGSI LOGOUT (REAL SUPABASE SIGNOUT)
        window.confirmLogout = async function() {
            const isConfirmed = confirm("Apakah Anda yakin ingin keluar dari akun?");
            if (isConfirmed) {
                // Proses Sign Out Supabase
                const { error } = await supabase.auth.signOut();
                
                if (error) {
                    alert("Terjadi kesalahan saat logout: " + error.message);
                } else {
                    // Redirect ke login jika sukses
                    window.location.replace("login.html");
                }
            }
        };
    </script>
</body>
</html>
