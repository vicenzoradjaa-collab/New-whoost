<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Campaigns - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Panggil file Header & Footer -->
    <script src="attribute/header.js"></script>
    <script src="attribute/footer.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* Custom scrollbar for dropdown menus */
        .dropdown-menu::-webkit-scrollbar { width: 5px; }
        .dropdown-menu::-webkit-scrollbar-track { background: #18181b; }
        .dropdown-menu::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .dropdown-menu::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* Custom Patterns */
        .bg-dots-card {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 16px 16px;
        }

        /* Filter utilities */
        .load-hidden { display: none !important; }
        .filter-hidden { display: none !important; }

        /* Animasi Card */
        @keyframes fadeInUpLocal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up-local {
            opacity: 0;
            animation: fadeInUpLocal 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black">

    <!-- Memanggil Component Header -->
    <custom-header></custom-header>

    <!-- Main Content Explore -->
    <main class="pt-32 pb-24 px-6 max-w-[1400px] mx-auto min-h-screen">
        
        <!-- Top Bar: Search & Filters -->
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-10 mt-6 z-40 relative">
            
            <!-- Search Bar -->
            <div class="relative w-full lg:w-[400px]">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input id="searchInput" type="text" placeholder="Cari Campaign..." class="w-full bg-zinc-900/80 border border-zinc-800 focus:border-zinc-500 focus:bg-zinc-900 rounded-full py-3 pl-12 pr-6 text-sm md:text-base text-white placeholder-zinc-500 outline-none transition-all shadow-inner">
            </div>

            <!-- Filters -->
            <div class="flex flex-wrap gap-3 w-full lg:w-auto">
                
                <!-- 1. Category Dropdown -->
                <div class="relative inline-block text-left filter-dropdown" id="dropdown-category">
                    <button onclick="window.toggleDropdown('menu-category')" class="whitespace-nowrap flex items-center gap-2 bg-zinc-900/80 border border-zinc-800 hover:bg-zinc-800 px-5 py-3 rounded-full text-sm font-semibold transition-colors focus:outline-none">
                        <span id="label-category">All Categories</span>
                        <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="menu-category" class="dropdown-menu hidden absolute left-0 mt-2 w-48 rounded-xl shadow-xl bg-zinc-900 border border-zinc-700 ring-1 ring-black ring-opacity-5 z-50 overflow-hidden">
                        <div class="py-1">
                            <button onclick="window.selectFilter('category', 'All Categories')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">All Categories</button>
                            <button onclick="window.selectFilter('category', 'Clipping')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">Clipping</button>
                            <button onclick="window.selectFilter('category', 'UGC')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">UGC</button>
                        </div>
                    </div>
                </div>

                <!-- 2. Content Dropdown -->
                <div class="relative inline-block text-left filter-dropdown" id="dropdown-content">
                    <button onclick="window.toggleDropdown('menu-content')" class="whitespace-nowrap flex items-center gap-2 bg-zinc-900/80 border border-zinc-800 hover:bg-zinc-800 px-5 py-3 rounded-full text-sm font-semibold transition-colors focus:outline-none">
                        <span id="label-content">All Content</span>
                        <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="menu-content" class="dropdown-menu hidden absolute left-0 mt-2 w-48 max-h-64 overflow-y-auto rounded-xl shadow-xl bg-zinc-900 border border-zinc-700 ring-1 ring-black ring-opacity-5 z-50">
                        <div class="py-1">
                            <button onclick="window.selectFilter('content', 'All Content')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">All Content</button>
                            <button onclick="window.selectFilter('content', 'WhaleClipping')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">WhaleClipping</button>
                            <button onclick="window.selectFilter('content', 'Brand')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">Brand</button>
                            <button onclick="window.selectFilter('content', 'Music')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">Music</button>
                            <button onclick="window.selectFilter('content', 'Podcast')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">Podcast</button>
                            <button onclick="window.selectFilter('content', 'Stream')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">Stream</button>
                            <button onclick="window.selectFilter('content', 'Film')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">Film</button>
                            <button onclick="window.selectFilter('content', 'Tourism')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">Tourism</button>
                            <button onclick="window.selectFilter('content', 'Show')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">Show</button>
                            <button onclick="window.selectFilter('content', 'Entertainment')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">Entertainment</button>
                        </div>
                    </div>
                </div>

                <!-- 3. Status Dropdown -->
                <div class="relative inline-block text-left filter-dropdown" id="dropdown-status">
                    <button onclick="window.toggleDropdown('menu-status')" class="whitespace-nowrap flex items-center gap-2 bg-zinc-900/80 border border-zinc-800 hover:bg-zinc-800 px-5 py-3 rounded-full text-sm font-semibold transition-colors focus:outline-none">
                        <span id="label-status">Semua Status</span>
                        <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="menu-status" class="dropdown-menu hidden absolute right-0 lg:left-0 mt-2 w-48 rounded-xl shadow-xl bg-zinc-900 border border-zinc-700 ring-1 ring-black ring-opacity-5 z-50 overflow-hidden">
                        <div class="py-1">
                            <button onclick="window.selectFilter('status', 'Semua Status')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors">Semua Status</button>
                            <button onclick="window.selectFilter('status', 'Active')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Active</button>
                            <button onclick="window.selectFilter('status', 'Hold')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-yellow-500"></span> Hold</button>
                            <button onclick="window.selectFilter('status', 'Closed')" class="text-zinc-300 hover:bg-zinc-800 hover:text-white block px-4 py-2.5 text-sm w-full text-left font-medium transition-colors flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Closed</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <h1 class="text-4xl md:text-5xl font-extrabold mb-8 tracking-tight">All Campaign</h1>

        <!-- GRID KONSISTEN: Responsive Layout -->
        <div id="campaign-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 2xl:grid-cols-5 gap-3 sm:gap-4 md:gap-6 z-10 relative">
            <p class="text-zinc-500 text-sm col-span-full text-center py-20">Memuat Campaign...</p>
        </div>

        <!-- Alert Data Kosong -->
        <div id="no-data-alert" class="hidden text-center py-20">
            <svg class="w-16 h-16 text-zinc-600 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h3 class="text-xl font-bold text-white mb-2">Campaign tidak ditemukan</h3>
            <p class="text-zinc-500">Coba ubah kata kunci atau ganti filter yang kamu pilih.</p>
        </div>

        <!-- Load More Section -->
        <div id="load-more-container" class="hidden justify-center mt-16 mb-8">
            <button id="load-more-btn" onclick="window.loadMoreData()" class="px-8 py-3 rounded-xl border border-zinc-700 bg-zinc-900 hover:bg-zinc-800 text-sm font-bold transition-all shadow-lg text-zinc-300 hover:text-white flex items-center gap-2 focus:outline-none">
                <svg id="load-more-spinner" class="w-4 h-4 animate-spin hidden" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span id="load-more-text">Load More Campaigns</span>
            </button>
        </div>

    </main>

    <!-- Memanggil Component Footer -->
    <custom-footer></custom-footer>

    <!-- ========================================== -->
    <!-- MODAL AKSES TERBATAS / WAJIB LOGIN         -->
    <!-- ========================================== -->
    <div id="loginPromptModal" class="fixed inset-0 z-[999] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 transition-opacity opacity-0">
        <div class="bg-cardBg border border-zinc-700 shadow-2xl rounded-2xl w-full max-w-sm p-6 text-center transform scale-95 transition-transform" id="loginPromptContent">
            <div class="w-16 h-16 bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Login Diperlukan</h3>
            <p class="text-[13px] text-zinc-400 mb-6 leading-relaxed">Silakan login terlebih dahulu untuk melihat detail dan mendaftar campaign ini.</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="window.closeLoginModal()" class="w-full px-4 py-2.5 rounded-xl border border-zinc-700 text-zinc-300 text-sm font-bold hover:bg-zinc-800 transition-colors focus:outline-none">
                    Kembali
                </button>
                <button onclick="window.location.href='login.html'" class="w-full px-4 py-2.5 rounded-xl bg-white text-black text-sm font-bold hover:bg-zinc-200 transition-colors focus:outline-none">
                    Lanjut Login
                </button>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- JAVASCRIPT & LOGIC SUPABASE                -->
    <!-- ========================================== -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        import { supabase } from './authentication/auth.js';

        let activeFilters = { search: '', category: 'All Categories', content: 'All Content', status: 'Semua Status' };
        let currentVisible = 12; // Menampilkan 12 data awal
        const itemsToLoad = 8;
        
        let allCampaigns = [];

        // Fungsi Anti-XSS
        function escapeHTML(str) {
            if (!str) return '';
            return str.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        document.addEventListener('DOMContentLoaded', async () => {
            AOS.init({ once: true, offset: 50, duration: 800 });
            await initData();
            
            document.getElementById('searchInput').addEventListener('input', (e) => {
                activeFilters.search = e.target.value.toLowerCase();
                currentVisible = 12; 
                applyFilters();
            });
        });

        async function initData() {
            const { data, error } = await supabase
                .from('campaigns')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Gagal load campaign:", error);
                document.getElementById('campaign-grid').innerHTML = '<p class="text-red-500 col-span-full text-center">Gagal terhubung ke database.</p>';
                return;
            }

            allCampaigns = data || [];

            // Sortir manual: Menaruh yang CLOSED di paling akhir
            allCampaigns.sort((a, b) => {
                if (a.status === 'CLOSED' && b.status !== 'CLOSED') return 1;
                if (a.status !== 'CLOSED' && b.status === 'CLOSED') return -1;
                return 0; 
            });

            applyFilters();
        }

        function applyFilters() {
            const grid = document.getElementById('campaign-grid');
            grid.innerHTML = ''; 

            let filtered = allCampaigns.filter(camp => {
                let statText = 'Active';
                if(camp.status === 'HOLDING') statText = 'Hold';
                if(camp.status === 'CLOSED') statText = 'Closed';

                let typeText = camp.type === 'ugc' ? 'UGC' : 'Clipping';

                const campTitle = (camp.title || '').toLowerCase();
                const campBrand = (camp.brand_name || '').toLowerCase();

                const matchSearch = activeFilters.search === '' || campTitle.includes(activeFilters.search) || campBrand.includes(activeFilters.search);
                const matchCat = activeFilters.category === 'All Categories' || typeText === activeFilters.category;
                const matchCont = activeFilters.content === 'All Content' || camp.niche === activeFilters.content;
                const matchStat = activeFilters.status === 'Semua Status' || statText === activeFilters.status;

                return matchSearch && matchCat && matchCont && matchStat;
            });

            const noDataAlert = document.getElementById('no-data-alert');
            const loadMoreContainer = document.getElementById('load-more-container');

            if (filtered.length === 0) {
                noDataAlert.classList.remove('hidden');
                loadMoreContainer.style.display = 'none';
                return;
            } else {
                noDataAlert.classList.add('hidden');
            }

            const displayLimit = currentVisible; 
            
            let html = '';
            filtered.slice(0, displayLimit).forEach((camp, index) => {
                html += generateCardHTML(camp, index);
            });

            grid.innerHTML = html;

            if (filtered.length > currentVisible) {
                loadMoreContainer.style.display = 'flex';
            } else {
                loadMoreContainer.style.display = 'none';
            }
        }

        function generateCardHTML(camp, index) {
            let statusColor = 'border-zinc-700 bg-zinc-800/40 text-green-400';
            let statText = 'ACTIVE';
            let overlayOpacity = 'opacity-100'; 

            if (camp.status === 'HOLDING') {
                statusColor = 'border-yellow-900/50 bg-yellow-900/20 text-yellow-500';
                statText = 'HOLD';
            } else if (camp.status === 'CLOSED') {
                statusColor = 'border-red-900/50 bg-red-900/20 text-red-500';
                statText = 'CLOSED';
                overlayOpacity = 'opacity-50 grayscale'; 
            }

            const price = camp.payment_type === 'video' ? camp.price_per_video : camp.reward_per_1k;
            const priceFormatted = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(price);
            const priceLabel = camp.payment_type === 'video' ? '/ vid' : '/ 1k view';

            const safeTitle = escapeHTML(camp.title);
            const safeBrand = escapeHTML(camp.brand_name);
            const safeNiche = escapeHTML(camp.niche);
            const safeBanner = camp.banner_url ? escapeHTML(camp.banner_url) : null;

            let platformIcons = '';
            if (camp.platforms && Array.isArray(camp.platforms)) {
                if (camp.platforms.includes('tiktok')) platformIcons += `<svg class="w-3 h-3 md:w-4 md:h-4 text-zinc-300" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.1z"/></svg>`;
                if (camp.platforms.includes('instagram')) platformIcons += `<svg class="w-3 h-3 md:w-4 md:h-4 text-zinc-300" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.88z"/></svg>`;
                if (camp.platforms.includes('youtube')) platformIcons += `<svg class="w-3 h-3 md:w-4 md:h-4 text-zinc-300" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`;
            }

            const percentage = camp.budget_total > 0 ? Math.round((camp.budget_remaining / camp.budget_total) * 100) : 0;
            const delay = (index % 12) * 40; 

            // Tombol "Lihat Campaign" memicu Modal Login (Tidak Redirect)
            let btnActionHTML = `<button onclick="window.showLoginModal()" class="w-full bg-white text-black py-2 md:py-2.5 rounded-lg md:rounded-xl font-bold text-[10px] sm:text-xs md:text-sm hover:bg-zinc-200 active:scale-[0.98] transition-all focus:outline-none">Lihat Campaign</button>`;

            return `
            <div class="campaign-card bg-cardBg border border-zinc-800/80 rounded-[1.25rem] md:rounded-[1.5rem] p-3 md:p-4 flex flex-col h-full hover:border-zinc-500 hover:-translate-y-1 transition-all duration-300 shadow-xl group animate-fade-in-up-local" style="animation-delay: ${delay}ms;">
                
                <div class="w-full relative pt-[56.25%] rounded-lg md:rounded-xl overflow-hidden bg-zinc-950 mb-3 md:mb-4 border border-zinc-800/50 shrink-0">
                    ${safeBanner ? `<img src="${safeBanner}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 ${overlayOpacity}">` : `<div class="absolute inset-0 flex flex-col items-center justify-center"><span class="text-zinc-600 text-[10px] md:text-xs font-medium">No Banner</span></div>`}
                </div>
                
                <div class="flex justify-between items-start mb-2 gap-2">
                    <span class="text-[10px] md:text-xs font-bold text-zinc-400 hover:text-white transition truncate">${safeBrand}</span>
                    <span class="shrink-0 px-1.5 md:px-2 py-0.5 rounded-full border text-[8px] md:text-[9px] font-bold tracking-wider ${statusColor}">${statText}</span>
                </div>
                
                <h4 class="text-sm md:text-xl font-black text-white mb-2 truncate block w-full group-hover:text-zinc-300 transition-colors" title="${safeTitle}">${safeTitle}</h4>
                
                <div class="mb-3 flex items-baseline gap-1 flex-wrap">
                    <span class="text-sm md:text-2xl font-extrabold text-white tracking-tight leading-none">${priceFormatted}</span>
                    <span class="text-zinc-500 text-[9px] md:text-xs font-medium whitespace-nowrap">${priceLabel}</span>
                </div>
                
                <div class="flex flex-wrap items-center gap-1.5 md:gap-2 mb-4">
                    <div class="flex items-center gap-1 px-1.5 py-1 md:px-2 rounded-md border border-zinc-800 bg-zinc-900/50">
                        ${platformIcons || `<span class="text-[9px] text-zinc-500">-</span>`}
                    </div>
                    <div class="flex items-center px-1.5 py-1 md:px-2 rounded-md border border-zinc-800 bg-zinc-900/80">
                        <span class="text-[8px] md:text-[10px] font-bold text-zinc-300 uppercase tracking-wider truncate max-w-[70px] md:max-w-none">${safeNiche}</span>
                    </div>
                </div>

                <div class="mt-auto pt-3 border-t border-zinc-800/50">
                    <div class="flex justify-between items-end mb-1 md:mb-2">
                        <span class="text-[9px] md:text-xs text-zinc-400 font-semibold">Sisa Budget</span>
                        <span class="text-[9px] md:text-xs font-black text-white">${percentage}%</span>
                    </div>
                    <div class="w-full h-1 md:h-1.5 bg-zinc-800 rounded-full overflow-hidden mb-3 md:mb-4">
                        <div class="h-full bg-white rounded-full" style="width: ${percentage}%"></div>
                    </div>
                    
                    ${btnActionHTML}
                </div>
            </div>`;
        }

        // ==========================================
        // GLOBAL BINDINGS
        // ==========================================
        window.toggleDropdown = function(id) {
            document.querySelectorAll('.dropdown-menu').forEach(menu => {
                if (menu.id !== id) menu.classList.add('hidden');
            });
            document.getElementById(id).classList.toggle('hidden');
        };

        window.selectFilter = function(type, value) {
            activeFilters[type] = value;
            let displayValue = value;
            if (type === 'status' && value === 'Semua Status') displayValue = 'Semua Status'; 
            
            document.getElementById('label-' + type).innerText = displayValue;
            document.getElementById('menu-' + type).classList.add('hidden');
            
            currentVisible = 12; // Reset view
            applyFilters();
        };

        window.loadMoreData = function() {
            const btn = document.getElementById('load-more-btn');
            const spinner = document.getElementById('load-more-spinner');
            const btnText = document.getElementById('load-more-text');

            btn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.innerText = 'Loading...';

            setTimeout(() => {
                currentVisible += itemsToLoad;
                applyFilters(); 
                
                btn.disabled = false;
                spinner.classList.add('hidden');
                btnText.innerText = 'Load More Campaigns';
            }, 600);
        };

        // POP-UP LOGIN LOGIC
        window.showLoginModal = function() {
            const m = document.getElementById('loginPromptModal');
            const c = document.getElementById('loginPromptContent');
            m.classList.remove('hidden'); m.classList.add('flex');
            setTimeout(() => { m.classList.remove('opacity-0'); c.classList.remove('scale-95'); }, 10);
        };

        window.closeLoginModal = function() {
            const m = document.getElementById('loginPromptModal');
            const c = document.getElementById('loginPromptContent');
            m.classList.add('opacity-0'); c.classList.add('scale-95');
            setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300);
        };

    </script>
</body>
</html>
