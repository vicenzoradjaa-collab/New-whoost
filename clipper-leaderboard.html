<!DOCTYPE html>
<html lang="id" class="bg-darkBg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Whoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        cardBg: '#121214',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            background-color: #0a0a0c;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .podium-1 { background: linear-gradient(180deg, rgba(250, 204, 21, 0.15) 0%, rgba(250, 204, 21, 0) 100%); }
        .podium-2 { background: linear-gradient(180deg, rgba(161, 161, 170, 0.15) 0%, rgba(161, 161, 170, 0) 100%); }
        .podium-3 { background: linear-gradient(180deg, rgba(217, 119, 6, 0.15) 0%, rgba(217, 119, 6, 0) 100%); }
        
        /* Animasi Transisi Halus */
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased selection:bg-zinc-300 selection:text-black flex flex-col relative w-full h-full">

    <!-- ========================================== -->
    <!-- LOADING SCREEN                             -->
    <!-- ========================================== -->
    <div id="pageLoader" class="fixed inset-0 z-[9999] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative flex flex-col items-center">
            <div class="absolute inset-0 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-zinc-600/20 blur-[40px] rounded-full w-32 h-32 animate-pulse"></div>
            <img src="asset/logow.webp" alt="Whoost Logo" class="h-10 sm:h-12 w-auto object-contain relative z-10 animate-bounce" style="animation-duration: 2s;" onerror="this.src='https://via.placeholder.com/150x50?text=WHOOST'">
            <p class="mt-6 text-zinc-500 text-[11px] sm:text-xs font-semibold tracking-widest uppercase animate-pulse">Memuat Leaderboard...</p>
        </div>
    </div>

    <!-- Background Ornamen Aman -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[10%] right-[-10%] w-[40rem] h-[40rem] bg-indigo-900/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- ========================================== -->
    <!-- HEADER                                     -->
    <!-- ========================================== -->
    <header class="h-20 sm:h-24 flex items-center justify-between px-4 sm:px-8 border-b border-zinc-800/50 bg-darkBg/90 backdrop-blur-md z-20 flex-shrink-0 w-full">
        <div class="flex items-center gap-3 sm:gap-4">
            <!-- Tombol Kembali -->
            <a href="clipper-dashboard.html" class="p-2 rounded-full bg-cardBg border border-zinc-800 hover:border-zinc-500 hover:bg-zinc-800 transition-colors">
                <svg class="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
            </a>
            <div class="h-5 sm:h-6 w-px bg-zinc-800"></div>
            <h1 class="text-lg sm:text-xl font-semibold tracking-tight text-white">Leaderboard</h1>
        </div>
    </header>

    <!-- ========================================== -->
    <!-- MAIN CONTENT AREA                          -->
    <!-- ========================================== -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 sm:px-8 py-6 pb-32 z-0 scroll-smooth w-full relative">
        <div class="max-w-3xl mx-auto">
            
            <!-- Intro & Filter Tabs -->
            <div class="mb-8">
                <h2 class="text-2xl sm:text-3xl font-black text-white mb-2 tracking-tight flex items-center gap-3">
                    Top Clippers 
                    <svg class="inline-block w-7 h-7 text-yellow-400 drop-shadow-md align-middle" fill="currentColor" viewBox="0 0 24 24"><path d="M19 2H5C3.346 2 2 3.346 2 5v2.831c0 2.455 1.54 4.582 3.86 5.378C6.671 16.643 9.07 19 12 19s5.329-2.357 6.14-5.791C20.46 12.413 22 10.286 22 7.831V5c0-1.654-1.346-3-3-3zM4 7.831V5c0-.551.449-1 1-1h1v4.444C4.851 8.246 4 8.083 4 7.831zm16 0c0 .252-.851.415-2 .613V4h1c.551 0 1 .449 1 1v2.831z"></path><path d="M10 20h4v2h-4z"></path></svg>
                </h2>
                <p class="text-xs sm:text-sm text-zinc-400 mb-6">Peringkat didasarkan pada performa keseluruhan. Terus submit konten untuk raih posisi puncak!</p>

                <!-- TABS VIEWS & PAYOUT -->
                <div class="flex bg-zinc-900/60 p-1.5 rounded-xl border border-zinc-800/80 backdrop-blur-sm">
                    <button id="btn-views" onclick="window.switchTab('views')" class="flex-1 py-2 sm:py-2.5 text-xs sm:text-sm font-bold bg-zinc-800 text-white rounded-lg shadow-md transition-all duration-300">
                        Paling Banyak Views
                    </button>
                    <button id="btn-payout" onclick="window.switchTab('payout')" class="flex-1 py-2 sm:py-2.5 text-xs sm:text-sm font-bold text-zinc-400 hover:text-white rounded-lg transition-all duration-300">
                        Total Penghasilan
                    </button>
                </div>
            </div>

            <!-- ========================================== -->
            <!-- LEADERBOARD: VIEWS CONTENT                 -->
            <!-- ========================================== -->
            <div id="content-views" class="space-y-6 animate-fade-in block">
                <!-- Akan diisi oleh JS -->
                <div class="py-10 text-center text-zinc-500 animate-pulse text-sm">Menyiapkan data peringkat...</div>
            </div>

            <!-- ========================================== -->
            <!-- LEADERBOARD: PAYOUT CONTENT (Hidden by default) -->
            <!-- ========================================== -->
            <div id="content-payout" class="space-y-6 hidden animate-fade-in">
                 <!-- Akan diisi oleh JS -->
            </div>

        </div>
    </main>

    <!-- Navbar Bawah -->
    <script>
        const ACTIVE_MENU = 'leaderboard'; 
    </script>
    <script src="attribute/navbarclipper.js"></script>

    <!-- ========================================== -->
    <!-- JAVASCRIPT & SUPABASE LOGIC                -->
    <!-- ========================================== -->
    <script type="module">
        import { supabase, enforceRoleProtection } from './authentication/auth.js'; // IMPORT PROTEKSI ROLE

        // Fungsi Anti-XSS
        function escapeHTML(str) {
            if (!str) return '';
            return str.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // 1. Validasi Proteksi Role (Wajib untuk sekuriti)
                await enforceRoleProtection();

                // 2. Load data Leaderboard
                await loadLeaderboardData();
            } catch (e) {
                console.error("Initialization Error:", e);
            } finally {
                // Hilangkan Loading Screen setelah data siap
                setTimeout(() => {
                    const loader = document.getElementById('pageLoader');
                    if(loader) {
                        loader.classList.add('opacity-0'); 
                        setTimeout(() => {
                            loader.style.display = 'none'; 
                        }, 500); 
                    }
                }, 500); 
            }
        });

        async function loadLeaderboardData() {
            // Ambil data stats clipper digabung dengan profile (nama, umur, avatar)
            const { data, error } = await supabase
                .from('clipper_stats')
                .select(`
                    user_id,
                    total_views,
                    total_earnings,
                    profiles (
                        full_name,
                        age,
                        avatar_url
                    )
                `);

            if (error || !data) {
                console.error("Gagal memuat leaderboard:", error);
                document.getElementById('content-views').innerHTML = `<p class="text-center text-red-400 py-10 text-sm">Gagal memuat data.</p>`;
                return;
            }

            // Filter user yang profilnya terhubung saja
            const validData = data.filter(d => d.profiles);

            // Sorting Data (Top 10 Views & Top 10 Payout)
            const topViews = [...validData].sort((a,b) => (b.total_views || 0) - (a.total_views || 0)).slice(0, 10);
            const topPayout = [...validData].sort((a,b) => (b.total_earnings || 0) - (a.total_earnings || 0)).slice(0, 10);

            // Render ke UI
            renderTabContent('content-views', topViews, 'views');
            renderTabContent('content-payout', topPayout, 'payout');
        }

        function renderTabContent(containerId, dataArray, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; // Kosongkan placeholder

            if (dataArray.length === 0) {
                container.innerHTML = '<p class="text-zinc-500 text-center py-10 text-sm">Belum ada data peringkat.</p>';
                return;
            }

            const top3 = dataArray.slice(0, 3);
            const rest = dataArray.slice(3, 10);

            // 1. Build Podium HTML (Top 3)
            const podiumHtml = generatePodiumHTML(top3, type);
            
            // 2. Build List HTML (Rank 4 - 10)
            let listHtml = '';
            if (rest.length > 0) {
                listHtml = generateListHTML(rest, type, 4);
            }

            container.innerHTML = podiumHtml + listHtml;
        }

        // =====================================
        // HTML GENERATORS
        // =====================================

        function generatePodiumHTML(top3, type) {
            const r1 = top3[0]; // Rank 1
            const r2 = top3[1]; // Rank 2
            const r3 = top3[2]; // Rank 3

            let html = '<div class="flex items-end justify-center gap-2 sm:gap-4 pt-6 pb-4">';

            // RANK 2 (Kiri)
            if (r2) {
                html += `
                <div class="flex flex-col items-center podium-2 border border-zinc-800/50 rounded-t-2xl p-3 pb-0 w-[30%] max-w-[120px]">
                    <div class="relative mb-2">
                        <div class="w-12 h-12 sm:w-16 sm:h-16 rounded-full border-2 border-zinc-400 bg-zinc-800 overflow-hidden">
                            <img src="${getAvatar(r2.profiles)}" alt="Avatar" class="w-full h-full object-cover">
                        </div>
                        <div class="absolute -bottom-2.5 left-1/2 -translate-x-1/2 bg-zinc-300 text-black text-[9px] sm:text-[10px] font-black px-2 py-0.5 rounded-full border-2 border-darkBg">#2</div>
                    </div>
                    <h4 class="text-xs sm:text-sm font-bold text-white truncate w-full text-center mt-1">${maskName(r2.profiles.full_name)}</h4>
                    <p class="text-[10px] sm:text-xs ${type === 'views' ? 'text-zinc-400' : 'text-green-400'} font-bold mb-3">${formatValue(r2, type)}</p>
                    <div class="w-full h-16 sm:h-20 bg-zinc-800/50 rounded-t-lg border-x border-t border-zinc-700/50 flex items-center justify-center">
                        <span class="text-zinc-500 font-black text-xl">2</span>
                    </div>
                </div>`;
            } else {
                html += `<div class="w-[30%] max-w-[120px]"></div>`;
            }

            // RANK 1 (Tengah)
            if (r1) {
                html += `
                <div class="flex flex-col items-center podium-1 border border-yellow-500/30 rounded-t-2xl p-3 pb-0 w-[35%] max-w-[140px] relative z-10">
                    <svg class="w-6 h-6 sm:w-8 sm:h-8 text-yellow-400 mb-1 drop-shadow-[0_0_8px_rgba(250,204,21,0.5)]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"/></svg>
                    <div class="relative mb-2">
                        <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full border-4 border-yellow-400 bg-zinc-800 overflow-hidden shadow-[0_0_15px_rgba(250,204,21,0.3)]">
                            <img src="${getAvatar(r1.profiles)}" alt="Avatar" class="w-full h-full object-cover">
                        </div>
                        <div class="absolute -bottom-2.5 left-1/2 -translate-x-1/2 bg-yellow-400 text-black text-[10px] sm:text-[11px] font-black px-2.5 py-0.5 rounded-full border-2 border-darkBg">#1</div>
                    </div>
                    <h4 class="text-sm sm:text-base font-black text-yellow-400 truncate w-full text-center mt-1">${maskName(r1.profiles.full_name)}</h4>
                    <p class="text-[11px] sm:text-xs ${type === 'views' ? 'text-zinc-300' : 'text-green-400'} font-black mb-3">${formatValue(r1, type)}</p>
                    <div class="w-full h-24 sm:h-28 bg-gradient-to-t from-yellow-500/20 to-yellow-500/5 rounded-t-lg border-x border-t border-yellow-500/40 flex items-start justify-center pt-2">
                        <span class="text-yellow-500/50 font-black text-3xl">1</span>
                    </div>
                </div>`;
            }

            // RANK 3 (Kanan)
            if (r3) {
                html += `
                <div class="flex flex-col items-center podium-3 border border-zinc-800/50 rounded-t-2xl p-3 pb-0 w-[30%] max-w-[120px]">
                    <div class="relative mb-2">
                        <div class="w-12 h-12 sm:w-16 sm:h-16 rounded-full border-2 border-amber-600 bg-zinc-800 overflow-hidden">
                            <img src="${getAvatar(r3.profiles)}" alt="Avatar" class="w-full h-full object-cover">
                        </div>
                        <div class="absolute -bottom-2.5 left-1/2 -translate-x-1/2 bg-amber-600 text-white text-[9px] sm:text-[10px] font-black px-2 py-0.5 rounded-full border-2 border-darkBg">#3</div>
                    </div>
                    <h4 class="text-xs sm:text-sm font-bold text-white truncate w-full text-center mt-1">${maskName(r3.profiles.full_name)}</h4>
                    <p class="text-[10px] sm:text-xs ${type === 'views' ? 'text-zinc-400' : 'text-green-400'} font-bold mb-3">${formatValue(r3, type)}</p>
                    <div class="w-full h-12 sm:h-16 bg-zinc-800/50 rounded-t-lg border-x border-t border-zinc-700/50 flex items-center justify-center">
                        <span class="text-zinc-500 font-black text-lg">3</span>
                    </div>
                </div>`;
            } else {
                html += `<div class="w-[30%] max-w-[120px]"></div>`;
            }

            html += '</div>';
            return html;
        }

        function generateListHTML(listData, type, startIndex) {
            let html = '<div class="flex flex-col gap-3">';
            listData.forEach((u, i) => {
                const rank = startIndex + i;
                const valClass = type === 'views' ? 'text-white' : 'text-green-400';
                const labelStr = type === 'views' ? 'Views' : 'Pendapatan';
                
                // Gunakan EscapeHTML untuk sanitasi input sebelum dirender
                const safeAgeStr = u.profiles.age ? `${escapeHTML(u.profiles.age)} Tahun` : 'Umur Rahasia';

                html += `
                <div class="bg-cardBg border border-zinc-800/80 rounded-xl p-3 sm:p-4 flex items-center justify-between hover:border-zinc-500 hover:-translate-y-0.5 transition-all group shadow-md hover:shadow-lg cursor-default">
                    <div class="flex items-center gap-3 sm:gap-4">
                        <span class="text-sm sm:text-base font-black text-zinc-500 w-4 text-center">${rank}</span>
                        <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-zinc-800 overflow-hidden shrink-0 border border-zinc-700">
                            <img src="${getAvatar(u.profiles)}" alt="Avatar" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <h4 class="text-sm font-bold text-white group-hover:text-zinc-300 transition-colors">${maskName(u.profiles.full_name)}</h4>
                            <p class="text-[10px] sm:text-xs text-zinc-400">${safeAgeStr}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm sm:text-base font-bold ${valClass}">${formatValue(u, type).replace(' Views', '')}</p>
                        <p class="text-[9px] sm:text-[10px] text-zinc-500 font-medium uppercase tracking-wider">${labelStr}</p>
                    </div>
                </div>`;
            });
            html += '</div>';
            return html;
        }


        // =====================================
        // HELPER FUNCTIONS (FORMATTING & LOGIC)
        // =====================================

        function getAvatar(profile) {
            if (profile && profile.avatar_url) return escapeHTML(profile.avatar_url);
            const name = profile?.full_name || 'Clipper';
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=27272a&color=fff`;
        }

        // Tampilkan 1 huruf pertama dari tiap kata, sisanya sensor bintang (*). Ditambah fitur keamanan (XSS).
        function maskName(fullName) {
            if (!fullName) return "P*******";
            
            // Sanitasi HTML sebelum diolah mask (Keamanan)
            const safeName = escapeHTML(fullName);

            return safeName.trim().split(/\s+/).map(word => {
                if (word.length <= 1) return word;
                return word.charAt(0) + '*'.repeat(word.length - 1);
            }).join(' ');
        }

        function formatValue(row, type) {
            if (type === 'views') {
                let num = row.total_views || 0;
                if (num >= 1000000000) return (num / 1000000000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + 'B Views';
                if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + 'M Views';
                if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + 'K Views';
                return num.toLocaleString('id-ID') + ' Views';
            } else {
                let num = row.total_earnings || 0;
                if(num >= 1000000000000) return 'Rp ' + (num/1000000000000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + ' T';
                if(num >= 1000000000) return 'Rp ' + (num/1000000000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + ' M';
                if(num >= 1000000) return 'Rp ' + (num/1000000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + ' Jt';
                if(num >= 1000) return 'Rp ' + (num/1000).toFixed(1).replace(/\.0$/, '').replace('.', ',') + ' Rb';
                return 'Rp ' + num.toLocaleString('id-ID');
            }
        }

        // Window binding agar dapat diakses dari onClick di HTML
        window.switchTab = function(tabName) {
            const btnViews = document.getElementById('btn-views');
            const btnPayout = document.getElementById('btn-payout');
            const contentViews = document.getElementById('content-views');
            const contentPayout = document.getElementById('content-payout');

            if (tabName === 'views') {
                btnViews.classList.add('bg-zinc-800', 'text-white', 'shadow-md');
                btnViews.classList.remove('text-zinc-400');
                btnPayout.classList.remove('bg-zinc-800', 'text-white', 'shadow-md');
                btnPayout.classList.add('text-zinc-400');

                contentViews.classList.remove('hidden');
                contentPayout.classList.add('hidden');
            } else {
                btnPayout.classList.add('bg-zinc-800', 'text-white', 'shadow-md');
                btnPayout.classList.remove('text-zinc-400');
                btnViews.classList.remove('bg-zinc-800', 'text-white', 'shadow-md');
                btnViews.classList.add('text-zinc-400');

                contentPayout.classList.remove('hidden');
                contentViews.classList.add('hidden');
            }
        };
    </script>

</body>
</html>
